<!DOCTYPE html>
<html lang="uk">
<head>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram Ultra Premium</title>
    <style>
        /* === ТЕМИ ОФОРМЛЕННЯ ТА ЗМІННІ === */
        :root {
            --bg-main: #0c0c0e; --bg-panel: #131316; --bg-header: #1a1a1e; --bg-input: #1c1c21;
            --border-color: #222227; --text-main: #f5f5f7; --text-muted: #aaa;
            --msg-my-bg: #0088cc; --msg-my-text: #fff; --msg-their-bg: #1a1a1f; --msg-their-text: #f5f5f7;
            --accent: #0088cc; --accent-hover: #2da5ff; --danger: #ff3b30; --success: #4cd964;
            --chat-bg-img: none; --bubble-shadow: 0 1px 3px rgba(0,0,0,0.15); --radius-bubble: 14px;
            --profile-border: 2px solid transparent; --profile-bg: transparent;
        }

        body.theme-black { --bg-main: #000; --bg-panel: #050505; --bg-header: #0a0a0a; --bg-input: #111; --border-color: #1a1a1a; --msg-their-bg: #111; --msg-my-bg: #005580; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); background-image: var(--chat-bg-img); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        ::-webkit-scrollbar { width: 5px; height: 5px; } ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); } ::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px; }

        /* === БОКОВА ПАНЕЛЬ (ЧАТИ, ПАПКИ, АРХІВ) === */
        #sidebar { width: 340px; background: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; position: relative; }
        .sidebar-header { padding: 16px; background: var(--bg-header); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        
        /* Кастомізований профіль */
        .my-profile-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .my-profile-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: var(--profile-border); background: var(--profile-bg); padding: 2px; }
        .my-profile-name { font-weight: 600; color: var(--accent); font-size: 15px; }
        
        .header-controls { display: flex; gap: 8px; }
        .icon-btn { background: rgba(128, 128, 128, 0.1); border: none; color: var(--text-muted); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { background: rgba(128, 128, 128, 0.25); color: var(--text-main); }

        .search-container { padding: 12px; background: var(--bg-header); border-bottom: 1px solid var(--border-color); display: none; }
        .search-container.active { display: block; }
        .search-container input { width: 100%; padding: 10px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; outline: none; }

        /* ПАПКИ ТА АРХІВ */
        .chat-folders-bar { display: flex; overflow-x: auto; background: var(--bg-header); padding: 8px; gap: 8px; scrollbar-width: none; border-bottom: 1px solid var(--border-color); }
        .folder-tab { padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 14px; cursor: pointer; background: rgba(128,128,128,0.1); color: var(--text-muted); white-space: nowrap; user-select: none; display: flex; align-items: center; gap: 4px; }
        .folder-tab.active { background: var(--accent); color: white; }
        .folder-tab.locked::after { content: '🔒'; font-size: 10px; }
        
        #archive-reveal-zone { text-align: center; padding: 10px; font-size: 12px; color: var(--text-muted); cursor: pointer; background: rgba(128,128,128,0.05); border-bottom: 1px solid var(--border-color); display: none; }
        #archive-container { display: none; border-bottom: 1px solid var(--border-color); max-height: 250px; overflow-y: auto; background: var(--bg-input); }

        /* ЧАТИ ТА МУЛЬТИ-ВИБІР ЧАТІВ */
        .section-title { padding: 10px 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        #chats-list { flex-grow: 1; overflow-y: auto; }
        .chat-item { padding: 12px 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; position: relative; }
        .chat-item:hover { background: var(--bg-header); }
        .chat-item.active { background: var(--bg-input); border-left: 4px solid var(--accent); }
        
        /* Чекбокси для виділення чатів */
        .chat-checkbox { display: none; margin-right: 12px; width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        body.multi-chat-mode .chat-checkbox { display: inline-block; }
        body.multi-chat-mode .avatar-placeholder, body.multi-chat-mode .chat-avatar { display: none; } /* Ховаємо аватар при виборі */

        .chat-info-block { display: flex; align-items: center; gap: 12px; max-width: 75%; overflow: hidden; }
        .chat-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .avatar-placeholder { width: 44px; height: 44px; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 16px; }
        
        .chat-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-last-msg { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .draft-text { color: var(--danger); font-style: italic; } /* Стиль для чернеток */
        .chat-flags { font-size: 12px; display: flex; gap: 4px; }

        /* === ГОЛОВНА ЗОНА (ЧАТ) === */
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; position: relative; background: transparent; }
        .no-chat-selected { margin: auto; text-align: center; color: var(--text-muted); font-size: 16px; }
        
        #chat-header { padding: 12px 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; z-index: 15; }
        .header-meta { display: flex; align-items: center; gap: 10px; }
        #chat-title-text { font-weight: 600; font-size: 16px; cursor: pointer; }
        
        .ai-summary-btn { background: linear-gradient(45deg, #af52de, #5856d6); color: white; border: none; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 4px; }

        #messages { list-style: none; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* ПОВІДОМЛЕННЯ ТА КРУЖЕЧКИ */
        .msg-container { max-width: 80%; display: flex; flex-direction: column; align-self: flex-start; }
        .msg-container.my-wrapper { align-self: flex-end; align-items: flex-end; }
        .msg-bubble { background: var(--msg-their-bg); color: var(--msg-their-text); padding: 10px 14px; border-radius: var(--radius-bubble); box-shadow: var(--bubble-shadow); position: relative; }
        .my-wrapper .msg-bubble { background: var(--msg-my-bg); color: var(--msg-my-text); border-bottom-right-radius: 4px; }
        .msg-meta { font-size: 10px; opacity: 0.7; text-align: right; margin-top: 4px; }

        /* Відео-кружечки (Оптимізовані) */
        .video-circle-wrapper { position: relative; width: 180px; height: 180px; cursor: pointer; border-radius: 50%; border: 3px solid var(--accent); overflow: hidden; background: #000; transition: 0.3s; }
        .video-circle { width: 100%; height: 100%; object-fit: cover; }
        .video-speed-overlay { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; display: none; font-weight: bold; border: none; cursor: pointer; z-index: 10; }
        
        .video-circle-wrapper.expanded { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border-radius: 0; z-index: 9999; border: none; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        .video-circle-wrapper.expanded .video-circle { width: 90vw; max-width: 400px; height: 90vw; max-height: 400px; border-radius: 50%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .video-circle-wrapper.expanded .video-speed-overlay { display: block; bottom: 20%; font-size: 14px; padding: 6px 16px; }

        /* ПАНЕЛЬ ВВОДУ ТА БУЛЬБАШКА */
        #input-panel { background: var(--bg-panel); border-top: 1px solid var(--border-color); padding: 10px; display: flex; align-items: center; gap: 8px; position: relative; z-index: 100; }
        #msg-input { flex-grow: 1; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 20px; outline: none; }
        
        .attachment-bubble { position: absolute; bottom: 60px; left: 10px; background: var(--bg-header); border: 1px solid var(--border-color); border-radius: 12px; padding: 8px; display: none; flex-direction: column; gap: 4px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); z-index: 200; width: 220px; }
        .attachment-bubble.active { display: flex; }
        .attach-item { background: none; border: none; color: var(--text-main); text-align: left; padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .attach-item:hover { background: rgba(128,128,128,0.2); color: var(--accent); }

        /* === МОДАЛЬНІ ВІКНА (НАЛАШТУВАННЯ ТА ІНШЕ) === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-panel); padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .modal-title { font-size: 18px; font-weight: 700; color: var(--accent); }
        .btn-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }

        /* Форми в модалках */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
        .custom-input { width: 100%; padding: 10px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; outline: none; }
        .custom-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .custom-btn.danger { background: var(--danger); }
        
        /* Кастомізація профілю UI */
        .color-picker-row { display: flex; gap: 10px; margin-top: 5px; }
        .color-circle { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-circle.selected { border-color: white; transform: scale(1.1); }
        
        .toggle-switch { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(128,128,128,0.1); border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-size: 13px; }
        .toggle-switch input { accent-color: var(--accent); transform: scale(1.2); }

        /* Мульти-чат бар */
        #multi-chat-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-header); padding: 12px; display: none; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); z-index: 20; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); }

    </style>
</head>
<body class="theme-dark">

<div id="sidebar">
    <div class="sidebar-header">
        <div class="my-profile-wrap" onclick="openSettings()">
            <img id="my-avatar-img" class="my-profile-avatar" src="https://via.placeholder.com/150/0088cc/ffffff?text=ME">
            <span class="my-profile-name" id="my-name-display">Мій Профіль</span>
        </div>
        <div class="header-controls">
            <button class="icon-btn" onclick="toggleMultiChatMode()" title="Вибрати кілька чатів">☑️</button>
            <button class="icon-btn" id="search-btn">🔍</button>
        </div>
    </div>

    <div class="chat-folders-bar" id="folders-bar">
        <div class="folder-tab active" data-id="all">Всі чати</div>
        <div class="folder-tab locked" data-id="secret">Секретно</div>
        <button class="icon-btn" style="width:28px; height:28px; font-size:16px;" onclick="openCreateFolderModal()">+</button>
    </div>

    <div id="archive-reveal-zone" onclick="toggleArchive()">📦 Потягніть, щоб відкрити архів</div>
    <div id="archive-container"><div id="archive-list"></div></div>

    <div class="section-title">
        <span>Ваші діалоги</span>
        <span id="ghost-mode-indicator" style="display:none; color:var(--text-muted); font-size:16px;" title="Режим Привида увімкнено">👻</span>
    </div>
    
    <div id="chats-list">
        </div>

    <div id="multi-chat-bar">
        <span style="font-size:13px; font-weight:bold; color:var(--accent);">Обрано: <span id="multi-chat-count">0</span></span>
        <div style="display:flex; gap:8px;">
            <button class="icon-btn" title="Заархівувати" onclick="multiAction('archive')">📦</button>
            <button class="icon-btn" style="color:var(--danger);" title="Видалити" onclick="multiAction('delete')">🗑</button>
            <button class="icon-btn" onclick="toggleMultiChatMode()">❌</button>
        </div>
    </div>
</div>

<div id="chat-main">
    <div id="no-chat-placeholder" class="no-chat-selected">
        <p>BurmaldaGram Ultra<br><span style="font-size:12px; opacity:0.6;">Виберіть чат для спілкування</span></p>
    </div>

    <div id="chat-area" style="display: none; flex-direction: column; height: 100%;">
        <div id="chat-header">
            <div class="header-meta">
                <span id="chat-title-text">Ім'я співрозмовника</span>
            </div>
            <div class="header-controls">
                <button class="ai-summary-btn" onclick="runAISummary()">✨ ШІ-Аналіз</button>
                <button class="icon-btn" title="Відеодзвінок">🎥</button>
                <button class="icon-btn" title="Дзвінок">📞</button>
                <button class="icon-btn" title="Опції">⋮</button>
            </div>
        </div>

        <ul id="messages"></ul>

        <div id="input-panel">
            <button class="icon-btn" onclick="toggleAttachment()">📎</button>
            <input type="text" id="msg-input" placeholder="Напишіть повідомлення (Чернетка зберігається)..." autocomplete="off">
            <button class="icon-btn" style="background:var(--accent); color:white;" onclick="sendMessage()">➤</button>
            
            <div id="attachment-bubble" class="attachment-bubble">
                <button class="attach-item">🖼️ Файли / Фото (Зі зникненням)</button>
                <button class="attach-item">📊 Опитування</button>
                <button class="attach-item" onclick="startVideoCircle()">🔵 Записати Відео-кружок</button>
                <button class="attach-item" onclick="alert('Функція: Відправити повідомлення завтра о 09:00')">⏱️ Заплановане повідомлення</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title">⚙️ Налаштування Профілю</span>
            <button class="btn-close" onclick="closeModal('settings-modal')">&times;</button>
        </div>
        
        <div class="form-group" style="text-align: center;">
            <label>Відео-аватар (Гіфка до 10с) або Фото</label>
            <div style="width:80px; height:80px; border-radius:50%; background:#222; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; color:var(--accent); border:2px dashed var(--accent); cursor:pointer;">+ Відео</div>
        </div>

        <div class="form-group">
            <label>Обводка профілю (Колір)</label>
            <div class="color-picker-row">
                <div class="color-circle" style="background: transparent; border: 1px solid #555;" onclick="setProfileColor('transparent', this)"></div>
                <div class="color-circle" style="background: #ff2d55;" onclick="setProfileColor('#ff2d55', this)"></div>
                <div class="color-circle" style="background: #00e5ff;" onclick="setProfileColor('#00e5ff', this)"></div>
                <div class="color-circle" style="background: #ffcc00;" onclick="setProfileColor('#ffcc00', this)"></div>
                <div class="color-circle" style="background: linear-gradient(45deg, #af52de, #ff2d55);" onclick="setProfileColor('linear-gradient(45deg, #af52de, #ff2d55)', this)"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Приватність та Продуктивність</label>
            <label class="toggle-switch">
                <span>👻 Режим Привида (Не читати чужі смс)</span>
                <input type="checkbox" id="ghost-mode-toggle" onchange="toggleGhostMode(this)">
            </label>
            <label class="toggle-switch">
                <span>🚫 Заборонити скріншоти (Секретні чати)</span>
                <input type="checkbox" checked>
            </label>
        </div>

        <div class="form-group">
            <label>Тема додатку</label>
            <select class="custom-input" onchange="document.body.className = this.value">
                <option value="theme-dark">Стандартна Темна</option>
                <option value="theme-black">AMOLED (Чорна - Економія батареї)</option>
            </select>
        </div>

        <button class="custom-btn danger">Вийти з акаунта</button>
    </div>
</div>

<div class="modal-overlay" id="password-modal">
    <div class="modal-content" style="max-width: 300px; text-align:center;">
        <div class="modal-header"><span class="modal-title">🔒 Введіть пароль</span><button class="btn-close" onclick="closeModal('password-modal')">&times;</button></div>
        <p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">Ця папка прихована та захищена паролем.</p>
        <input type="password" id="folder-password-input" class="custom-input" placeholder="Пароль..." style="text-align:center;">
        <button class="custom-btn" onclick="unlockFolder()">Відкрити</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
