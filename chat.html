<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burmalda Chat</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            height: 100vh; 
            overflow: hidden; 
            background-color: #050510;
            color: white; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
        }

        /* --- ФОН: РІДКЕ СКЛО ТА АВРОРА --- */
        .aurora-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
        }

        .blob {
            position: absolute;
            width: 40vw;
            height: 40vw;
            min-width: 250px;
            min-height: 250px;
            background: linear-gradient(135deg, #00f2fe 0%, #7000ff 100%);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob:nth-child(2) { background: linear-gradient(135deg, #ff0055 0%, #ffcc00 100%); animation-delay: -7s; animation-duration: 30s; }

        @keyframes move {
            0% { transform: translate(-10%, -10%) scale(1); }
            50% { transform: translate(30%, 20%) scale(1.1); }
            100% { transform: translate(-15%, 15%) scale(0.95); }
        }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР ЧАТА --- */
        .chat-container {
            position: relative;
            z-index: 10;
            display: flex;
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 24px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
        }

        /* --- БОКОВАЯ ПАНЕЛЬ (КОНТАКТЫ) --- */
        .sidebar {
            width: 30%;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-weight: 500;
        }
        .contact-item:hover, .contact-item.active {
            background: rgba(0, 242, 254, 0.1);
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateX(3px);
        }

        /* ---ОКНО СООБЩЕНИЙ --- */
        .chat-main {
            width: 70%;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #active-contact-name {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .user-info {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Стилизация сообщений */
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.incoming {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .msg.outgoing {
            align-self: flex-end;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
            border-bottom-right-radius: 4px;
        }

        /* --- ЗОНА ВВОДА --- */
        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 15px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            color: white; 
            border-radius: 14px; 
            font-size: 15px; 
            outline: none; 
            transition: all 0.3s ease;
        }
        .input-area input:focus {
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .input-area button {
            padding: 0 25px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.3);
        }
        .input-area button:hover {
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            transform: scale(1.02);
        }

        /* --- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ --- */
        .lang-switcher {
            margin-top: 20px;
            z-index: 30;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .lang-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .lang-btn:hover { color: #00f2fe; background: rgba(0, 242, 254, 0.05); }
        .lang-btn.active {
            color: #fff;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 2px 8px rgba(0, 242, 254, 0.3);
        }

        /* --- НИЖНІЙ НАПИС --- */
        .bottom-text {
            margin-top: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 3px;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Скроллбар под стиль стекла */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 242, 254, 0.3); }

        /* Адаптация под телефоны */
        @media (max-width: 768px) {
            .chat-container { width: 95%; height: 85vh; flex-direction: column; }
            .sidebar { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
            .chat-main { width: 100%; height: 70%; }
            .sidebar-header { padding: 12px 15px; font-size: 15px; }
            .contacts-list { display: flex; gap: 8px; overflow-x: auto; overflow-y: hidden; padding: 8px; }
            .contact-item { margin-bottom: 0; white-space: nowrap; padding: 8px 12px; font-size: 13px; }
            .chat-header { padding: 12px 15px; }
            #active-contact-name { font-size: 15px; }
            .messages-area { padding: 15px; gap: 8px; }
            .msg { font-size: 14px; max-width: 85%; padding: 10px 14px; }
            .input-area { padding: 12px; }
            .input-area input { padding: 12px; font-size: 14px; }
            .input-area button { padding: 0 15px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="chat-container">
        <!-- БОКОВАЯ ПАНЕЛЬ -->
        <div class="sidebar">
            <div class="sidebar-header" id="side-header">Контакты</div>
            <div class="contacts-list" id="contacts-box">
                <!-- Сюда скрипт выведет контакты -->
            </div>
        </div>

        <!-- ОКНО ЧАТА -->
        <div class="chat-main">
            <div class="chat-header">
                <div id="active-contact-name">...</div>
                <div class="user-info" id="my-username">Вы: Остап</div>
            </div>

            <!-- ЗОНА С СООБЩЕНИЯМИ -->
            <div class="messages-area" id="msg-area">
                <!-- Сообщения будут рендериться тут -->
            </div>

            <!-- ПОЛЕ ВВОДА -->
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
                <button onclick="sendMsg()" id="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <!-- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА -->
    <div class="lang-switcher">
        <button class="lang-btn" onclick="changeLang('ua')">UA</button>
        <button class="lang-btn active" onclick="changeLang('ru')">RU</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
    </div>

    <div class="bottom-text">остап пушка дєвки ловушка</div>

    <script>
        // Переводы
        const translations = {
            ru: {
                contacts: "Контакты",
                you: "Вы: ",
                placeholder: "Сообщение...",
                send: "Отправить",
                noSelect: "Выберите чат..."
            },
            ua: {
                contacts: "Контакти",
                you: "Ви: ",
                placeholder: "Повідомлення...",
                send: "Надіслати",
                noSelect: "Оберіть чат..."
            },
            en: {
                contacts: "Contacts",
                you: "You: ",
                placeholder: "Type a message...",
                send: "Send",
                noSelect: "Select a chat..."
            }
        };

        let currentLang = 'ru';
        let myNick = localStorage.getItem('burmalda_my_nick') || 'Guest';
        let activeContact = '';

        // Инициализация при загрузке
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('my-username').innerText = translations[currentLang].you + myNick;
            document.getElementById('active-contact-name').innerText = translations[currentLang].noSelect;
            
            // Загружаем контакты из localStorage (которые сохранились при логине)
            loadContactsList();
        });

        function loadContactsList() {
            const contactsBox = document.getElementById('contacts-box');
            contactsBox.innerHTML = '';
            
            const rawContacts = localStorage.getItem(`chat_list_${myNick}`);
            const contacts = rawContacts ? JSON.parse(rawContacts) : ["Admin", "Friend_Beta", "Tester_X"]; // Демо-контакты, если база пуста

            contacts.forEach(name => {
                const item = document.createElement('div');
                item.className = 'contact-item';
                item.innerText = name;
                item.onclick = () => selectContact(name, item);
                contactsBox.appendChild(item);
            });
        }

        function selectContact(name, element) {
            activeContact = name;
            document.getElementById('active-contact-name').innerText = name;
            
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Имитация загрузки старых сообщений чата
            const msgArea = document.getElementById('msg-area');
            msgArea.innerHTML = `
                <div class="msg incoming">Привет! Это Burmalda Messenger 😎</div>
                <div class="msg incoming">Тут скоро будет подгружаться твоя реальная история сообщений.</div>
            `;
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            const msgArea = document.getElementById('msg-area');

            if (!text || !activeContact) return;

            // Рендерим наше сообщение
            const msgNode = document.createElement('div');
            msgNode.className = 'msg outgoing';
            msgNode.innerText = text;
            msgArea.appendChild(msgNode);

            input.value = '';
            msgArea.scrollTop = msgArea.scrollHeight;

            // ТУТ БУДЕТ ТВОЙ FETCH-ЗАПРОС В GOOGLE APPS SCRIPT ДЛЯ ОТПРАВКИ В БАЗУ
            console.log(`Отправлено для ${activeContact}: ${text}`);
        }

        // Отправка по нажатию Enter
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });

        function changeLang(lang) {
            currentLang = lang;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.innerText.toLowerCase() === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Обновляем тексты интерфейса
            document.getElementById('side-header').innerText = translations[lang].contacts;
            document.getElementById('my-username').innerText = translations[lang].you + myNick;
            document.getElementById('msg-input').placeholder = translations[lang].placeholder;
            document.getElementById('send-btn').innerText = translations[lang].send;
            
            if(!activeContact) {
                document.getElementById('active-contact-name').innerText = translations[lang].noSelect;
            }
        }
    </script>
</body>
</html>
