<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --liquid-glow: rgba(0, 229, 255, 0.15);
            --text-main: #f5f7fa;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #00e5ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 10% 20%, #1a103c 0%, #0b0f19 60%, #020408 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 90vw;
            max-width: 1100px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.45),
                inset 0 1px 2px rgba(255, 255, 255, 0.25),
                inset 0 15px 35px var(--liquid-glow);
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 1rem;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
        }

        .search-frame {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            opacity: 0;
        }

        .search-frame.active {
            padding: 15px 20px;
            max-height: 75px;
            opacity: 1;
        }

        .search-frame input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
            font-family: inherit;
        }

        .search-frame input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 225, 255, 0.25);
            background: rgba(0, 0, 0, 0.3);
        }

        #chatsList {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin-bottom: 8px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.01);
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(0, 229, 255, 0.12));
            border-color: rgba(0, 229, 255, 0.3);
            box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.1);
        }

        .chat-item span {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status-dot {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .status-dot.online {
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: rgba(255, 255, 255, 0.01);
        }

        #chat-placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 1.05rem;
            letter-spacing: 0.3px;
        }

        #chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #chat-header {
            padding: 22px 25px;
            font-weight: 600;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.1);
            letter-spacing: 0.3px;
        }

        #messages {
            flex: 1;
            list-style: none;
            padding: 25px;
            margin: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #messages li {
            max-width: 65%;
            padding: 12px 18px;
            border-radius: 16px 16px 16px 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            line-height: 1.45;
            align-self: flex-start;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            word-break: break-word;
            font-size: 0.95rem;
        }

        #messages li.my-msg {
            align-self: flex-end;
            border-radius: 16px 16px 4px 16px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(0, 102, 255, 0.2));
            border-color: rgba(0, 229, 255, 0.35);
            box-shadow: 
                0 6px 20px rgba(0, 229, 255, 0.1),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        #messages strong {
            display: block;
            font-size: 0.78rem;
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #messages li.my-msg strong {
            color: #fff;
            opacity: 0.8;
        }

        .input-area {
            padding: 20px 25px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.15);
        }

        #input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        #input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.3);
        }

        #button {
            padding: 0 26px;
            background: linear-gradient(135deg, #00e5ff 0%, #0066ff 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
            font-family: inherit;
        }

        #button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(0, 229, 255, 0.5);
        }

        #button:active {
            transform: translateY(0);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Чати</h2>
            <div>
                <button id="searchToggleBtn" class="icon-btn">🔍</button>
                <button onclick="logout()" class="icon-btn" style="margin-left: 6px;">🚪</button>
            </div>
        </div>
        
        <div id="searchFrame" class="search-frame">
            <input type="text" id="searchInput" placeholder="Введіть нікнейм...">
        </div>

        <div id="chatsList"></div>
    </aside>

    <main class="main-chat">
        <div id="chat-placeholder">
            <span>💬 Оберіть чат або натисніть 🔍 для пошуку</span>
        </div>

        <div id="chat-area" style="display: none;">
            <div id="chat-header">Діалог з:</div>
            
            <ul id="messages"></ul>
            
            <div class="input-area">
                <input type="text" id="input" placeholder="Ваше повідомлення..." autocomplete="off">
                <button id="button">Надіслати</button>
            </div>
        </div>
    </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    // 1. Отримуємо нікнейм поточного користувача (задається сервером або під час авторизації)
    // Якщо нікнейму немає в куках або сесії, використовуємо поточний з localStorage для тесту
    const myNick = localStorage.getItem('burmalda_my_nick') || 'User_' + Math.floor(Math.random() * 1000);
    
    // ПРИВ'ЯЗКА ДО АКАУНТА: Створюємо унікальні динамічні ключі для поточного нікнейму
    const CHAT_LIST_KEY = `chat_list_${myNick}`;
    const MSG_HISTORY_KEY = `msg_history_${myNick}`;

    let onlineUsers = [];
    
    // Завантажуємо дані саме для ЦЬОГО користувача
    let activeChats = JSON.parse(localStorage.getItem(CHAT_LIST_KEY)) || [];
    let savedMessages = JSON.parse(localStorage.getItem(MSG_HISTORY_KEY)) || {};
    
    let currentActiveChatPartner = null;
    let currentRoom = null;

    const chatsList = document.getElementById('chatsList');
    const searchToggleBtn = document.getElementById('searchToggleBtn');
    const searchFrame = document.getElementById('searchFrame');
    const searchInput = document.getElementById('searchInput');
    const chatPlaceholder = document.getElementById('chat-placeholder');
    const chatArea = document.getElementById('chat-area');
    const chatHeader = document.getElementById('chat-header');
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('button');

    socket.emit('store user', myNick);

    socket.on('online users', (users) => {
        onlineUsers = users;
        renderChatsList();
    });

    searchToggleBtn.onclick = function(e) {
        e.preventDefault();
        searchFrame.classList.toggle('active');
        if (searchFrame.classList.contains('active')) {
            searchInput.focus();
        }
    };

    searchInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
            const targetNick = searchInput.value.trim();
            if (!targetNick) return;
            if (targetNick === myNick) {
                alert("Нежна створити чат з самим собою!");
                return;
            }

            if (!activeChats.includes(targetNick)) {
                activeChats.push(targetNick);
                // Зберігаємо в індивідуальне сховище акаунта
                localStorage.setItem(CHAT_LIST_KEY, JSON.stringify(activeChats));
            }

            searchInput.value = '';
            searchFrame.classList.remove('active');
            openChatWith(targetNick);
        }
    };

    function renderChatsList() {
        chatsList.innerHTML = '';
        if (activeChats.length === 0) {
            chatsList.innerHTML = '<div style="padding: 20px; color: var(--text-muted); font-size: 14px; text-align: center; line-height: 1.5;">Список порожній.<br>Натисніть на 🔍 вгорі</div>';
            return;
        }

        activeChats.forEach(user => {
            const item = document.createElement('div');
            item.className = 'chat-item';
            if (currentActiveChatPartner === user) item.classList.add('active');
            
            const isOnline = onlineUsers.includes(user);
            item.innerHTML = `
                <span>${user}</span>
                <span class="status-dot ${isOnline ? 'online' : ''}">${isOnline ? '● онлайн' : 'офлайн'}</span>
            `;

            item.onclick = () => openChatWith(user);
            chatsList.appendChild(item);
        });
    }

    function openChatWith(user) {
        currentActiveChatPartner = user;
        currentRoom = [myNick, user].sort().join('_');

        chatPlaceholder.style.display = 'none';
        chatArea.style.display = 'flex';
        chatHeader.textContent = `Диалог з: ${user}`;

        socket.emit('join room', user);
        loadMessagesHistory();
        renderChatsList();
    }

    socket.on('force join room', (roomName) => {
        const partner = roomName.replace(myNick, '').replace('_', '');
        if (!activeChats.includes(partner)) {
            activeChats.push(partner);
            // Зберігаємо в індивідуальне сховище акаунта
            localStorage.setItem(CHAT_LIST_KEY, JSON.stringify(activeChats));
            renderChatsList();
        }
        socket.emit('join room', partner);
    });

    function sendMessage() {
        const text = input.value.trim();
        if (text && currentRoom) {
            socket.emit('private chat message', { room: currentRoom, text: text });
            input.value = '';
        }
    }

    button.onclick = sendMessage;
    input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    socket.on('chat message', (data) => {
        if (!savedMessages[data.room]) savedMessages[data.room] = [];
        savedMessages[data.room].push(data);
        
        // Зберігаємо історію саме цього акаунта
        localStorage.setItem(MSG_HISTORY_KEY, JSON.stringify(savedMessages));

        if (data.room === currentRoom) {
            displaySingleMessage(data);
        }
    });

    function loadMessagesHistory() {
        messagesContainer.innerHTML = '';
        if (savedMessages[currentRoom]) {
            savedMessages[currentRoom].forEach(displaySingleMessage);
        }
    }

    function displaySingleMessage(data) {
        const item = document.createElement('li');
        if (data.user === myNick) item.classList.add('my-msg');
        item.innerHTML = `<strong>${data.user}</strong>${data.text}`;
        messagesContainer.appendChild(item);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function logout() {
        // При виході ми просто перенаправляємо на сторінку логіну/головну.
        // Завдяки динамічним ключам, коли зайде інший юзер, завантажаться ЙОГО чати.
        window.location.href = '/';
    }

    renderChatsList();
</script>
</body>
</html>
