<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burmalda Messenger</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 0; background: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; flex-shrink: 0; }
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #141414; position: relative; overflow: hidden; }
        
        #messages { list-style-type: none; padding: 15px; margin: 0; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        #messages li { padding: 8px 12px; background: #262626; margin-bottom: 8px; border-radius: 8px; max-width: 85%; width: fit-content; word-break: break-word; font-size: 14px; }
        #messages li.my-msg { background: #007bff; align-self: flex-end; }
        
        #form { padding: 10px; background: #1e1e1e; display: flex; border-top: 1px solid #2d2d2d; flex-shrink: 0; }
        #input { flex-grow: 1; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; outline: none; font-size: 16px; -webkit-appearance: none; }
        #button { padding: 10px 20px; margin-left: 8px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 14px; }

        @media (max-width: 768px) {
            #sidebar { display: none; } /* Скрываем список чатов на телефоне, чтобы не грузить UI */
            body.show-list #sidebar { display: flex; width: 100%; }
        }
    </style>
</head>
<body id="main-body">

<div id="sidebar">
    <div class="sidebar-header" style="padding:15px; background:#262626;">Ваши диалоги</div>
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <div id="messages"></div>
    <div id="form">
        <input id="input" autocomplete="off" placeholder="Сообщение..." />
        <button id="button">OK</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('input');

    // Функция с защитой от undefined
    function displaySingleMessage(data) {
        if (!data || typeof data !== 'object') return; // Защита от битых данных
        
        const item = document.createElement('li');
        const user = data.user ? String(data.user) : 'Гость';
        const text = data.text ? String(data.text) : '';

        item.innerHTML = `<strong>${user}:</strong> ${text}`;
        if (data.user === myNick) item.classList.add('my-msg');
        
        messagesContainer.appendChild(item);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Инициализация при загрузке
    socket.on('chat message', (data) => {
        try {
            displaySingleMessage(data);
        } catch (e) {
            console.error("Ошибка отображения:", e);
        }
    });

    // Обработка кнопки отправки
    document.getElementById('button').onclick = () => {
        const text = input.value.trim();
        if (text) {
            socket.emit('private chat message', { room: currentRoom, text: text });
            input.value = '';
        }
    };
</script>
</body>
</html>
