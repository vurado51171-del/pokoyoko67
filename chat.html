<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram</title>
    <style>
        /* Динамічні пастельні чорно-білі змінні */
        :root {
            --bg-color: #f7f7f9;
            --sidebar-bg: rgba(255, 255, 255, 0.45);
            --chat-bg: rgba(240, 240, 243, 0.3);
            --panel-border: rgba(0, 0, 0, 0.06);
            --text-main: #121214;
            --text-muted: rgba(0, 0, 0, 0.4);
            --bubble-me: #121214;
            --text-me: #ffffff;
            --bubble-other: rgba(0, 0, 0, 0.04);
            --text-other: #121214;
            --input-bg: rgba(0, 0, 0, 0.03);
            --input-border: rgba(0, 0, 0, 0.06);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.03);
            --blob-opacity: 0.06;
            --blur-radius: 30px;
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0c;
            --sidebar-bg: rgba(18, 18, 22, 0.5);
            --chat-bg: rgba(10, 10, 12, 0.3);
            --panel-border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f3f5;
            --text-muted: rgba(255, 255, 255, 0.4);
            --bubble-me: #f3f3f5;
            --text-me: #0a0a0c;
            --bubble-other: rgba(255, 255, 255, 0.04);
            --text-other: #f3f3f5;
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: rgba(255, 255, 255, 0.06);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            --blob-opacity: 0.14;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh;
            height: 100dvh; /* Фікс для мобільних екранів */
            overflow: hidden; 
            position: relative;
        }

        /* --- ЕФЕКТ LIQUID GLASS НА ЗАДНЬОМУ ФОНІ --- */
        .liquid-bg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            filter: url(#chat-liquid-filter);
            pointer-events: none;
        }

        .liquid-blob {
            position: absolute;
            border-radius: 50%;
            background: var(--text-main);
            opacity: var(--blob-opacity);
            animation: floatAnimation 25s infinite alternate ease-in-out;
        }
        .liquid-blob:nth-child(1) { width: 50vw; height: 50vw; top: -20%; left: -10%; }
        .liquid-blob:nth-child(2) { width: 60vw; height: 60vw; bottom: -20%; right: -10%; animation-duration: 32s; animation-delay: -4s; }
        .liquid-blob:nth-child(3) { width: 40vw; height: 40vw; top: 40%; left: 30%; animation-duration: 20s; animation-delay: -8s; }

        @keyframes floatAnimation {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(8%, 12%) scale(1.05) rotate(90deg); }
            100% { transform: translate(-4%, 4%) scale(0.95) rotate(180deg); }
        }

        /* --- ЛІВА ПАНЕЛЬ (СПИСОК) --- */
        #sidebar { 
            width: 340px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--panel-border); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 10;
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
        }

        .sidebar-header { 
            padding: 20px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--panel-border); 
        }

        .my-profile { 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .my-profile-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }

        .header-controls { display: flex; gap: 8px; }
        
        .circle-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .circle-btn:hover { background: var(--text-main); color: var(--bg-color); }

        /* Пошук у стилі рідкої бульбашки */
        .search-container { padding: 12px 15px; position: relative; }
        .search-bubble {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 24px;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            transition: all 0.25s ease;
        }
        .search-bubble:focus {
            border-color: var(--text-main);
            background: transparent;
            box-shadow: 0 0 0 3px var(--panel-border);
        }

        /* Список чатів */
        #chats-list { flex: 1; overflow-y: auto; padding: 5px 0; }
        .chat-item { 
            padding: 14px 18px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            border-bottom: 1px solid transparent;
        }
        .chat-item:hover { background: var(--input-bg); }
        .chat-item.active { background: var(--text-main); color: var(--bg-color); }
        
        .chat-item-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(128,128,128,0.1);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 15px;
            border: 1px solid var(--panel-border);
        }
        .chat-item.active .chat-item-avatar {
            background: var(--bg-color);
            color: var(--text-main);
        }

        .chat-item-info { flex: 1; min-width: 0; }
        .chat-item-name { font-weight: 500; font-size: 15px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item-preview { font-size: 12px; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- ПРАВА ЧАСТИНА (ОБЛАСТЬ ЧАТУ) --- */
        #chat-area { 
            flex: 1; 
            display: none; 
            flex-direction: column; 
            background: var(--chat-bg);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            z-index: 5;
            position: relative;
        }

        #chat-placeholder { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            color: var(--text-muted);
            font-size: 14px;
            z-index: 5;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            padding: 20px;
        }
        .meme-watermark {
            font-size: 11px;
            opacity: 0.25;
            margin-top: 15px;
            line-height: 1.6;
        }

        .chat-header { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--panel-border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: var(--sidebar-bg);
        }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { display: none; font-size: 20px; background: none; border: none; color: var(--text-main); cursor: pointer; padding-right: 5px; }

        /* Стрічка повідомлень */
        #messages-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
        }

        .message-row { display: flex; width: 100%; }
        .message-row.my { justify-content: flex-end; }
        .message-row.other { justify-content: flex-start; }

        .message-bubble { 
            max-width: 68%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14.5px; 
            line-height: 1.45;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            word-break: break-word;
        }
        .message-row.my .message-bubble { 
            background: var(--bubble-me); 
            color: var(--text-me); 
            border-bottom-right-radius: 4px;
        }
        .message-row.other .message-bubble { 
            background: var(--bubble-other); 
            color: var(--text-other); 
            border-bottom-left-radius: 4px;
            border: 1px solid var(--panel-border);
        }

        .msg-meta { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 5px; 
            font-size: 10px; 
            margin-top: 5px; 
            opacity: 0.5;
        }

        /* Блок введення знизу */
        .chat-input-panel { 
            padding: 15px 20px; 
            background: var(--sidebar-bg); 
            border-top: 1px solid var(--panel-border);
            display: flex; 
            align-items: center; 
            gap: 12px;
        }
        .input-bubble-wrapper {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 24px;
            padding: 4px 6px 4px 16px;
            display: flex;
            align-items: center;
        }
        #message-input { 
            flex: 1; 
            border: none; 
            background: transparent; 
            color: var(--text-main); 
            font-size: 14px; 
            outline: none; 
            padding: 8px 0;
        }
        .send-btn { 
            background: var(--text-main); 
            color: var(--bg-color); 
            border: none; 
            width: 34px; height: 34px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); }

        /* --- МОДАЛЬНІ ВІКНА (НАЛАШТУВАННЯ) --- */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.3); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .modal-content { 
            background: var(--sidebar-bg); 
            border: 1px solid var(--panel-border);
            padding: 30px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: var(--shadow);
            position: relative;
            text-align: center;
        }
        .modal-content h3 { margin-bottom: 20px; font-size: 20px; font-weight: 600; }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--panel-border);
            font-size: 14.5px;
        }
        
        .modal-close-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Мега Бринза Контейнер з картинкою */
        .bryndza-premium-box {
            margin-top: 15px;
            background: rgba(128,128,128,0.05);
            border: 1px dashed var(--panel-border);
            border-radius: 14px;
            padding: 12px;
        }
        .bryndza-img {
            width: 100%;
            max-height: 130px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 8px;
            filter: grayscale(40%);
            border: 1px solid var(--panel-border);
        }

        /* --- КОНТЕКСТНЕ МЕНЮ --- */
        #context-menu { 
            position: absolute; 
            display: none; 
            background: var(--sidebar-bg); 
            border: 1px solid var(--panel-border); 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
            z-index: 200; 
            overflow: hidden; 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        #context-menu button { 
            display: block; width: 100%; padding: 12px 20px; 
            background: none; border: none; text-align: left; 
            cursor: pointer; font-size: 13.5px; color: var(--text-main);
        }
        #context-menu button:hover { background: var(--input-bg); }
        #context-menu button.delete-btn { color: #ff4a4a; }

        /* --- АДАПТИВНІСТЬ ПІД ТЕЛЕФОНИ --- */
        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-area { 
                position: absolute; top: 0; left: 0; 
                width: 100%; height: 100%; 
            }
            .back-btn { display: inline-block; }
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: fixed; pointer-events: none; z-index: -1;">
        <defs>
            <filter id="chat-liquid-filter" filterUnits="userSpaceOnUse" colorInterpolationFilters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
                <feImage id="liquid-glass-map" width="300" height="200" xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAADICAYAAABS39xVAAAQAElEQVR4Aey9eah1WfeddepWFfiHIAiCIAiCIIIIIogIIiIiIqKIoiiKDfZtNEZjTOxj3/diQ2JiYmJMjDHGGDVGYohNMPbGqASDSjCoBAn5VXPzPOOsue7c6+x97n2rbve+7/k444w5x5xr7b3X3mt8+9669X139/en+xtO99+xDj8Bfif4HeD/Bb8d/Dbwf4LfCn4L+F/B//zd6f5//OZ0/9//rdP9f/M7T/e/8f8/3f+G33G6/y/+v9P9r/9/Tve/7ref7n/t/326/zW/7XT/q/+v0/1/+H+c7n/Vbz3d/8r//XT/K37L6f6X/2+n+1/2v5zuf+lvPt3/kt90uv/F/9Pp/hf9D6f7X/jfne5/wX97uv/5//Xp/uf9xtP9z/2vTvc/5zec7n/2f3m6/1n/+en+X/nPTvf/8q8/3f9Lv+50/y/+p6f7f+HXTheoretical..." />
                <feDisplacementMap in="SourceGraphic" in2="liquid-glass-map" scale="18" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <div class="liquid-bg-container">
        <div class="liquid-blob"></div>
        <div class="liquid-blob"></div>
        <div class="liquid-blob"></div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="my-profile" onclick="openModal('settings-modal')">
                <div class="my-profile-avatar" id="my-avatar-letters">?</div>
                <span id="my-nick-display">User</span>
            </div>
            <div class="header-controls">
                <button class="circle-btn" onclick="openModal('add-chat-modal')">＋</button>
                <button class="circle-btn" onclick="openModal('settings-modal')">⚙</button>
            </div>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" class="search-bubble" placeholder="Пошук брінзоїдів..." oninput="filterChatsList()">
        </div>

        <div id="chats-list"></div>
    </div>

    <div id="chat-placeholder">
        <span id="t-select-prompt">Виберіть чат для спілкування</span>
        <div class="meme-watermark">
            бринза остап брінзоед влад брінзоед<br>прівєт здоровяк • версія 100х
        </div>
    </div>

    <div id="chat-area">
        <div class="chat-header">
            <div class="chat-header-left">
                <button class="back-btn" onclick="closeChatArea()">←</button>
                <div class="chat-item-avatar" id="active-chat-avatar">?</div>
                <b id="active-chat-title">Chat</b>
            </div>
            <div style="font-size: 11px; opacity: 0.4; font-weight: 600;">БРИНЗА ACTIVE</div>
        </div>

        <div id="messages-container"></div>

        <div class="chat-input-panel">
            <div class="input-bubble-wrapper">
                <input type="text" id="message-input" placeholder="Напишіть повідомлення..." autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3 id="t-settings-title">Налаштування</h3>
            
            <div class="setting-row">
                <span id="t-setting-theme">Темна тема</span>
                <button class="circle-btn" style="width: auto; padding: 0 12px; border-radius: 20px; font-size: 12px;" onclick="toggleTheme()" id="theme-indicator">Увімк</button>
            </div>

            <div class="setting-row" style="cursor: pointer;" onclick="logout()">
                <span style="color: #ff4a4a;" id="t-logout">Вийти з акаунту</span>
                <span style="color: #ff4a4a;">➔</span>
            </div>

            <div class="bryndza-premium-box">
                <div style="font-size: 11px; font-weight: bold; letter-spacing: 0.5px;">⭐ БРИНЗОЇД МОД PREMIUM</div>
                <img src="1000101518.jpg" class="bryndza-img" alt="Burmalda Rare Meme">
                <div style="font-size: 10px; opacity: 0.6; margin-top: 6px;">Прівєт здоровяк! Остап і Влад контролюють цей сервер.</div>
            </div>

            <button class="modal-close-btn" onclick="closeModal('settings-modal')">Закрити</button>
        </div>
    </div>

    <div id="add-chat-modal" class="modal">
        <div class="modal-content">
            <h3 id="t-add-title">Створити чат</h3>
            <input type="text" id="new-chat-nick" class="search-bubble" style="border-radius: 12px; margin-bottom: 15px;" placeholder="Нікнейм брінзоїда...">
            <button class="modal-close-btn" style="margin-top: 10px;" onclick="createNewChatSlot()">Додати</button>
            <button class="modal-close-btn" style="background: transparent; color: var(--text-main); margin-top: 5px;" onclick="closeModal('add-chat-modal')">Скасувати</button>
        </div>
    </div>

    <div id="context-menu"></div>

    <script>
        // --- ПОВНА ОРИГІНАЛЬНА КЛІЄНТСЬКА ЛОГІКА ТА ПЕРЕКЛАДИ ---
        const translations = {
            uk: {
                selectPrompt: "Виберіть чат для спілкування",
                settingsTitle: "Налаштування Burmalda",
                settingTheme: "Чорно-біла тема",
                logout: "Вийти з системи",
                addTitle: "Новий співрозмовник",
                addPlaceholder: "Введіть точний нік...",
                ctxDeleteChat: "Видалити цей чат",
                themeLight: "☀️ СВІТЛА",
                themeDark: "🌙 ТЕМНА"
            },
            ru: {
                selectPrompt: "Выберите чат для общения",
                settingsTitle: "Настройки Burmalda",
                settingTheme: "Черно-белая тема",
                logout: "Выйти из системы",
                addTitle: "Новый собеседник",
                addPlaceholder: "Введите точный ник...",
                ctxDeleteChat: "Удалить этот чат",
                themeLight: "☀️ СВЕТЛАЯ",
                themeDark: "🌙 ТЕМНАЯ"
            },
            en: {
                selectPrompt: "Select a chat to start messaging",
                settingsTitle: "Burmalda Settings",
                settingTheme: "Monochrome Theme",
                logout: "Log Out",
                addTitle: "New Conversation",
                addPlaceholder: "Enter exact nickname...",
                ctxDeleteChat: "Delete this chat",
                themeLight: "☀️ LIGHT",
                themeDark: "🌙 DARK"
            }
        };

        let currentLang = localStorage.getItem('burmalda_lang') || 'uk';
        let myNick = localStorage.getItem('burmalda_my_nick') || 'User';
        let activeChats = [];
        let currentRoom = null;
        let currentActiveChatPartner = null;
        let savedMessages = JSON.parse(localStorage.getItem('burmalda_msg_history')) || {};

        const chatsListContainer = document.getElementById('chats-list');
        const messagesContainer = document.getElementById('messages-container');
        const chatArea = document.getElementById('chat-area');
        const chatPlaceholder = document.getElementById('chat-placeholder');
        const contextMenu = document.getElementById('context-menu');

        function initChatPage() {
            // Застосування збереженої теми
            const savedTheme = localStorage.getItem('burmalda_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIndicator(savedTheme);

            document.getElementById('my-nick-display').innerText = myNick;
            document.getElementById('my-avatar-letters').innerText = myNick.substring(0,2).toUpperCase();
            
            // Завантаження списку контактів
            const storedList = localStorage.getItem(`chat_list_${myNick}`);
            if (storedList) {
                activeChats = JSON.parse(storedList);
            }

            applyLanguageStrings();
            renderChatsList();

            // Постійне оновлення повідомлень з хмари (імітація/пулінг за твоїм скриптом)
            setInterval(syncMessagesWithCloud, 4000);
        }

        function applyLanguageStrings() {
            const t = translations[currentLang] || translations.uk;
            document.getElementById('t-select-prompt').innerText = t.selectPrompt;
            document.getElementById('t-settings-title').innerText = t.settingsTitle;
            document.getElementById('t-setting-theme').innerText = t.settingTheme;
            document.getElementById('t-logout').innerText = t.logout;
            document.getElementById('t-add-title').innerText = t.addTitle;
            document.getElementById('new-chat-nick').placeholder = t.addPlaceholder;
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('burmalda_theme', newTheme);
            updateThemeIndicator(newTheme);
        }

        function updateThemeIndicator(theme) {
            const ind = document.getElementById('theme-indicator');
            const t = translations[currentLang] || translations.uk;
            if (ind) {
                ind.innerText = theme === 'dark' ? t.themeDark : t.themeLight;
            }
        }

        function renderChatsList() {
            chatsListContainer.innerHTML = '';
            activeChats.forEach(partner => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                if (partner === currentActiveChatPartner) item.className += ' active';
                
                const room = [myNick, partner].sort().join('_');
                const lastMsgs = savedMessages[room] || [];
                const lastText = lastMsgs.length ? lastMsgs[lastMsgs.length - 1].text : 'Немає повідомлень';

                item.innerHTML = `
                    <div class="chat-item-avatar">${partner.substring(0,2).toUpperCase()}</div>
                    <div class="chat-item-info">
                        <div class="chat-item-name">${partner}</div>
                        <div class="chat-item-preview">${lastText}</div>
                    </div>
                `;

                item.addEventListener('click', () => openChatWithPartner(partner));
                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showChatContextMenu(e.clientX, e.clientY, partner);
                });

                chatsListContainer.appendChild(item);
            });
        }

        function openChatWithPartner(partner) {
            currentActiveChatPartner = partner;
            currentRoom = [myNick, partner].sort().join('_');
            
            chatPlaceholder.style.display = 'none';
            chatArea.style.display = 'flex';
            
            document.getElementById('active-chat-title').innerText = partner;
            document.getElementById('active-chat-avatar').innerText = partner.substring(0,2).toUpperCase();

            renderCurrentRoomMessages();
            renderChatsList();
        }

        function closeChatArea() {
            chatArea.style.display = 'none';
            chatPlaceholder.style.display = 'flex';
            currentActiveChatPartner = null;
            currentRoom = null;
            renderChatsList();
        }

        function renderCurrentRoomMessages() {
            if (!currentRoom) return;
            messagesContainer.innerHTML = '';
            const list = savedMessages[currentRoom] || [];
            
            list.forEach(m => {
                const isMe = m.sender === myNick;
                const row = document.createElement('div');
                row.className = `message-row ${isMe ? 'my' : 'other'}`;
                
                row.innerHTML = `
                    <div class="message-bubble">
                        <div>${m.text}</div>
                        <div class="msg-meta">
                            <span>${m.time || ''}</span>
                        </div>
                    </div>
                `;
                messagesContainer.appendChild(row);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentRoom) return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (!savedMessages[currentRoom]) savedMessages[currentRoom] = [];
            
            const newMsg = { sender: myNick, text: text, time: timeStr };
            savedMessages[currentRoom].push(newMsg);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));

            input.value = '';
            renderCurrentRoomMessages();
            renderChatsList();

            // Відправка на твій Google Apps Script сервер
            const url = 'https://script.google.com/macros/s/AKfycbw5-YIlQPbTq8fI46zqdBBBUq_b5KjAQ7PY0CPCRN0tG_PLkJx4hpwhe_6iiqdWx7Gj0g/exec';
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: "send", room: currentRoom, sender: myNick, text: text })
            }).catch(e => console.error("Cloud send error:", e));
        }

        function syncMessagesWithCloud() {
            if (!currentRoom) return;
            const url = `https://script.google.com/macros/s/AKfycbw5-YIlQPbTq8fI46zqdBBBUq_b5KjAQ7PY0CPCRN0tG_PLkJx4hpwhe_6iiqdWx7Gj0g/exec?action=get&room=${currentRoom}`;
            
            fetch(url)
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success' && data.messages) {
                    savedMessages[currentRoom] = data.messages;
                    localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
                    renderCurrentRoomMessages();
                }
            }).catch(e => console.log("Polling passive log:", e));
        }

        function createNewChatSlot() {
            const input = document.getElementById('new-chat-nick');
            const nick = input.value.trim();
            if (nick && nick !== myNick && !activeChats.includes(nick)) {
                activeChats.push(nick);
                localStorage.setItem(`chat_list_${myNick}`, JSON.stringify(activeChats));
                input.value = '';
                closeModal('add-chat-modal');
                renderChatsList();
                openChatWithPartner(nick);
            }
        }

        function filterChatsList() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                const name = item.querySelector('.chat-item-name').innerText.toLowerCase();
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }

        function showChatContextMenu(x, y, partnerNick) {
            const t = translations[currentLang] || translations.uk;
            contextMenu.style.left = `${x}px`; 
            contextMenu.style.top = `${y}px`;
            contextMenu.innerHTML = `<button onclick="window.executeDeleteChat('${partnerNick}')" class="delete-btn">${t.ctxDeleteChat}</button>`;
            contextMenu.style.display = 'block';
        }

        window.executeDeleteChat = function(partnerNick) {
            const generatedRoom = [myNick, partnerNick].sort().join('_');
            if (savedMessages[generatedRoom]) delete savedMessages[generatedRoom];
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
            
            activeChats = activeChats.filter(c => c !== partnerNick);
            localStorage.setItem(`chat_list_${myNick}`, JSON.stringify(activeChats));
            
            if (generatedRoom === currentRoom) {
                currentActiveChatPartner = null; 
                currentRoom = null;
                chatArea.style.display = 'none'; 
                chatPlaceholder.style.display = 'flex'; 
            }
            renderChatsList();
        };

        document.addEventListener('click', () => { contextMenu.style.display = 'none'; });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function logout() { 
            localStorage.removeItem('chat_logged_in'); 
            window.location.href = '/'; 
        }

        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('DOMContentLoaded', initChatPage);
    </script>
</body>
</html>
