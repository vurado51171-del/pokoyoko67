<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бурмалда Premium | Messenger</title>
    <!-- Підключення Socket.io (обов'язково для роботи чату в реальному часі) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        /* =========================================================
           ТЕМА ОФОРМЛЕННЯ: LIQUID GLASS & NEON
           ========================================================= */
        :root {
            /* Темна неонова тема за замовчуванням */
            --bg-main: #0b0f19;
            --bg-panel: rgba(18, 25, 43, 0.6);
            --bg-header: rgba(11, 15, 25, 0.7);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #00f0ff; /* Неоновий блакитний */
            --accent-glow: 0 0 15px rgba(0, 240, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(255, 255, 255, 0.05);
            --msg-my: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 136, 204, 0.4));
            --msg-other: rgba(30, 41, 59, 0.6);
            --glass-blur: blur(16px);
        }

        .theme-light {
            --bg-main: #f1f5f9;
            --bg-panel: rgba(255, 255, 255, 0.6);
            --bg-header: rgba(241, 245, 249, 0.7);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #0284c7;
            --accent-glow: 0 0 15px rgba(2, 132, 199, 0.4);
            --border-color: rgba(0, 0, 0, 0.08);
            --bg-input: rgba(0, 0, 0, 0.05);
            --msg-my: linear-gradient(135deg, #38bdf8, #0284c7);
            --msg-other: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: none; /* Приховується до авторизації JS */
            background-image: radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(175, 82, 222, 0.08), transparent 25%);
        }

        /* Ефект рідкого скла для панелей */
        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        #main-body { display: flex; height: 100%; width: 100%; }

        /* САЙДБАР (Списки чатів) */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h3 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }

        .header-controls { display: flex; gap: 8px; }

        .search-trigger-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-trigger-btn:hover {
            box-shadow: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }

        #search-frame { padding: 12px; border-bottom: 1px solid var(--border-color); }
        
        #search-input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        #search-input:focus { border-color: var(--accent); box-shadow: var(--accent-glow); }

        #chats-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Елементи списку чатів */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .chat-item:hover { background: var(--bg-input); }

        /* ОСНОВНА ЗОНА ЧАТУ */
        #no-chat-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            color: var(--text-muted);
        }

        #chat-area {
            flex: 1;
            display: none;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-header);
            backdrop-filter: var(--glass-blur);
            z-index: 10;
        }

        #btn-back {
            display: none;
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            margin-right: 15px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Повідомлення */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            backdrop-filter: blur(5px);
        }
        
        .message.my-message {
            align-self: flex-end;
            background: var(--msg-my);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .message.other-message {
            align-self: flex-start;
            background: var(--msg-other);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* ФОРМА ВВЕДЕННЯ */
        #form {
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid var(--border-color);
            background: var(--bg-header);
            backdrop-filter: var(--glass-blur);
        }

        #input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-main);
            outline: none;
            font-size: 15px;
            transition: all 0.3s;
        }

        #input:focus { border-color: var(--accent); box-shadow: var(--accent-glow); }

        #button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        #button:hover { box-shadow: var(--accent-glow); transform: translateY(-1px); }

        /* МОДАЛЬНІ ВІКНА ТА МЕНЮ */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; align-items: center; justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(8px);
        }
        
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-close {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; color: var(--text-muted);
            font-size: 24px; cursor: pointer; transition: 0.2s;
        }
        .modal-close:hover { color: var(--accent); }

        .context-menu {
            position: absolute;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            z-index: 9999;
            backdrop-filter: var(--glass-blur);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            min-width: 180px;
        }

        .context-menu button {
            background: none; border: none; color: var(--text-main);
            padding: 10px 15px; text-align: left; cursor: pointer;
            border-radius: 8px; transition: 0.2s; font-size: 14px;
        }

        .context-menu button:hover { background: var(--bg-input); color: var(--accent); }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body class="theme-dark">

    <div id="main-body">
        <!-- БІЧНА ПАНЕЛЬ: СПИСОК ЧАТІВ / ГРУП -->
        <div class="sidebar glass-panel">
            <div class="sidebar-header">
                <h3>Бурмалда</h3>
                <div class="header-controls">
                    <!-- Кнопка створення груп (➕) додається сюди через JS динамічно -->
                    <button id="search-toggle-btn" class="search-trigger-btn" title="Пошук користувачів">🔍</button>
                    <button id="settings-toggle-btn" class="search-trigger-btn" title="Налаштування">⚙️</button>
                </div>
            </div>
            
            <div id="search-frame" style="display:none;">
                <input type="text" id="search-input" placeholder="Знайти користувача...">
                <div id="search-results-dropdown" style="margin-top: 10px;"></div>
            </div>
            
            <div id="chats-list"></div>
        </div>

        <!-- ЗАГЛУШКА (Коли чат не обрано) -->
        <div id="no-chat-placeholder">
            <div style="font-size: 48px; margin-bottom: 20px; text-shadow: var(--accent-glow);">💬</div>
            <h2 style="margin:0 0 10px 0;">Бурмалда Premium</h2>
            <p>Оберіть чат або створіть нову групу</p>
        </div>

        <!-- АКТИВНИЙ ЧАТ -->
        <div id="chat-area" class="glass-panel">
            <div class="chat-header">
                <button id="btn-back">⬅ Назад</button>
                <div style="flex:1; display:flex; flex-direction:column; align-items:center;">
                    <!-- При кліку на заголовок відкривається профіль групи/каналу (реалізовано в JS) -->
                    <h3 id="chat-title-text" style="margin:0; cursor:pointer; font-weight:600;" onclick="if(currentRoom) openEntityProfile(currentRoom)">Чат</h3>
                    <span id="chat-typing-status" style="font-size:12px; color:var(--accent); margin-top:2px; min-height:15px;"></span>
                </div>
                <div style="width: 60px;"></div> <!-- Балансир для центровки -->
            </div>

            <div id="pinned-message-bar" style="display:none; padding:12px 20px; background:var(--bg-input); border-bottom:1px solid var(--border-color); font-size:13px; cursor:pointer;">
                <span id="pin-counter-badge" style="color:var(--accent); font-weight:bold; margin-right:8px;">📌</span>
                <div id="pinned-bar-text-content" style="display:inline-block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%;"></div>
            </div>

            <div id="messages"></div>

            <form id="form">
                <button type="button" id="sticker-btn" style="background:none; border:none; font-size:24px; cursor:pointer; transition:0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">😊</button>
                <input id="input" autocomplete="off" placeholder="Напишіть повідомлення..." />
                <button id="button">Надіслати</button>
            </form>
        </div>
    </div>

    <!-- МОДАЛЬНІ ВІКНА (ОСНОВНІ) -->
    
    <!-- Налаштування -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button id="settings-close-btn" class="modal-close">&times;</button>
            <h2 style="margin-top:0;">⚙️ Налаштування</h2>
            <div style="margin-top: 20px;">
                <label style="font-size: 14px; color: var(--text-muted);">Тема оформлення:</label>
                <select id="theme-select" style="width:100%; padding:12px; margin-top:8px; border-radius:8px; background:var(--bg-input); color:var(--text-main); border:1px solid var(--border-color); outline:none;">
                    <option value="theme-dark">Neon Dark (Liquid Glass)</option>
                    <option value="theme-light">Light</option>
                </select>
            </div>
            <!-- Додаткові налаштування з JS рендеряться сюди -->
        </div>
    </div>

    <!-- Контекстне меню для повідомлень (видалення, закріплення, ролі) -->
    <div id="global-context-menu" class="context-menu"></div>
    
    <!-- Меню стікерів -->
    <div id="sticker-menu" class="glass-panel" style="display:none; position:absolute; bottom:80px; left:20px; width:250px; height:200px; padding:10px; border-radius:16px; overflow-y:auto; z-index:100;"></div>
    
    <!-- Перегляд зображень на весь екран -->
    <div id="image-viewer-modal" class="modal-overlay" onclick="closeImageViewer()" style="z-index: 10005;">
        <img id="image-viewer-img" style="max-width:90%; max-height:90%; border-radius:8px; box-shadow: 0 0 30px rgba(0,0,0,0.8);" />
    </div>

    <!-- ПІДКЛЮЧЕННЯ ЛОГІКИ -->
    <!-- Збережи JS код з попереднього повідомлення як app.js і він підтягнеться тут -->
    <script src="app.js"></script>
</body>
</html>
