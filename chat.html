<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burmalda Messenger</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 0; background: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Сайдбар */
        #sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 15px; background: #262626; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        
        /* Кнопки поиска и настроек */
        .controls { display: flex; gap: 10px; }
        .btn-icon { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 5px; }
        
        /* Поиск */
        #search-box { padding: 10px; background: #2d2d2d; display: none; }
        #search-box.active { display: block; }
        #search-box input { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 4px; }

        /* Чат-зона */
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #141414; }
        #messages { list-style-type: none; padding: 15px; margin: 0; flex: 1; overflow-y: auto; }
        #messages li { padding: 8px 12px; background: #262626; margin-bottom: 8px; border-radius: 8px; max-width: 80%; width: fit-content; word-break: break-word; }
        #messages li.my-msg { background: #007bff; align-self: flex-end; margin-left: auto; }
        
        #form { padding: 10px; background: #1e1e1e; display: flex; border-top: 1px solid #2d2d2d; flex-shrink: 0; }
        #input { flex-grow: 1; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; font-size: 16px; outline: none; }
        #button { padding: 0 20px; margin-left: 8px; background: #28a745; color: white; border: none; border-radius: 5px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span>Диалоги</span>
        <div class="controls">
            <button class="btn-icon" onclick="document.getElementById('search-box').classList.toggle('active')">🔍</button>
            <button class="btn-icon" onclick="alert('Настройки: (ссылка на профиль)')">⚙️</button>
        </div>
    </div>
    
    <div id="search-box">
        <input type="text" placeholder="Поиск друга...">
    </div>
    
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <ul id="messages"></ul>
    <div id="form">
        <input id="input" autocomplete="off" placeholder="Сообщение..." />
        <button id="button">OK</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // Твой JS-код остается прежним, я просто добавил логику для кнопок выше
    const input = document.getElementById('input');
    const messagesContainer = document.getElementById('messages');
    
    // Функция защиты от undefined из прошлых правок
    function displaySingleMessage(data) {
        if (!data) return;
        const item = document.createElement('li');
        const user = data.user || 'Гость';
        const text = data.text || '';
        item.innerHTML = `<strong>${user}:</strong> ${text}`;
        messagesContainer.appendChild(item);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
</script>
</body>
</html>
