<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram Premium</title>
    <style>
        /* === ТЕМИ ОФОРМЛЕННЯ (CSS Variables) === */
        :root {
            --bg-main: #0c0c0e;
            --bg-panel: #131316; --bg-header: #1a1a1e; --bg-input: #1c1c21;
            --border-color: #222227; --text-main: #f5f5f7; --text-muted: #aaa;
            --msg-my-bg: #0088cc; --msg-my-text: #fff; --msg-their-bg: #1a1a1f; --msg-their-text: #f5f5f7;
            --accent: #0088cc; --accent-hover: #2da5ff; --danger: #ff3b30;
            --chat-bg-img: none; --bubble-shadow: 0 1px 3px rgba(0,0,0,0.15); --radius-bubble: 14px;
        }

        body.theme-black {
            --bg-main: #000000;
            --bg-panel: #050505; --bg-header: #0a0a0a; --bg-input: #111111;
            --border-color: #1a1a1a; --msg-their-bg: #111111; --msg-my-bg: #005580;
        }

        body.theme-vintage {
            --bg-main: url('https://www.transparenttextures.com/patterns/woven-light.png') #96a0ad;
            --bg-panel: #cbd2d8; --bg-header: linear-gradient(180deg, #8ba1b9 0%, #4a6c9b 100%);
            --bg-input: #ffffff; --border-color: #7b8896; --text-main: #000; --text-muted: #333;
            --msg-my-bg: linear-gradient(180deg, #5fc9f8 0%, #1583d9 100%); --msg-my-text: #fff; 
            --msg-their-bg: linear-gradient(180deg, #fdfdfd 0%, #e6e6e6 100%); --msg-their-text: #000;
            --accent: #1583d9; --accent-hover: #0d5c9e;
            --chat-bg-img: url('https://www.transparenttextures.com/patterns/linen.png');
            --bubble-shadow: inset 0 1px 1px rgba(255,255,255,0.6), 0 2px 3px rgba(0,0,0,0.3); 
            --radius-bubble: 16px;
        }
        
        body.theme-vintage #chat-header, body.theme-vintage .sidebar-header {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.5);
            color: #fff; border-bottom: 1px solid #283e59;
        }
        body.theme-vintage .my-profile, body.theme-vintage #chat-title-text { color: #fff;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.6); }
        body.theme-vintage #input-panel-container { background: linear-gradient(180deg, #f0f0f0 0%, #cccccc 100%);
            border-top: 1px solid #888; }
        body.theme-vintage #input { border: 1px solid #999;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.1); border-radius: 20px; }
        body.theme-vintage .media-btn-label, body.theme-vintage .tool-btn { background: linear-gradient(180deg, #fff 0%, #e0e0e0 100%);
            border: 1px solid #999; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        body.theme-vintage #button { background: linear-gradient(180deg, #5fc9f8 0%, #1583d9 100%);
            border: 1px solid #0d5c9e; box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 1px 2px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-main); background-image: var(--chat-bg-img); color: var(--text-main); display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; max-width: 100%;
            transition: background 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px;
        }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(128, 128, 128, 0.5);
        }

        #sidebar { width: 340px; background: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex;
            flex-direction: column; flex-shrink: 0; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10;
        }
        
        .sidebar-header { padding: 16px;
            background: var(--bg-header); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .my-profile { font-weight: 600; color: var(--accent); font-size: 15px; cursor: pointer; display: flex;
            align-items: center; gap: 10px; user-select: none; }
        .my-profile:hover { color: var(--accent-hover);
        }
        .header-controls { display: flex; gap: 10px; align-items: center;
        }
        
        .search-trigger-btn, .settings-btn { background: rgba(128, 128, 128, 0.1);
            border: none; font-size: 16px; cursor: pointer; color: var(--text-muted); transition: all 0.2s; padding: 8px; border-radius: 50%; outline: none; display: flex;
            align-items: center; justify-content: center; }
        .search-trigger-btn:hover, .settings-btn:hover { color: var(--text-main);
            background: rgba(128, 128, 128, 0.25); transform: scale(1.05); }

        .search-container { padding: 12px 16px;
            background: var(--bg-header); border-bottom: 1px solid var(--border-color); display: none; }
        .search-container.active { display: block;
        }
        .search-container input { width: 100%; padding: 10px 14px; background: var(--bg-input);
            border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; outline: none; font-size: 14px; transition: border-color 0.2s;
        }
        .search-container input:focus { border-color: var(--accent);
        }

        /* --- СТИЛІ ГЛОБАЛЬНОГО ПОШУКУ --- */
        .search-results-dropdown { 
            position: absolute; top: calc(100% + 5px); left: 0; width: 100%; 
            background: var(--bg-input); border: 1px solid var(--border-color); 
            border-radius: 8px; z-index: 200; max-height: 250px; overflow-y: auto; 
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .search-result-item { 
            padding: 10px; display: flex; align-items: center; gap: 10px; 
            cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s;
        }
        .search-result-item:hover { background: var(--bg-header); }
        .search-result-item:last-child { border-bottom: none; }
        .search-section-title { 
            padding: 6px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; 
            color: var(--accent); background: rgba(128,128,128,0.1); 
        }

        .section-title { padding: 12px 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1.5px; font-weight: 700; }
        
        #chats-list { flex-grow: 1;
            overflow-y: auto; }
        .chat-item { padding: 14px 16px; border-bottom: 1px solid var(--border-color);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; user-select: none; position: relative;
        }
        .chat-item:hover { background: var(--bg-header);
        }
        .chat-item.active { background: var(--bg-input); border-left: 4px solid var(--accent);
        }
        .chat-item.blocked { opacity: 0.5; filter: grayscale(100%);
        }

        .chat-flags { display: flex; gap: 6px; position: absolute; right: 16px; top: 14px;
            font-size: 12px; }

        @keyframes glowPulse { 0% { background-color: var(--bg-panel);
            box-shadow: inset 0 0 0px rgba(0, 136, 255, 0); } 50% { background-color: var(--bg-header);
            box-shadow: inset 0 0 15px rgba(0, 136, 255, 0.4); } 100% { background-color: var(--bg-panel);
            box-shadow: inset 0 0 0px rgba(0, 136, 255, 0); } }
        .chat-item.glow-active { animation: glowPulse 2s infinite ease-in-out;
            border-left: 4px solid #00e5ff; }
        
        .chat-info-block { display: flex;
            align-items: center; gap: 12px; max-width: 80%; }
        .status-dot { font-size: 11px; color: var(--text-muted);
            margin-top: 18px; }
        .status-dot.online { color: #4cd964; font-weight: bold;
        }

        .avatar, .avatar-placeholder, .modal-avatar, .modal-avatar-placeholder, .circle-video { border-radius: 50% !important;
            aspect-ratio: 1 / 1; object-fit: cover; }
        .avatar { width: 40px; height: 40px;
            flex-shrink: 0; display: block; border: 1px solid rgba(128,128,128,0.2); }
        .avatar-placeholder { width: 40px;
            height: 40px; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; text-transform: uppercase; flex-shrink: 0;
        }

        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: transparent; position: relative;
            height: 100%; min-width: 0; }
        #chat-header { padding: 14px 20px; background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color); font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 12px; z-index: 15;
        }
        
        .header-meta { display: flex;
            align-items: center; gap: 12px; overflow: hidden; }
        #chat-title-text { cursor: pointer; display: flex;
            align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #chat-title-text:hover { color: var(--accent);
        }
        .typing-indicator { font-size: 13px; color: #4cd964; font-style: italic; display: none;
        }
        
        .header-actions { display: flex;
            gap: 10px; align-items: center; position: relative; }
        .call-btn { background: rgba(128, 128, 128, 0.1);
            color: var(--text-main); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; }
        .call-btn:hover { background: rgba(128, 128, 128, 0.25); transform: scale(1.05);
        }

        #chat-options-menu { position: absolute; top: 100%; right: 0px; background: var(--bg-input);
            border: 1px solid var(--border-color); border-radius: 8px; padding: 5px 0; min-width: 170px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 5000;
            margin-top: 10px; }
        #chat-options-menu button { display: block; width: 100%; text-align: left;
            background: none; border: none; padding: 10px 15px; color: var(--text-main); font-size: 13px; cursor: pointer;
        }
        #chat-options-menu button:hover { background: var(--bg-header);
        }
        #chat-options-menu button.danger { color: var(--danger);
        }

        .back-btn { display: none; background: rgba(128,128,128,0.2); border: none; color: var(--text-main);
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
        }
        .back-btn:hover { background: rgba(128,128,128,0.3);
        }

        #pinned-message-bar { background: var(--bg-header); border-bottom: 1px solid var(--border-color); padding: 8px 20px;
            display: none; align-items: center; justify-content: space-between; font-size: 13px; color: #00e5ff; cursor: pointer; z-index: 12; user-select: none; transition: background 0.2s;
        }
        #pinned-message-bar:hover { background: var(--bg-input);
        }
        .pinned-bar-content { display: flex; flex-direction: column; overflow: hidden; max-width: 85%;
        }
        .pinned-bar-title { font-weight: 700; font-size: 11px; text-transform: uppercase; display: flex; gap: 8px;
            align-items: center; color: var(--accent); }
        .pin-counter { background: var(--accent); color: #fff;
            padding: 2px 6px; border-radius: 10px; font-size: 9px; }
        .pinned-bar-text { color: var(--text-muted);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
        .unpin-btn-x { background: none;
            border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px;
        }
        .unpin-btn-x:hover { color: var(--danger);
        }
        
        #messages { list-style-type: none;
            padding: 20px; margin: 0; flex-grow: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column;
        }
        .msg-container { position: relative; margin-bottom: 12px; display: flex; flex-direction: column; max-width: 85%;
            width: fit-content; z-index: 1; transition: background-color 0.5s ease; border-radius: var(--radius-bubble);
        }
        .msg-container:hover { z-index: 100;
        }
        .msg-container.my-wrapper { align-self: flex-end;
        }

        #messages li { padding: 10px 14px; background: var(--msg-their-bg); border-radius: var(--radius-bubble); word-break: break-word;
            user-select: none; color: var(--msg-their-text); position: relative; cursor: pointer; transition: background 0.15s; width: 100%; box-shadow: var(--bubble-shadow); display: flex; flex-direction: column;
            gap: 4px; border: 1px solid rgba(128,128,128,0.05); }
        #messages li.my-msg { background: var(--msg-my-bg);
            color: var(--msg-my-text); border-bottom-right-radius: 4px; }
        
        /* Прозорі бабли для медіа */
        #messages li.msg-transparent { background: transparent !important;
            box-shadow: none !important; padding: 0 !important; border: none !important; color: var(--text-main);
        }
        #messages li.msg-transparent .msg-meta-line { position: absolute; bottom: 5px; right: 8px; background: rgba(0,0,0,0.5);
            padding: 3px 8px; border-radius: 12px; color: white; width: auto; z-index: 2; font-size: 11px;
        }
        #messages li.msg-transparent .chat-media-wrapper { background: transparent; border: none; margin: 0;
        }
        #messages li.msg-transparent .audio-msg { background: var(--bg-panel); border-radius: 20px; border: 1px solid var(--border-color);
        }
        
        .sticker-img { width: 140px;
            height: 140px; object-fit: contain; display: block; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));
        }
        
        .circle-video { width: 180px;
            height: 180px; display: block; border: 3px solid var(--accent); background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .audio-msg { border-radius: 20px; outline: none; height: 40px;
        }

        .msg-meta-line { display: flex; align-items: center; justify-content: flex-end; gap: 6px; align-self: flex-end;
            margin-top: 2px; font-size: 10px; width: 100%; opacity: 0.8; }
        .msg-time { color: inherit;
            opacity: 0.6; }
        .msg-status { color: inherit; opacity: 0.6; font-weight: bold; font-size: 11px;
            transition: color 0.3s; }
        .msg-status.read { color: #4cd964; opacity: 1;
        }

        .reply-quote { background: rgba(128, 128, 128, 0.15); border-left: 3px solid var(--accent);
            padding: 6px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 4px; color: inherit; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .my-msg .reply-quote { border-left-color: #ffffff; background: rgba(255, 255, 255, 0.15);
        }

        .chat-media-wrapper { margin-top: 4px; border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.2); display: flex;
            align-items: center; justify-content: center; border: 1px solid rgba(128, 128, 128, 0.05); max-width: 100%;
        }
        .chat-media-img { width: 100%; max-width: 320px; max-height: 280px; object-fit: contain; display: block;
            cursor: pointer; transition: opacity 0.2s; }

        .reaction-picker { position: absolute; top: -48px;
            left: 8px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 30px; padding: 4px 10px; display: none; gap: 8px; z-index: 99;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); user-select: none; align-items: center; max-width: 250px; flex-wrap: wrap;
        }
        .msg-container.my-wrapper .reaction-picker { left: auto; right: 8px;
        }
        .reaction-picker span { font-size: 18px; cursor: pointer; transition: transform 0.1s;
        }
        .reaction-picker span:hover { transform: scale(1.35);
        }

        .reactions-holder { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap;
        }
        .reaction-chip { background: rgba(128,128,128,0.1); border: 1px solid var(--border-color); border-radius: 10px;
            padding: 2px 6px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; user-select: none;
        }
        .reaction-chip:hover { background: rgba(128,128,128,0.25);
        }
        .reaction-chip.active-my { background: rgba(0, 136, 255, 0.15); border-color: var(--accent);
        }

        #input-panel-container { background: var(--bg-panel); border-top: 1px solid var(--border-color); width: 100%; display: flex;
            flex-direction: column; position: relative; z-index: 110; }
        #reply-preview-bar { background: var(--bg-header);
            padding: 8px 20px; border-left: 4px solid var(--accent); display: none; justify-content: space-between; align-items: center; font-size: 13px;
        }
        #reply-preview-text { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 85%;
        }
        #reply-close-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer;
        }
        #reply-close-btn:hover { color: var(--danger);
        }

        #form { padding: 12px 10px; display: flex; align-items: center; width: 100%;
            gap: 8px; flex-wrap: wrap; }
        #input { flex-grow: 1; padding: 12px 16px;
            background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 20px; outline: none; font-size: 15px; transition: border-color 0.2s; min-width: 100px;
        }
        #input:focus { border-color: var(--accent);
        }
        
        .media-btn-label, .tool-btn { background: var(--bg-input);
            border: 1px solid var(--border-color); color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .media-btn-label:hover, .tool-btn:hover { color: var(--text-main);
            background: rgba(128, 128, 128, 0.2); transform: scale(1.05); }
        
        .record-overlay { position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-panel); z-index: 200; display: flex; align-items: center; justify-content: space-around;
            padding: 0 20px; }
        .record-preview { width: 50px; height: 50px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--danger); background: #000; transition: border-color 0.3s;
        }
        .record-preview.recording { animation: pulseRecord 1s infinite;
        }
        
        @keyframes pulseRecord { 0% { transform: scale(1);
            box-shadow: 0 0 0 0 rgba(255,59,48, 0.7);
        } 50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255,59,48, 0);
        } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,59,48, 0);
        } }

        #button { padding: 10px 16px; background: var(--accent); color: #fff; border: none;
            border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 14px; flex-shrink: 0; transition: all 0.2s;
        }
        #button:hover { background: var(--accent-hover); transform: scale(1.02);
        }
        
        .popup-menu { position: absolute;
            bottom: 70px; left: 10px; background: var(--bg-header); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; display: none; width: 280px; max-height: 250px;
            overflow-y: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.6); z-index: 200; }
        .popup-menu.active { display: flex;
            flex-wrap: wrap; gap: 8px; }
        .sticker-item { width: 60px; height: 60px; object-fit: contain;
            cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .sticker-item:hover { background: rgba(128,128,128,0.2);
        }

        .no-chat-selected { margin: auto; text-align: center; color: var(--text-muted); font-size: 18px; line-height: 1.6;
            user-select: none; }

        .context-menu { position: fixed; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 10px; display: none; z-index: 5500; box-shadow: 0 5px 20px rgba(0,0,0,0.6); min-width: 190px; overflow: hidden;
        }
        .context-menu button { background: none; border: none; color: var(--text-main); width: 100%;
            text-align: left; padding: 11px 16px; font-size: 13px; cursor: pointer; outline: none; display: block; transition: background 0.15s;
        }
        .context-menu button:hover { background: var(--bg-header);
        }
        .context-menu button.delete-btn { color: var(--danger); font-weight: 600; border-top: 1px solid var(--border-color);
        }
        .context-menu button.delete-btn:hover { background: rgba(255, 59, 48, 0.15);
        }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 16px; backdrop-filter: blur(4px); overflow-y: auto;
        }
        .modal-overlay.active { display: flex;
        }
        .modal-content { background: var(--bg-panel); padding: 24px; border-radius: 12px; width: 100%; max-width: 360px;
            border: 1px solid var(--border-color); box-shadow: 0 8px 30px rgba(0,0,0,0.5); margin: auto; color: var(--text-main);
        }
        .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color); color: var(--accent); display: flex; justify-content: space-between; align-items: center;
        }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer;
            outline: none; }
        .modal-close:hover { color: var(--text-main);
        }
        
        .account-property { margin-bottom: 14px;
            font-size: 14px; color: var(--text-muted); }
        .account-property label { display: block; color: var(--text-muted);
            margin-bottom: 5px; font-size: 12px; font-weight: 600; }
        .profile-name-input, .profile-desc-input { width: 100%;
            padding: 10px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; outline: none; font-size: 14px; margin-top: 4px;
        }
        .profile-desc-input { resize: none; height: 65px;
        }
        .profile-name-input:disabled, .profile-desc-input:disabled { background: rgba(128,128,128,0.1); color: var(--text-muted); cursor: not-allowed;
        }

        .profile-avatar-container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        .modal-avatar { width: 85px; height: 85px; border: 2px solid var(--accent);
        }
        .modal-avatar-placeholder { width: 85px; height: 85px; color: white; display: flex; align-items: center;

    function getVisibleName(username) { 
        const uData = localProfiles[username];
        if (uData && uData.displayName && uData.displayName.trim() !== '') return uData.displayName.trim(); 
        return username;
    }

    function getAvatarHTML(username, cssClass = 'avatar') { 
        const uData = localProfiles[username];
        if (uData && uData.avatar && uData.avatar.startsWith('data:image')) { 
            return `<img src="${uData.avatar}" class="${cssClass}" id="av-node-${username}" alt="">`;
        } 
        const visibleName = getVisibleName(username);
        const firstLetter = visibleName ?
            visibleName.charAt(0) : '?'; 
        const placeholderClass = cssClass === 'avatar' ? 'avatar-placeholder' : 'modal-avatar-placeholder';
        const colors = ['#0088cc', '#4cd964', '#ff3b30', '#ffcc00', '#5856d6', '#ff2d55', '#af52de']; 
        let charCodeSum = 0;
        for (let i = 0; i < username.length; i++) charCodeSum += username.charCodeAt(i); 
        const pickedColor = colors[charCodeSum % colors.length];
        return `<div class="${placeholderClass}" id="av-node-${username}" style="background-color: ${pickedColor}">${firstLetter}</div>`; 
    }

    function renderChatsList() { 
        chatsList.innerHTML = '';

            return; 
        } 
        
        const sortedChats = [...activeChats].sort((a, b) => {
            const pinA = chatSettings[a]?.pinned ? 1 : 0;
            const pinB = chatSettings[b]?.pinned ? 1 : 0;
            return pinB - pinA;
        });
        sortedChats.forEach(user => { 
            const isOnline = onlineUsers.includes(user); 
            const statusText = isOnline ? translations[currentLang].chatStatusOnline : translations[currentLang].chatStatusOffline; 
            const prefs = chatSettings[user] || {};
            const activeClass = (currentActiveChatPartner === user) ? 'active' : ''; 
            const glowClass = glowingChats[user] ? 'glow-active' : '';
            const blockedClass = prefs.blocked ? 'blocked' : '';

            const item = document.createElement('div'); 
            item.className = `chat-item ${activeClass} ${glowClass} ${blockedClass}`; 
            
            let flagsHtml = '';
            if (prefs.pinned) flagsHtml += '📌';
            if (prefs.muted) flagsHtml += '🔇';
            if (prefs.blocked) flagsHtml += '🚫';

            item.innerHTML = `
                <div class="chat-info-block">
                    ${getAvatarHTML(user)}
                    <div>
                        <div style="font-weight:600; font-size:14px;">${escapeHTML(getVisibleName(user))}</div>
                        <div id="bio-${user}" style="font-size:12px; color:var(--text-muted);">${escapeHTML(localProfiles[user]?.bio || '')}</div>
                    </div>
                </div>
                <div class="chat-flags">${flagsHtml}</div>
                <div class="status-dot ${isOnline ? 'online' : ''}">${statusText}</div>
            `;
            
            item.oncontextmenu = (e) => { 
                e.preventDefault();
                showContextMenu(e, [
                    { text: prefs.pinned ? "Відкріпити чат" : "📌 Закріпити чат", action: () => toggleChatPref(user, 'pinned') },
                    { text: prefs.muted ? "Увімкнути звук" : "🔇 Вимкнути звук", action: () => toggleChatPref(user, 'muted') },
                    { text: prefs.blocked ? "Розблокувати" : "🚫 Заблокувати", action: () => toggleChatPref(user, 'blocked') },
                    { text: translations[currentLang].ctxDeleteMy, class: 'delete-btn', action: () => { deleteChatLocally(user); } }
                ]); 
            };
            item.onclick = () => { 
                if (glowingChats[user]) { delete glowingChats[user]; localStorage.setItem('burmalda_glow_chats', JSON.stringify(glowingChats)); }
                openChatWith(user); 
            };
            chatsList.appendChild(item);
        }); 
    }

    function toggleChatPref(user, prefKey) {
        if (!chatSettings[user]) chatSettings[user] = { pinned: false, muted: false, blocked: false };
        chatSettings[user][prefKey] = !chatSettings[user][prefKey];
        localStorage.setItem('burmalda_chat_settings', JSON.stringify(chatSettings));
        
        if (prefKey === 'blocked' && chatSettings[user].blocked && currentActiveChatPartner === user) {
            input.disabled = true;
            input.placeholder = "Користувач заблокований"; button.disabled = true;
        } else if (prefKey === 'blocked' && !chatSettings[user].blocked && currentActiveChatPartner === user) {
            input.disabled = false;

        document.getElementById('chat-options-menu').style.display = 'none';

    function renderPinnedBar() {
        if (!currentRoom) return;
        if (!Array.isArray(pinnedMessages[currentRoom])) {
            pinnedMessages[currentRoom] = pinnedMessages[currentRoom] ?
            [pinnedMessages[currentRoom]] : [];
        }
        const pins = pinnedMessages[currentRoom];
        if (pins && pins.length > 0) {
            if (currentPinIndex >= pins.length) currentPinIndex = 0;
            const currentPin = pins[currentPinIndex];
            pinCounterBadge.textContent = `${currentPinIndex + 1}/${pins.length}`;
            pinnedBarTextContent.innerHTML = escapeHTML(currentPin.text);
            pinnedMessageBar.style.display = 'flex';

        }

    function cyclePinnedMessages() {
        const pins = pinnedMessages[currentRoom] || [];
        if (pins.length > 1) { currentPinIndex = (currentPinIndex + 1) % pins.length; renderPinnedBar();
        }

    function pinMessage(msgId, text) {
        if (!Array.isArray(pinnedMessages[currentRoom])) pinnedMessages[currentRoom] = [];
        if (!pinnedMessages[currentRoom].some(p => p.id === msgId)) {
            pinnedMessages[currentRoom].push({ id: msgId, text: text });
            localStorage.setItem('burmalda_pinned_data', JSON.stringify(pinnedMessages));
            socket.emit('pin_message', { room: currentRoom, action: 'add', pinData: { id: msgId, text: text } });
            currentPinIndex = pinnedMessages[currentRoom].length - 1;
            renderPinnedBar();
        }
    }

    function requestUnpin(e) {
        e.stopPropagation();
        const pins = pinnedMessages[currentRoom] || [];
        if (pins.length > 0) {
            const removed = pins[currentPinIndex];
            pinnedMessages[currentRoom].splice(currentPinIndex, 1);
            if (currentPinIndex >= pinnedMessages[currentRoom].length) currentPinIndex = 0;
            localStorage.setItem('burmalda_pinned_data', JSON.stringify(pinnedMessages));
            socket.emit('pin_message', { room: currentRoom, action: 'remove', pinData: removed });
            renderPinnedBar();
        }
    }

    function sendSpecialMessage(dataStr, type) {

        savedMessages[currentRoom].push(msgPayload);

    // ЗАПИС АУДІО / ВІДЕО КРУЖОЧКІВ З НОВИМ UI
    let mediaRecorder = null;
    let recordedChunks = [];
    let currentRecordType = null;
    let recordTimerInterval;
    let recordSeconds = 0;
    
    async function startMediaRecording(type) {
        try {
            const constraints = type === 'video_circle' ?
            { video: { facingMode: "user" }, audio: true } : { audio: true };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('form').style.display = 'none';
            const overlay = document.getElementById('record-overlay');
            overlay.style.display = 'flex';
            const preview = document.getElementById('record-preview');
            if (type === 'video_circle') {
                preview.style.display = 'block';
                preview.srcObject = stream;
            } else {
                preview.style.display = 'none';
            }
            preview.classList.add('recording');

            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];
            currentRecordType = type;
            recordSeconds = 0;
            document.getElementById('record-timer').textContent = '00:00';
            
            recordTimerInterval = setInterval(() => {
                recordSeconds++;
                const m = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
                const s = String(recordSeconds % 60).padStart(2, '0');
                document.getElementById('record-timer').textContent = `${m}:${s}`;
            }, 1000);

            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                clearInterval(recordTimerInterval);
                stream.getTracks().forEach(t => t.stop());
                preview.srcObject = null;
                preview.classList.remove('recording');
                
                if (!window.cancelCurrentRecord) {
                    const mimeType = type === 'video_circle' ?
                    'video/webm' : 'audio/webm';
                    const blob = new Blob(recordedChunks, { type: mimeType });
                    const reader = new FileReader();
                    reader.onloadend = () => { sendSpecialMessage(reader.result, type); };
                    reader.readAsDataURL(blob);
                }
                window.cancelCurrentRecord = false;
                closeRecordUI();
            };
            mediaRecorder.start();
        } catch(e) {
            alert('Помилка доступу до камери/мікрофона');
            console.error(e);
            closeRecordUI();
        }
    }

    function pauseResumeRecord() {
        if (!mediaRecorder) return;
        const btn = document.getElementById('btn-pause-record');
        const preview = document.getElementById('record-preview');
        
        if (mediaRecorder.state === 'recording') {
            mediaRecorder.pause();
            clearInterval(recordTimerInterval);
            btn.textContent = '▶';
            preview.classList.remove('recording');
        } else if (mediaRecorder.state === 'paused') {
            mediaRecorder.resume();
            recordTimerInterval = setInterval(() => {
                recordSeconds++;
                const m = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
                const s = String(recordSeconds % 60).padStart(2, '0');
                document.getElementById('record-timer').textContent = `${m}:${s}`;
            }, 1000);
            btn.textContent = '⏸';
            preview.classList.add('recording');
        }
    }

    function deleteRecord() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            window.cancelCurrentRecord = true;
            mediaRecorder.stop();
        } else {
            closeRecordUI();
        }
    }

    function finishAndSendRecord() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
    }

    function closeRecordUI() {
        clearInterval(recordTimerInterval);
        document.getElementById('record-overlay').style.display = 'none';
        document.getElementById('form').style.display = 'flex';
        currentRecordType = null;
    }

    function appendSingleMessage(msg, isHistoryBuild = false) { 
        if (!isHistoryBuild) {
            const msgDate = formatDateDivider(msg.timestamp);
            const dividers = document.querySelectorAll('.date-divider');
            const lastDateText = dividers.length > 0 ? dividers[dividers.length - 1].textContent : null;
            if (msgDate !== lastDateText) {
                const div = document.createElement('div');
                div.className = 'date-divider'; div.textContent = msgDate;
                messagesContainer.appendChild(div);
            }
        }

        const liWrapper = document.createElement('div');
        liWrapper.className = `msg-container ${msg.from === myNick ? 'my-wrapper' : ''}`; liWrapper.id = `msg-item-${msg.id}`;

        const li = document.createElement('li');
        if (msg.from === myNick) li.className = 'my-msg'; 

        if (['image', 'sticker', 'audio', 'video_circle'].includes(msg.type)) {
            li.classList.add('msg-transparent');
        }

        if (msg.replyTo) {
            const originalMsg = savedMessages[currentRoom]?.find(m => m.id === msg.replyTo);
            const quoteDiv = document.createElement('div'); quoteDiv.className = 'reply-quote';
            let quoteText = originalMsg ? escapeHTML(originalMsg.text) : 'Повідомлення видалено';
            if (originalMsg) {
                if (originalMsg.type === 'image') quoteText = '📷 Фотографія';
                if (originalMsg.type === 'sticker') quoteText = '🦄 Стікер';
                if (originalMsg.type === 'audio') quoteText = '🎤 Аудіо';
                if (originalMsg.type === 'video_circle') quoteText = '🔵 Відео';
            }
            quoteDiv.innerHTML = quoteText;
            quoteDiv.onclick = (e) => { e.stopPropagation(); const targetNode = document.getElementById(`msg-item-${msg.replyTo}`); if (targetNode) targetNode.scrollIntoView({ behavior: 'smooth', block: 'center' }); };
            li.appendChild(quoteDiv);
        }

        if (msg.type === 'image') {
            const mediaWrapper = document.createElement('div');
            mediaWrapper.className = 'chat-media-wrapper'; mediaWrapper.style.padding = '4px';
            const placeholder = document.createElement('div'); placeholder.style.padding = '14px 20px'; placeholder.style.background = 'rgba(0,0,0,0.3)'; placeholder.style.borderRadius = '10px';
            placeholder.style.textAlign = 'center'; placeholder.style.cursor = 'pointer'; placeholder.style.border = '1px dashed rgba(255,255,255,0.2)';
            placeholder.innerHTML = '🖼️ <b>Відкрити медіафайл</b>';
            placeholder.onclick = (e) => { e.stopPropagation(); placeholder.style.display = 'none'; const img = document.createElement('img'); img.src = msg.text; img.className = 'chat-media-img'; mediaWrapper.appendChild(img);
            };
            mediaWrapper.appendChild(placeholder); li.appendChild(mediaWrapper);
        } else if (msg.type === 'sticker') {
            const img = document.createElement('img');
            img.src = msg.text; img.className = 'sticker-img'; li.appendChild(img);
        } else if (msg.type === 'audio') {
            const audio = document.createElement('audio');
            audio.controls = true; audio.src = msg.text; audio.className = 'audio-msg'; li.appendChild(audio);
        } else if (msg.type === 'video_circle') {
            const video = document.createElement('video');
            video.src = msg.text; video.autoplay = true; video.loop = true; video.muted = true; video.className = 'circle-video';
            video.onclick = (e) => { 
                e.stopPropagation();
                if (video.paused) { video.play(); video.muted = false; } 
                else { video.pause();
                video.muted = true; } 
            }; 
            li.appendChild(video);
        } else {
            const textNode = document.createElement('span');
            textNode.innerHTML = escapeHTML(msg.text) + (msg.edited ? ' <small style="opacity:0.6; font-size:10px; margin-left:4px;">(змінено)</small>' : '');
            li.appendChild(textNode);
        }

        const metaLine = document.createElement('div'); metaLine.className = 'msg-meta-line';
        const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); 
        
        let checkmarksHtml = '';
        if (msg.from === myNick) {
            const isRead = msg.status === 'read';
            const checkmarks = isRead ? '✓✓' : '✓';
            checkmarksHtml = `<span class="msg-status ${isRead ? 'read' : ''}" id="status-${msg.id}">${checkmarks}</span>`;
        }

        metaLine.innerHTML = `<span class="msg-time">${timeStr}</span> ${checkmarksHtml}`; li.appendChild(metaLine); 

        const reactionsHolder = document.createElement('div');
        reactionsHolder.className = 'reactions-holder'; li.appendChild(reactionsHolder);
        const picker = document.createElement('div'); picker.className = 'reaction-picker';
        ALL_EMOJIS.slice(0, 10).forEach(em => {
            const emSpan = document.createElement('span'); emSpan.textContent = em;
            emSpan.onclick = (e) => { e.stopPropagation(); toggleMessageReaction(msg.id, em); picker.style.display = 'none'; }; picker.appendChild(emSpan);
        });
        liWrapper.appendChild(picker);

        li.onclick = (e) => { e.stopPropagation(); document.querySelectorAll('.reaction-picker').forEach(p => { if(p !== picker) p.style.display = 'none'; });
            picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex'; };
        li.oncontextmenu = (e) => { 
            e.preventDefault();
            picker.style.display = 'none';
            let summary = msg.text;
            if (msg.type === 'image') summary = '📷 Фотографія';
            if (msg.type === 'sticker') summary = '🦄 Стікер';
            if (msg.type === 'audio') summary = '🎤 Аудіо';
            if (msg.type === 'video_circle') summary = '🔵 Відео';

            const menuOptions = [ { text: translations[currentLang].ctxReply, action: () => { setReplyTarget(msg.id, summary);
            } }, { text: translations[currentLang].ctxPin, action: () => { pinMessage(msg.id, summary); } } ];
            if (msg.from === myNick) {
                if (msg.type === 'text') menuOptions.push({ text: translations[currentLang].ctxEdit, action: () => { setEditTarget(msg.id, msg.text); } });
                menuOptions.push({ text: translations[currentLang].ctxDeleteMy, class: 'delete-btn', action: () => { requestSmartDeleteMessage(msg.id); } });
            }
            showContextMenu(e, menuOptions);
        }; 

        liWrapper.appendChild(li); messagesContainer.appendChild(liWrapper); renderReactionsUI(msg.id, msg.reactions, reactionsHolder);
    }

    function toggleMessageReaction(msgId, reaction) {
        const chatMsgs = savedMessages[currentRoom] || []; 
        const msg = chatMsgs.find(m => m.id === msgId); 
        if (!msg) return;
        
        if (!msg.reactions) msg.reactions = {};
        if (!msg.reactions[reaction]) msg.reactions[reaction] = [];
        
        const idx = msg.reactions[reaction].indexOf(myNick);
        if (idx > -1) {
            msg.reactions[reaction].splice(idx, 1);
            if (msg.reactions[reaction].length === 0) delete msg.reactions[reaction];
        } else {
            msg.reactions[reaction].push(myNick);
        }
        
        safeSaveHistory();
        socket.emit('message_reaction', { room: currentRoom, msgId: msgId, reactions: msg.reactions });
        
        const container = document.querySelector(`#msg-item-${msgId} .reactions-holder`);
        if(container) {
            container.innerHTML = '';
            renderReactionsUI(msgId, msg.reactions, container);
        }
    }

    function renderReactionsUI(msgId, reactions, container) {
        if (!reactions || !container) return;
        Object.keys(reactions).forEach(r => {
            if (reactions[r].length > 0) {
                const chip = document.createElement('div');
                chip.className = `reaction-chip ${reactions[r].includes(myNick) ? 'active-my' : ''}`;
                chip.textContent = `${r} ${reactions[r].length}`;
                chip.onclick = (e) => { e.stopPropagation(); toggleMessageReaction(msgId, r); };
                container.appendChild(chip);
            }
        });
    }

    function requestSmartDeleteMessage(msgId) {
        if (confirm("Видалити повідомлення?")) {
            socket.emit('delete_message', { room: currentRoom, msgId: msgId });
            if (savedMessages[currentRoom]) {
                savedMessages[currentRoom] = savedMessages[currentRoom].filter(m => m.id !== msgId);
                safeSaveHistory();
            }
            const el = document.getElementById(`msg-item-${msgId}`);
            if (el) el.remove();
        }
    }

    function showContextMenu(e, options) {
        e.preventDefault();
        contextMenu.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.textContent = opt.text;
            if (opt.class) btn.className = opt.class;
            btn.onclick = () => { opt.action(); contextMenu.style.display = 'none'; };
            contextMenu.appendChild(btn);
        });
        contextMenu.style.display = 'block';
        
        const rect = contextMenu.getBoundingClientRect();
        let x = e.pageX;
        let y = e.pageY;
        if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 10;
        if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 10;
        
        contextMenu.style.left = x + 'px';
        contextMenu.style.top = y + 'px';
    }

    document.addEventListener('click', (e) => { 
        if (contextMenu.style.display === 'block' && !contextMenu.contains(e.target)) {
            contextMenu.style.display = 'none'; 
        }
    });

    // ==========================================
    // === WEBRTC: ЛОГІКА АУДІО/ВІДЕО ДЗВІНКІВ ===
    // ==========================================
    
    let peerConnection;
    let localStream;
    let remoteStream;
    let isAudioOnlyCall = false;
    let rtcConfig = null;

    // Отримуємо конфіг TURN/STUN від сервера
    socket.on('rtc_config', (config) => {
        rtcConfig = config;
    });

    socket.on('webrtc_signal', async (data) => {
        if (data.type === 'offer') {
            document.getElementById('call-modal').classList.add('active');
            document.getElementById('call-status-text').textContent = `Вхідний дзвінок від ${getVisibleName(data.sender)}...`;
            document.getElementById('call-avatar').innerHTML = getAvatarHTML(data.sender, 'modal-avatar-placeholder');
            document.getElementById('call-avatar').style.display = 'block';
            document.getElementById('call-video-container').style.display = 'none';
            
            const acceptBtn = document.getElementById('btn-accept-call');
            acceptBtn.style.display = 'block';
            acceptBtn.onclick = () => acceptCall(data.offer, data.sender, data.isAudioOnly);
            
            startRingtone();
        } else if (data.type === 'answer') {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        } else if (data.type === 'ice-candidate') {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) { 
                    console.error('Помилка додавання ICE кандидата:', e); 
                }
            }
        } else if (data.type === 'end_call') {
            endCall(false);
        }
    });

    async function startCall(isVideo) {
        if (!currentActiveChatPartner) return;
        isAudioOnlyCall = !isVideo;
        
        document.getElementById('call-modal').classList.add('active');
        document.getElementById('call-status-text').textContent = 'Виклик...';
        document.getElementById('call-avatar').style.display = 'none';
        document.getElementById('call-video-container').style.display = 'flex';
        document.getElementById('btn-accept-call').style.display = 'none';
        
        const mediaReady = await setupMedia(isVideo);
        if (!mediaReady) {
            endCall(false);
            return;
        }
        
        createPeerConnection(currentActiveChatPartner);

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        socket.emit('webrtc_signal', {
            target: currentActiveChatPartner,
            type: 'offer',
            offer: offer,
            isAudioOnly: isAudioOnlyCall
        });
    }

    async function acceptCall(offer, caller, isAudio) {
        stopRingtone();
        isAudioOnlyCall = isAudio;
        
        document.getElementById('btn-accept-call').style.display = 'none';
        document.getElementById('call-avatar').style.display = 'none';
        document.getElementById('call-status-text').textContent = 'З\'єднання...';
        document.getElementById('call-video-container').style.display = 'flex';

        const mediaReady = await setupMedia(!isAudio);
        if (!mediaReady) {
            endCall(true);
            return;
        }

        createPeerConnection(caller);

        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        socket.emit('webrtc_signal', {
            target: caller,
            type: 'answer',
            answer: answer
        });
    }

    async function setupMedia(isVideo) {
        try {
            // Оптимізація потоку для слабких пристроїв і фонових завдань
            const constraints = { 
                audio: true, 
                video: isVideo ? { width: { ideal: 640 }, frameRate: { ideal: 24 } } : false 
            };
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            const localVideoEl = document.getElementById('local-video');
            localVideoEl.srcObject = localStream;
            localVideoEl.style.display = isVideo ? 'block' : 'none';
            
            document.getElementById('toggle-mic-btn').style.display = 'block';
            if (isVideo) {
                document.getElementById('toggle-cam-btn').style.display = 'block';
            } else {
                document.getElementById('toggle-cam-btn').style.display = 'none';
            }
            return true;
        } catch (e) {
            console.error("Помилка доступу до медіа:", e);
            alert("Помилка доступу до камери або мікрофона!");
            return false;
        }
    }

    function createPeerConnection(targetUser) {
        const config = rtcConfig || { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        peerConnection = new RTCPeerConnection(config);
        
        remoteStream = new MediaStream();
        document.getElementById('remote-video').srcObject = remoteStream;

        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = event => {
            event.streams[0].getTracks().forEach(track => {
                remoteStream.addTrack(track);
            });
        };

        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                socket.emit('webrtc_signal', {
                    target: targetUser,
                    type: 'ice-candidate',
                    candidate: event.candidate
                });
            }
        };

        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === 'connected') {
                document.getElementById('call-status-text').textContent = 'Розмова';
            } else if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                endCall(false);
            }
        };
    }

    function endCall(emitSignal = true) {
        stopRingtone();
        
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        document.getElementById('call-modal').classList.remove('active');
        document.getElementById('call-avatar').style.display = 'block';
        document.getElementById('call-video-container').style.display = 'none';
        document.getElementById('toggle-mic-btn').style.display = 'none';
        document.getElementById('toggle-cam-btn').style.display = 'none';
        document.getElementById('btn-accept-call').style.display = 'none';
        
        if (emitSignal && currentActiveChatPartner) {
            socket.emit('webrtc_signal', {
                target: currentActiveChatPartner,
                type: 'end_call'
            });
        }
    }

    function toggleCallMic() {
        if (localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                const btn = document.getElementById('toggle-mic-btn');
                btn.textContent = audioTrack.enabled ? '🎤 Мікр: Увімк' : '🔇 Мікр: Вимк';
                btn.classList.toggle('active-control', !audioTrack.enabled);
            }
        }
    }

    function toggleCallCam() {
        if (localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                const btn = document.getElementById('toggle-cam-btn');
                btn.textContent = videoTrack.enabled ? '📷 Камера: Увімк' : '🚫 Камера: Вимк';
                btn.classList.toggle('active-control', !videoTrack.enabled);
            }
        }
    }
</script>
