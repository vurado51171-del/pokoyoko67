<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Burmalda Messenger</title>
    <style>
        :root { --vh: 100vh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; display: flex; height: var(--vh); overflow: hidden; position: fixed; width: 100%; }
        
        /* Сайдбар */
        #sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 15px; background: #262626; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .header-controls { display: flex; gap: 8px; align-items: center; }
        .btn-icon { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; padding: 5px; }
        .btn-icon:hover { color: #fff; }

        /* Поиск и контент */
        .search-container { padding: 10px 15px; background: #2d2d2d; display: none; }
        .search-container.active { display: block; }
        .search-container input { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 5px; outline: none; }
        
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #141414; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        #messages li { padding: 10px 14px; background: #262626; margin-bottom: 8px; border-radius: 8px; max-width: 80%; width: fit-content; word-break: break-word; }
        #messages li.my-msg { background: #007bff; align-self: flex-end; }
        
        #form { padding: 10px; background: #1e1e1e; display: flex; border-top: 1px solid #2d2d2d; flex-shrink: 0; }
        #input { flex-grow: 1; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; font-size: 16px; outline: none; }
        #button { padding: 10px 20px; margin-left: 8px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }

        /* Модалка настроек */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 90%; max-width: 350px; }
    </style>
</head>
<body id="main-body" style="display: none;">

<div id="sidebar">
    <div class="sidebar-header">
        <div id="my-profile-name" style="font-weight:bold; color:#007bff;">Загрузка...</div>
        <div class="header-controls">
            <button class="btn-icon" id="search-toggle-btn">🔍</button>
            <button class="btn-icon" id="settings-toggle-btn">⚙️</button>
        </div>
    </div>
    <div class="search-container" id="search-frame">
        <input type="text" id="search-input" placeholder="Введите имя...">
    </div>
    <div id="chats-list" style="flex-grow:1; overflow-y:auto;"></div>
</div>

<div id="chat-main">
    <div id="chat-area" style="display:none; flex-direction:column; height:100%;">
        <div id="chat-header" style="padding:15px; border-bottom:1px solid #333; font-weight:bold;">Чат</div>
        <ul id="messages"></ul>
        <div id="form">
            <input id="input" autocomplete="off" placeholder="Сообщение..." />
            <button id="button">OK</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <h3>⚙️ Настройки</h3>
        <button onclick="window.location.href='/'" style="width:100%; padding:10px; background:#dc3545; border:none; color:white; border-radius:5px;">Выйти 🚪</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // Оптимизация высоты для Android
    function setVH() { document.documentElement.style.setProperty('--vh', `${window.innerHeight}px`); }
    window.addEventListener('resize', setVH);
    setVH();

    // Логика кнопок
    document.getElementById('search-toggle-btn').onclick = () => document.getElementById('search-frame').classList.toggle('active');
    document.getElementById('settings-toggle-btn').onclick = () => document.getElementById('settings-modal').classList.add('active');
    document.getElementById('settings-modal').onclick = (e) => { if(e.target.id === 'settings-modal') e.target.classList.remove('active'); };

    // ... (Остальная ваша логика сокетов из предыдущего сообщения)
    // Функция displaySingleMessage с защитой:
    function displaySingleMessage(data) {
        if (!data) return;
        const li = document.createElement('li');
        if (data.user === myNick) li.classList.add('my-msg');
        li.innerHTML = `<strong>${data.user || 'Гость'}:</strong> ${data.text || ''}`;
        const messages = document.getElementById('messages');
        messages.appendChild(li);
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
