<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="t-title">Burmalda Messenger - Чат</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0d16;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- КЛАССИЧЕСКАЯ ШАПКА ХЕДЕРА --- */
        .header {
            background: #16192b;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #252943;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4facfe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.4);
            object-fit: cover;
        }

        .user-info h3 { margin: 0; font-size: 16px; color: #fff; }
        .user-info span { font-size: 12px; color: #00f2fe; }

        .logout-btn {
            background: #ff4a4a;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .logout-btn:hover { background: #e03e3e; }

        /* --- ОБЛАСТЬ СООБЩЕНИЙ --- */
        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0b0d16;
        }

        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.incoming {
            background: #1c2038;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2f52;
        }

        .msg.outgoing {
            background: linear-gradient(135deg, #1d78c2 0%, #00f2fe 100%);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.2);
        }

        .msg-sender {
            color: #00f2fe;
            cursor: pointer;
        }
        .msg.outgoing .msg-sender {
            color: #ffffff;
        }

        .msg-meta {
            font-size: 10px;
            margin-top: 5px;
            display: block;
            text-align: right;
            opacity: 0.6;
        }

        /* --- ПАНЕЛЬ ВВОДА --- */
        .input-panel {
            background: #16192b;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #252943;
        }

        .input-panel input {
            flex: 1;
            background: #20243e;
            border: 1px solid #2d335c;
            padding: 14px;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-panel input:focus { border-color: #00f2fe; }

        .send-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .send-btn:active { transform: scale(0.95); }

        /* --- НАШЕ СТАНДАРТНОЕ МОДАЛЬНОЕ ОКНО ПРОФИЛЯ --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .profile-card {
            background: #16192b;
            border: 1px solid #252943;
            border-radius: 10px; /* Твой стандартный радиус */
            width: 90%;
            max-width: 320px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .profile-card .large-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #4facfe;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.4);
            object-fit: cover;
        }

        .profile-card h2 { margin: 0 0 5px 0; font-size: 20px; color: #fff; }
        .profile-card .prof-username { font-size: 14px; color: #00f2fe; margin-bottom: 5px; }
        .profile-card .prof-regdate { font-size: 11px; color: #858aa0; margin-bottom: 15px; }

        .profile-card .bio-box {
            background: #20243e;
            border: 1px solid #2d335c;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #b3b9d1;
            text-align: left;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        /* Твой классический стиль для всех стандартных кнопок */
        .classic-btn {
            background: #20243e;
            border: 1px solid #2d335c;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .classic-btn:hover { background: #2d335c; border-color: #00f2fe; }

        /* --- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ --- */
        .lang-container {
            display: flex;
            justify-content: center;
            background: #0b0d16;
            padding: 10px 0;
            border-top: 1px solid #16192b;
        }

        .lang-switch {
            display: flex;
            gap: 5px;
            background: #16192b;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid #252943;
        }
        
        .lang-btn {
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            color: #858aa0;
            padding: 5px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .lang-btn.active {
            background: #20243e;
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #4a4f73;
            padding: 5px;
            background: #0b0d16;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-user" onclick="openProfile(myNickname)">
            <img id="user-avatar-img" class="user-avatar" src="" alt="" style="display:none;">
            <div id="user-avatar-letter" class="user-avatar">U</div>
            
            <div class="user-info">
                <h3 id="user-display-name">Username</h3>
                <span id="t-status">онлайн</span>
            </div>
        </div>
        <button class="logout-btn" id="t-logout" onclick="logout()">Выйти</button>
    </div>

    <div class="modal-overlay" id="profile-modal" onclick="closeProfileViaOverlay(event)">
        <div class="profile-card">
            <img id="modal-avatar-img" class="large-avatar" src="" alt="" style="display:none;">
            <div id="modal-avatar-letter" class="large-avatar">U</div>

            <h2 id="modal-name">Username</h2>
            <div class="prof-username" id="modal-user-tag">@username</div>
            <div class="prof-regdate" id="modal-regdate">Регистрация: --.--.----</div>
            
            <input type="file" id="avatar-input" accept="image/*" style="display: none;" onchange="uploadAvatar(event)">
            <button class="classic-btn" id="t-upload-btn" onclick="document.getElementById('avatar-input').click()">
                📁 Загрузить из устройства
            </button>
            
            <div class="bio-box" id="modal-bio">Пользователь Burmalda Messenger.</div>

            <button class="classic-btn" id="t-close-prof" onclick="closeProfile()" style="margin-bottom: 0;">Закрыть</button>
        </div>
    </div>

    <div class="chat-area" id="chat-box"></div>

    <div class="input-panel">
        <input type="text" id="msg-input" placeholder="Напишите сообщение..." autocomplete="off">
        <button class="send-btn" id="t-send" onclick="sendMessage()">Отправить</button>
    </div>

    <div class="lang-container">
        <div class="lang-switch">
            <div class="lang-btn" onclick="setLang('uk')" id="btn-uk">UK</div>
            <div class="lang-btn active" onclick="setLang('ru')" id="btn-ru">RU</div>
            <div class="lang-btn" onclick="setLang('en')" id="btn-en">EN</div>
        </div>
    </div>

    <div class="footer-text">остап пушка дєвки ловушка</div>

    <script>
        const i18n = {
            ru: {
                title: "Burmalda Messenger - Чат",
                status: "онлайн",
                logout: "Выйти",
                placeholder: "Напишите сообщение...",
                send: "Отправить",
                closeProf: "Закрыть",
                uploadBtn: "📁 Загрузить из устройства",
                regDate: "Регистрация: ",
                defaultBio: "Пользователь Burmalda Messenger. Статус не установлен."
            },
            uk: {
                title: "Burmalda Messenger - Чат",
                status: "онлайн",
                logout: "Вийти",
                placeholder: "Напішіть повідомлення...",
                send: "Надіслати",
                closeProf: "Закрити",
                uploadBtn: "📁 Завантажити з пристрою",
                regDate: "Реєстрація: ",
                defaultBio: "Користувач Burmalda Messenger. Статус не встановлено."
            },
            en: {
                title: "Burmalda Messenger - Chat",
                status: "online",
                logout: "Logout",
                placeholder: "Type a message...",
                send: "Send",
                closeProf: "Close",
                uploadBtn: "📁 Upload from device",
                regDate: "Registered: ",
                defaultBio: "Burmalda Messenger user. Status is not set."
            }
        };

        let currentLang = 'ru';
        let myNickname = "User";

        function initChat() {
            if (localStorage.getItem('chat_logged_in') !== 'true') {
                window.location.href = '/';
                return;
            }

            myNickname = localStorage.getItem('burmalda_my_nick') || "User";
            document.getElementById('user-display-name').innerText = myNickname;

            if (!localStorage.getItem(`regdate_${myNickname}`)) {
                const today = new Date().toLocaleDateString();
                localStorage.setItem(`regdate_${myNickname}`, today);
            }

            renderAvatar();

            const savedLang = localStorage.getItem('burmalda_lang') || 'ru';
            setLang(savedLang);

            // Фейковые сообщения для демонстрации
            appendMessage("Burmalda System", "Добро пожаловать в чат!", "incoming");
            appendMessage("Gamer2026", "Привет! Нажми на мой ник, чтобы увидеть профиль.", "incoming");
            
            if (!localStorage.getItem("regdate_Gamer2026")) {
                localStorage.setItem("regdate_Gamer2026", "12.02.2026");
                localStorage.setItem("bio_Gamer2026", "Настраиваю сервера и люблю олдскульный софт. 🛠️");
            }
        }

        function renderAvatar() {
            const savedAvatar = localStorage.getItem(`avatar_${myNickname}`);
            const headerImg = document.getElementById('user-avatar-img');
            const headerLetter = document.getElementById('user-avatar-letter');

            if (savedAvatar) {
                headerImg.src = savedAvatar;
                headerImg.style.display = 'block';
                headerLetter.style.display = 'none';
            } else {
                headerLetter.innerText = myNickname.charAt(0).toUpperCase();
                headerImg.style.display = 'none';
                headerLetter.style.display = 'flex';
            }
        }

        function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                localStorage.setItem(`avatar_${myNickname}`, base64Image);
                renderAvatar();
                openProfile(myNickname);
            };
            reader.readAsDataURL(file);
        }

        function openProfile(username) {
            document.getElementById('modal-name').innerText = username;
            document.getElementById('modal-user-tag').innerText = '@' + username.toLowerCase();
            
            const regDate = localStorage.getItem(`regdate_${username}`) || new Date().toLocaleDateString();
            document.getElementById('modal-regdate').innerText = i18n[currentLang].regDate + regDate;

            const userBio = localStorage.getItem(`bio_${username}`) || i18n[currentLang].defaultBio;
            document.getElementById('modal-bio').innerText = userBio;

            const modalImg = document.getElementById('modal-avatar-img');
            const modalLetter = document.getElementById('modal-avatar-letter');
            const targetAvatar = localStorage.getItem(`avatar_${username}`);

            if (targetAvatar) {
                modalImg.src = targetAvatar;
                modalImg.style.display = 'block';
                modalLetter.style.display = 'none';
            } else {
                modalLetter.innerText = username.charAt(0).toUpperCase();
                modalImg.style.display = 'none';
                modalLetter.style.display = 'flex';
            }

            const uploadBtn = document.getElementById('t-upload-btn');
            if (username === myNickname) {
                uploadBtn.style.display = 'block';
            } else {
                uploadBtn.style.display = 'none';
            }

            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        function closeProfileViaOverlay(e) {
            if (e.target.id === 'profile-modal') closeProfile();
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('burmalda_lang', lang);

            document.getElementById('btn-uk').classList.remove('active');
            document.getElementById('btn-ru').classList.remove('active');
            document.getElementById('btn-en').classList.remove('active');
            document.getElementById(`btn-${lang}`).classList.add('active');

            document.getElementById('t-title').innerText = i18n[lang].title;
            document.getElementById('t-status').innerText = i18n[lang].status;
            document.getElementById('t-logout').innerText = i18n[lang].logout;
            document.getElementById('msg-input').placeholder = i18n[lang].placeholder;
            document.getElementById('t-send').innerText = i18n[lang].send;
            document.getElementById('t-close-prof').innerText = i18n[lang].closeProf;
            document.getElementById('t-upload-btn').innerText = i18n[lang].uploadBtn;
            
            const openName = document.getElementById('modal-name').innerText;
            if(document.getElementById('profile-modal').style.display === 'flex') {
                const regDate = localStorage.getItem(`regdate_${openName}`) || new Date().toLocaleDateString();
                document.getElementById('modal-regdate').innerText = i18n[lang].regDate + regDate;
            }
        }

        function appendMessage(sender, text, type) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', type);
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            msgDiv.innerHTML = `
                <strong class="msg-sender" onclick="openProfile('${sender}')">${sender}</strong>: ${text}
                <span class="msg-meta">${time}</span>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(myNickname, text, 'outgoing');
            input.value = '';
        }

        document.getElementById('msg-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function logout() {
            localStorage.removeItem('chat_logged_in');
            window.location.href = '/';
        }

        window.addEventListener('DOMContentLoaded', initChat);
    </script>
</body>
</html>
