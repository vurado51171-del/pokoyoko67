<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaldaGram - Chat Room</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-sidebar: rgba(20, 22, 32, 0.7);
            --bg-chat: rgba(15, 17, 26, 0.6);
            --bg-input: rgba(30, 34, 50, 0.5);
            --text-main: #f5f6fa;
            --text-muted: #8c92ac;
            --accent-gold: #ffd700;
            --accent-blue: #007aff;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-specular: rgba(255, 255, 255, 0.15);
            --glass-deep: inset 0 20px 40px rgba(0,0,0,0.4), inset 0 -10px 20px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: radial-gradient(circle at 50% 50%, #1a1c29 0%, #050608 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Эффект вогнутого жидкого стекла (Liquid Concave Glass) */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--border-color);
            box-shadow: var(--glass-deep), 0 15px 35px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }

        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        /* Левая панель (Сайдбар) */
        .sidebar {
            width: 360px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand h2 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Вкладки: Все, Группы, Каналы */
        .tabs-container {
            display: flex;
            padding: 5px 15px;
            gap: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-gold);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            gap: 12px;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(255, 255, 255, 0.06);
        }

        .avatar-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #23273a;
            border: 2px solid transparent;
        }

        .chat-item.active .avatar {
            border-color: var(--accent-gold);
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4cd964;
            border: 2px solid #141620;
            border-radius: 50%;
            display: none;
        }

        .status-dot.online { display: block; }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name { font-weight: 600; font-size: 15px; color: white; }
        .chat-time { font-size: 11px; color: var(--text-muted); }
        .chat-last-msg { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Основной экран чата */
        .chat-main-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 15px;
        }

        .chat-placeholder i { font-size: 50px; color: rgba(255,255,255,0.1); }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-user-info { display: flex; align-items: center; gap: 12px; }
        .header-name { font-weight: 600; font-size: 16px; }
        .header-status { font-size: 12px; color: var(--text-muted); }

        .header-actions { display: flex; gap: 15px; font-size: 18px; color: var(--text-muted); }
        .header-actions i { cursor: pointer; transition: color 0.2s; }
        .header-actions i:hover { color: var(--accent-gold); }

        /* Область сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .message.incoming {
            background: rgba(255, 255, 255, 0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message.outgoing {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .msg-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Панель ввода */
        .input-panel {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 5px 12px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            resize: none;
            height: 35px;
            padding-top: 8px;
            font-size: 14px;
        }

        .input-tools { display: flex; gap: 12px; color: var(--text-muted); font-size: 16px; }
        .input-tools i { cursor: pointer; transition: color 0.2s; }
        .input-tools i:hover { color: var(--accent-gold); }

        .send-btn {
            width: 45px;
            height: 45px;
            background: var(--accent-gold);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); }

        /* Поиск результатов */
        .search-results-overlay {
            position: absolute;
            top: 75px;
            left: 15px;
            width: 330px;
            max-height: 400px;
            background: rgba(20, 22, 32, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            z-index: 100;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            padding: 10px;
        }

        .search-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-gold);
            padding: 5px;
            letter-spacing: 1px;
        }

        /* Видео кружочки */
        .video-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--accent-gold);
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="sidebar liquid-glass">
            <div class="sidebar-header">
                <div class="brand">
                    <h2>БурмалдаGram</h2>
                    <i class="fa-solid fa-bars" style="cursor: pointer; color: var(--text-muted);"></i>
                </div>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="globalSearchInput" placeholder="Поиск людей или групп...">
                </div>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('all')">Все</button>
                <button class="tab-btn" onclick="switchTab('groups')">Группы</button>
                <button class="tab-btn" onclick="switchTab('channels')">Каналы</button>
            </div>

            <div class="search-results-overlay" id="searchResults">
                <div class="search-title">Результаты поиска</div>
                <div id="searchResultsList"></div>
            </div>

            <div class="chat-list" id="chatsContainer">
                </div>
        </div>

        <div class="chat-main-window liquid-glass" id="chatMainWindow">
            <div class="chat-placeholder" id="chatPlaceholder">
                <i class="fa-solid fa-comments"></i>
                <p>Выберите, кому хотите написать</p>
            </div>

            <div id="activeChatContent" style="display: none; flex-direction: column; height: 100%;">
                <div class="chat-header">
                    <div class="header-user-info">
                        <div class="avatar-wrapper">
                            <img src="" id="headerAvatar" class="avatar" alt="">
                        </div>
                        <div>
                            <div class="header-name" id="headerName">Имя пользователя</div>
                            <div class="header-status" id="headerStatus">в сети</div>
                        </div>
                    </div>
                    <div class="header-actions">
                        <i class="fa-solid fa-phone" onclick="startCall('audio')" title="Голосовой звонок"></i>
                        <i class="fa-solid fa-video" onclick="startCall('video')" title="Видеозвонок"></i>
                        <i class="fa-solid fa-trash-can" onclick="clearCurrentHistory()" title="Очистить чат"></i>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    </div>

                <div class="input-panel">
                    <div class="input-tools">
                        <label for="mediaUpload" style="cursor: pointer;">
                            <i class="fa-solid fa-paperclip"></i>
                        </label>
                        <input type="file" id="mediaUpload" style="display: none;" onchange="handleMediaUpload(this)">
                        <i class="fa-solid fa-clock" onclick="toggleSecretTimer()" title="Секретный чат (таймер)"></i>
                    </div>
                    <div class="input-wrapper">
                        <textarea id="messageTextInput" placeholder="Напишите сообщение..." oninput="sendTypingStatus()"></textarea>
                        <div class="input-tools" style="margin-left: auto;">
                            <i class="fa-solid fa-microphone" id="voiceRecordBtn" onclick="toggleVoiceRecord()" title="Записать аудио"></i>
                        </div>
                    </div>
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const socket = io();
        let currentUser = localStorage.getItem('username') || 'User_' + Math.floor(Math.random() * 1000);
        let activeRoom = null;
        let activePartner = null;
        let allChats = []; 
        let currentTab = 'all';

        // Инициализация при входе
        socket.emit('online_ping', { username: currentUser });

        // Восстановление списка диалогов
        socket.on('restore_chats', (chatList) => {
            allChats = chatList;
            renderChatList();
        });

        // Слушатель результатов поиска (ИСПРАВЛЕНО ТУТ!)
        const searchInput = document.getElementById('globalSearchInput');
        const searchOverlay = document.getElementById('searchResults');
        const searchResultsList = document.getElementById('searchResultsList');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length > 0) {
                // Отправляем запрос на сервер для поиска в локальной БД + Apps Script
                socket.emit('search_users', { query: query });
            } else {
                searchOverlay.style.display = 'none';
            }
        });

        socket.on('search_results', (data) => {
            if (data.query !== searchInput.value.trim()) return; // Защита от старых ответов
            
            searchResultsList.innerHTML = '';
            if (data.results.length === 0) {
                searchResultsList.innerHTML = '<div style="padding: 10px; color: var(--text-muted); font-size:13px;">Ничего не найдено</div>';
            } else {
                data.results.forEach(user => {
                    const item = document.createElement('div');
                    item.className = 'chat-item';
                    item.onclick = () => startChatWith(user.username);
                    item.innerHTML = `
                        <img src="${user.avatar || 'https://via.placeholder.com/150'}" class="avatar">
                        <div class="chat-info">
                            <div class="chat-name">${user.displayName || user.username}</div>
                            <div style="font-size:11px; color: var(--text-muted);">@${user.username}</div>
                        </div>
                    `;
                    searchResultsList.appendChild(item);
                });
            }
            searchOverlay.style.display = 'block';
        });

        // Функция открытия чата с пользователем
        function startChatWith(username) {
            searchOverlay.style.display = 'none';
            searchInput.value = '';
            activePartner = username;
            
            // Генерируем уникальную комнату (сортировка по алфавиту для стабильности ID комнаты)
            activeRoom = [currentUser, username].sort().join('_');
            
            document.getElementById('chatPlaceholder').style.display = 'none';
            document.getElementById('activeChatContent').style.display = 'flex';
            
            document.getElementById('headerName').innerText = username;
            document.getElementById('headerAvatar').src = 'https://via.placeholder.com/150';

            socket.emit('join_room', { room: activeRoom });
            socket.emit('request_history', { room: activeRoom });

            if (!allChats.includes(username)) {
                allChats.push(username);
                renderChatList();
            }
        }

        // Рендеринг списка диалогов на основе вкладок
        function renderChatList() {
            const container = document.getElementById('chatsContainer');
            container.innerHTML = '';

            // Фильтрация по типам комнат
            let filtered = allChats.filter(chat => {
                if (currentTab === 'groups') return chat.startsWith('group_');
                if (currentTab === 'channels') return chat.startsWith('channel_');
                return !chat.startsWith('group_') && !chat.startsWith('channel_'); // Личные сообщения
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; margin-top:20px; color:var(--text-muted); font-size:13px;">Список пуст</div>';
                return;
            }

            filtered.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${activePartner === chat ? 'active' : ''}`;
                item.onclick = () => startChatWith(chat);
                item.innerHTML = `
                    <div class="avatar-wrapper">
                        <img src="https://via.placeholder.com/150" class="avatar">
                    </div>
                    <div class="chat-info">
                        <div class="chat-info-header">
                            <span class="chat-name">${chat}</span>
                        </div>
                        <div class="chat-last-msg">Нажмите, чтобы открыть диалог...</div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderChatList();
        }

        // Получение истории сообщений
        socket.on('room_history', (messages) => {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            messages.forEach(msg => appendMessageUI(msg));
            scrollToBottom();
        });

        // Получение нового сообщения в реальном времени
        socket.on('chat_message', (msg) => {
            if (msg.room === activeRoom) {
                appendMessageUI(msg);
                scrollToBottom();
            }
        });

        // Отправка текстового сообщения
        function sendMessage() {
            const input = document.getElementById('messageTextInput');
            const text = input.value.trim();
            if (!text || !activeRoom) return;

            const msg = {
                id: 'msg_' + Date.now(),
                room: activeRoom,
                from: currentUser,
                to: activePartner,
                text: text,
                timestamp: Date.now()
            };

            socket.emit('chat_message', msg);
            appendMessageUI(msg);
            input.value = '';
            scrollToBottom();
        }

        function appendMessageUI(msg) {
            const container = document.getElementById('messagesContainer');
            const isOutgoing = msg.from === currentUser;
            
            const div = document.createElement('div');
            div.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            
            let timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            div.innerHTML = `
                <div>${escapeHTML(msg.text)}</div>
                <div class="msg-meta">
                    <span>${timeStr}</span>
                    ${isOutgoing ? '<i class="fa-solid fa-check"></i>' : ''}
                </div>
            `;
            container.appendChild(div);
        }

        // Очистка истории
        function clearCurrentHistory() {
            if (confirm("Вы действительно хотите удалить историю листування для всех?") && activeRoom) {
                socket.emit('clear_chat_history', { room: activeRoom });
            }
        }

        socket.on('chat_history_cleared', (data) => {
            if (data.room === activeRoom) {
                document.getElementById('messagesContainer').innerHTML = '';
            }
        });

        // Вспомогательные функции
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function sendTypingStatus() {
            socket.emit('typing', { room: activeRoom, user: currentUser });
        }

        function toggleSecretTimer() {
            let seconds = prompt("Введите время жизни секретных сообщений в секундах (0 - выключить):", "10");
            alert(`Таймер автоудаления установлен на ${seconds} сек.`);
        }

        function toggleVoiceRecord() {
            alert("Запись аудио запущена... (Для полноценной работы необходим доступ к mediaDevices)");
        }

        function handleMediaUpload(input) {
            if (input.files && input.files[0]) {
                alert(`Файл ${input.files[0].name} выбран для отправки (лимит до 100МБ).`);
            }
        }
    </script>
</body>
</html>
