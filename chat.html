<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram Premium</title>
    <style>
        /* === ПРЕМИУМ ТЕМЫ И LIQUID GLASS СТИЛИ === */
        :root {
            --bg-main: #0a0a0c;
            --bg-panel: rgba(19, 19, 22, 0.7);
            --bg-header: rgba(26, 26, 30, 0.85);
            --bg-input: rgba(28, 28, 33, 0.9);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --msg-my-bg: linear-gradient(135deg, #007aff, #0055b3);
            --msg-my-text: #ffffff;
            --msg-their-bg: rgba(44, 44, 46, 0.6);
            --msg-their-text: #f5f5f7;
            --accent: #0088cc;
            --accent-hover: #2da5ff;
            --danger: #ff3b30;
            --glass-blur: blur(20px);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body.theme-black {
            --bg-main: #000000;
            --bg-panel: rgba(10, 10, 10, 0.8);
            --bg-header: rgba(15, 15, 15, 0.9);
            --msg-their-bg: rgba(28, 28, 30, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* === ГЛАВНЫЙ ИНТЕРФЕЙС === */
        .sidebar { width: 320px; background: var(--bg-panel); backdrop-filter: var(--glass-blur); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); position: relative; }

        .sidebar-header, .chat-header { height: 60px; padding: 0 16px; display: flex; align-items: center; background: var(--bg-header); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--border-color); justify-content: space-between; }
        
        /* Поиск и автокомплит */
        .search-container { padding: 10px 16px; position: relative; background: var(--bg-header); border-bottom: 1px solid var(--border-color); }
        .search-input { width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-main); outline: none; font-size: 14px; }
        
        .search-dropdown { position: absolute; top: 100%; left: 16px; right: 16px; background: var(--bg-input); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 12px; max-height: 250px; overflow-y: auto; display: none; z-index: 100; box-shadow: var(--glass-shadow); }
        .search-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .search-item:hover { background: rgba(255, 255, 255, 0.05); }

        /* Список чатов */
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        .chat-item:hover, .chat-item.active { background: rgba(255, 255, 255, 0.04); }
        
        /* Аватарки */
        .avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #3a3a3c; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 16px; margin-right: 12px; border: 1px solid var(--border-color); flex-shrink: 0; text-transform: uppercase; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-info { flex: 1; min-width: 0; }
        .chat-info-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-meta { font-size: 11px; color: var(--text-muted); }
        .chat-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: var(--accent); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: bold; }

        /* Окна сообщений */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message-row { display: flex; width: 100%; }
        .message-row.my { justify-content: flex-end; }
        .message-row.their { justify-content: flex-start; }

        .message-bubble { max-width: 65%; padding: 10px 14px; border-radius: var(--radius-bubble); position: relative; box-shadow: var(--bubble-shadow); word-break: break-word; font-size: 15px; line-height: 1.4; }
        .message-row.my .message-bubble { background: var(--msg-my-bg); color: var(--msg-my-text); border-bottom-right-radius: 4px; }
        .message-row.their .message-bubble { background: var(--msg-their-bg); color: var(--msg-their-text); border-bottom-left-radius: 4px; }
        
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; margin-top: 4px; opacity: 0.7; }

        /* Закрепленные сообщения верхняя панеill */
        .pinned-panel { display: flex; align-items: center; background: var(--bg-header); border-bottom: 1px solid var(--border-color); padding: 6px 16px; justify-content: space-between; font-size: 13px; cursor: pointer; }

        /* Панель ввода */
        .input-panel { padding: 12px 16px; background: var(--bg-header); backdrop-filter: var(--glass-blur); border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; position: relative; }
        .message-textarea { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 16px; color: var(--text-main); outline: none; resize: none; max-height: 120px; font-size: 15px; line-height: 1.3; }

        /* === ФИКС КНОПОК И БОРТИКОВ В АУДИО И КРУЖКАХ === */
        .audio-wrapper { display: flex; align-items: center; gap: 10px; background: rgba(0, 0, 0, 0.15); padding: 8px 12px; border-radius: 16px; max-width: 250px; overflow: hidden; box-sizing: border-box; }
        
        .audio-btn, .video-note-play-btn { 
            width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; 
            color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; 
            flex-shrink: 0; box-sizing: border-box; outline: none; transition: background 0.2s;
        }
        .audio-btn:hover, .video-note-play-btn:hover { background: var(--accent-hover); }
        .audio-btn svg, .video-note-play-btn svg { width: 16px; height: 16px; fill: currentColor; display: block; margin: 0; padding: 0; }
        
        /* Фикс круглых видеосообщений (кружков) */
        .video-note-container { 
            width: 180px; height: 180px; border-radius: 50%; overflow: hidden; 
            position: relative; border: 2px solid var(--accent); background: #000; 
            box-sizing: border-box; transform: translateZ(0); /* Фикс закругления углов в Safari */
        }
        .video-note-container video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        /* Идеальное центрирование кнопки поверх видео кружка */
        .video-note-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 2; pointer-events: none; }
        .video-note-play-btn { pointer-events: auto; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); width: 44px; height: 44px; }

        /* ФИКС: Большой центрированный кружок предпросмотра камеры при записи */
        .record-preview-overlay { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 240px; height: 240px; border-radius: 50%; border: 4px solid var(--accent); 
            box-shadow: 0 0 40px rgba(0,136,204,0.5), var(--glass-shadow); overflow: hidden; 
            background: #000; display: none; z-index: 1000; box-sizing: border-box; 
        }
        .record-preview-overlay video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Общие кнопки действий */
        .action-icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; transition: background 0.2s, color 0.2s; }
        .action-icon-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }

        /* Модальные окна */
        .modal-layer { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 500; }
        .modal-box { background: var(--bg-header); border: 1px solid var(--border-color); padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: var(--glass-shadow); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-input); border: 1px solid var(--border-color); color: #fff; outline: none; }
        .btn-prime { background: var(--accent); border: none; color: #fff; padding: 10px 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        
        .status-dot { width: 8px; height: 8px; background: #4cd964; border-radius: 50%; display: inline-block; margin-left: 6px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="avatar" id="my-profile-avatar-btn" onclick="openProfileModal()" style="cursor: pointer;">B</div>
            <div style="font-weight: bold; flex: 1; font-size: 16px;" id="sidebar-my-name">Burmalda</div>
            <button class="action-icon-btn" onclick="openProfileModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" id="user-search-input" placeholder="Пошук користувачів...">
            <div class="search-dropdown" id="search-autocomplete-dropdown"></div>
        </div>

        <div class="chats-list" id="chats-list-target"></div>
    </div>

    <div class="chat-area" id="main-chat-view">
        <div class="chat-header">
            <div style="display: flex; align-items: center;" id="chat-header-info">
                <div class="avatar" id="active-chat-avatar">?</div>
                <div>
                    <div class="chat-name" id="active-chat-name">Виберіть чат</div>
                    <div style="font-size: 12px; color: var(--text-muted);" id="active-chat-status">неактивний</div>
                </div>
            </div>
            <div style="display: flex; gap: 8px;" id="chat-actions-group">
                <button class="action-icon-btn" onclick="startCall('audio')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </button>
            </div>
        </div>

        <div class="pinned-panel" id="pinned-messages-bar" style="display: none;">
            <div style="color: var(--accent); font-weight: 500;" id="pinned-bar-text">Закріплене повідомлення</div>
            <button class="action-icon-btn" style="width:24px; height:24px;" id="unpin-all-btn">✕</button>
        </div>

        <div class="messages-container" id="messages-display-wall"></div>

        <div class="input-panel" id="input-panel-container">
            <button class="action-icon-btn" id="attach-file-trigger">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input type="file" id="hidden-file-input" style="display: none;">

            <textarea class="message-textarea" id="text-message-input" rows="1" placeholder="Повідомлення..."></textarea>

            <button class="action-icon-btn" id="send-or-record-btn" style="color: var(--accent);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="send-icon-svg" style="display:none;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="mic-icon-svg"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
            </button>
        </div>
    </div>

    <div class="record-preview-overlay" id="circle-record-preview-window">
        <video id="circle-preview-video-element" autoplay muted playsinline></video>
    </div>

    <div class="modal-layer" id="profile-edit-modal">
        <div class="modal-box">
            <h3 style="margin-bottom: 16px;">Налаштування профілю</h3>
            <div class="form-group" style="text-align: center;">
                <div class="avatar" id="modal-avatar-preview" style="width: 70px; height: 70px; margin: 0 auto 10px; font-size: 24px;">B</div>
                <input type="file" id="avatar-upload-file" accept="image/*" style="display: none;">
                <button class="btn-prime" style="background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; padding: 6px;" onclick="document.getElementById('avatar-upload-file').click()">Змінити аватар</button>
            </div>
            <div class="form-group">
                <label>Відображуване ім'я</label>
                <input type="text" id="profile-display-name-input">
            </div>
            <div class="form-group">
                <label>Про себе (Біо)</label>
                <textarea id="profile-bio-input" rows="2"></textarea>
            </div>
            <button class="btn-prime" onclick="saveProfileChanges()">Зберегти</button>
            <button class="btn-prime" style="background:none; color: var(--text-muted); margin-top: 8px;" onclick="closeProfileModal()">Скасувати</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Основные переменные состояния приложения
        const myNick = localStorage.getItem('burmalda_username') || 'User_' + Math.floor(Math.random() * 10000);
        localStorage.setItem('burmalda_username', myNick);

        let activeChats = [];
        let onlineUsers = [];
        let loadedProfiles = {}; // Глобальное кэширование профилей (аватарки, имена)
        let currentActiveChatPartner = null;
        let currentRoom = null;

        // Элементы UI
        const chatsListTarget = document.getElementById('chats-list-target');
        const userSearchInput = document.getElementById('user-search-input');
        const searchAutocompleteDropdown = document.getElementById('search-autocomplete-dropdown');
        const messagesDisplayWall = document.getElementById('messages-display-wall');
        const textMessageInput = document.getElementById('text-message-input');
        const sendOrRecordBtn = document.getElementById('send-or-record-btn');
        const sendIconSvg = document.getElementById('send-icon-svg');
        const micIconSvg = document.getElementById('mic-icon-svg');
        const circleRecordPreviewWindow = document.getElementById('circle-record-preview-window');
        const circlePreviewVideoElement = document.getElementById('circle-preview-video-element');

        // Инициализация при подключении к сети
        socket.emit('online_ping', { username: myNick });

        // Автоматическое переключение иконки Микрофон / Отправить текст
        textMessageInput.addEventListener('input', () => {
            if (textMessageInput.value.trim().length > 0) {
                sendIconSvg.style.display = 'block';
                micIconSvg.style.display = 'none';
            } else {
                sendIconSvg.style.display = 'none';
                micIconSvg.style.display = 'block';
            }
        });

        // СБОР И СИНХРОНИЗАЦИЯ ПРОФИЛЕЙ (РЕШАЕТ ПРОБЛЕМУ С АВАТАРКАМИ)
        socket.on('profile_broadcast', (packet) => {
            if (!packet || !packet.username) return;
            loadedProfiles[packet.username] = packet.data;
            
            // Динамически обновляем интерфейсы, если изменения коснулись открытого окна
            renderChatsList();
            if (currentActiveChatPartner === packet.username) {
                updateActiveChatHeader();
            }
            if (packet.username === myNick) {
                document.getElementById('sidebar-my-name').innerText = packet.data.displayName || myNick;
                updateAvatarDisplay('my-profile-avatar-btn', myNick);
            }
        });

        socket.on('online_list', (users) => {
            onlineUsers = users;
            renderChatsList();
            if (currentActiveChatPartner) updateActiveChatHeader();
        });

        // Восстановление списка чатов при старте
        socket.on('restore_chats', (list) => {
            activeChats = list || [];
            renderChatsList();
        });

        // ВСПЛЫВАЮЩИЙ ЖИВОЙ ПОИСК С ПРЕДПРОСМОТРОМ (ИСПРАВЛЕНО)
        userSearchInput.addEventListener('input', () => {
            const query = userSearchInput.value.trim();
            if (query.length > 0) {
                socket.emit('search_users', { query: query });
            } else {
                searchAutocompleteDropdown.style.display = 'none';
            }
        });

        socket.on('search_results', (data) => {
            searchAutocompleteDropdown.innerHTML = '';
            if (!data.results || data.results.length === 0) {
                searchAutocompleteDropdown.innerHTML = `<div class="search-item" style="color:var(--text-muted); pointer-events:none;">Нікого не знайдено</div>`;
            } else {
                data.results.forEach(user => {
                    if (user.username === myNick) return; // Не показывать себя в поиске
                    
                    const item = document.createElement('div');
                    item.className = 'search-item';
                    
                    // Генерация аватарки в поиске
                    let avatarContent = user.username.charAt(0).toUpperCase();
                    if (user.avatar) avatarContent = `<img src="${user.avatar}">`;
                    
                    item.innerHTML = `
                        <div class="avatar">${avatarContent}</div>
                        <div>
                            <div style="font-weight:600;">${escapeHTML(user.displayName)}</div>
                            <div style="font-size:12px; color:var(--text-muted);">@${escapeHTML(user.username)}</div>
                        </div>
                    `;
                    item.onclick = () => {
                        startNewChatWith(user.username);
                        userSearchInput.value = '';
                        searchAutocompleteDropdown.style.display = 'none';
                    };
                    searchAutocompleteDropdown.appendChild(item);
                });
            }
            searchAutocompleteDropdown.style.display = 'block';
        });

        // Закрытие дропдауна поиска при клике мимо
        document.addEventListener('click', (e) => {
            if (!userSearchInput.contains(e.target) && !searchAutocompleteDropdown.contains(e.target)) {
                searchAutocompleteDropdown.style.display = 'none';
            }
        });

        function startNewChatWith(username) {
            if (!activeChats.includes(username)) {
                activeChats.push(username);
                socket.emit('sync_chat_list', { chatList: activeChats });
            }
            openChatWithUser(username);
        }

        // ОТКРЫТИЕ ОКНА ЧАТА С ПОЛЬЗОВАТЕЛЕМ
        function openChatWithUser(username) {
            currentActiveChatPartner = username;
            currentRoom = [myNick, username].sort().join('_');
            
            updateActiveChatHeader();
            messagesDisplayWall.innerHTML = '';
            
            socket.emit('join_room', { room: currentRoom });
            socket.emit('request_history', { room: currentRoom });
            
            renderChatsList();
        }

        socket.on('room_history', (history) => {
            messagesDisplayWall.innerHTML = '';
            history.forEach(msg => appendSingleMessage(msg));
            scrollToBottom();
        });

        // РЕАЛЬНОЕ ВРЕМЯ: ПОЛУЧЕНИЕ НОВОГО СООБЩЕНИЯ (ИСПРАВЛЕНО ДЛЯ ДВУХ СТОРОН)
        socket.on('chat_message', (msg) => {
            const partner = msg.from === myNick ? msg.to : msg.from;
            
            // Если чата с этим пользователем у нас еще нет в списке — добавляем его на лету
            if (!activeChats.includes(partner)) {
                activeChats.push(partner);
                renderChatsList();
            }

            // Если открыто окно именно с этим пользователем
            if (currentActiveChatPartner === partner) {
                appendSingleMessage(msg);
                scrollToBottom();
                socket.emit('mark_read', { room: currentRoom, reader: myNick });
            } else {
                renderChatsList(); // Обновляет счетчики непрочитанных сообщений
            }
        });

        // ОТПРАВКА СТАНДАРТНОГО ТЕКСТОВОГО СООБЩЕНИЯ
        sendOrRecordBtn.onclick = () => {
            const text = textMessageInput.value.trim();
            if (text.length > 0) {
                const messageObject = {
                    id: 'msg_' + Date.now() + '_' + Math.floor(Math.random()*1000),
                    room: currentRoom,
                    from: myNick,
                    to: currentActiveChatPartner,
                    text: text,
                    type: 'text',
                    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    status: 'sent'
                };
                socket.emit('chat_message', messageObject);
                appendSingleMessage(messageObject);
                textMessageInput.value = '';
                textMessageInput.dispatchEvent(new Event('input')); // сброс иконки кнопки
                scrollToBottom();
            } else {
                // Если поле ввода пустое — запускается логика записи кружка или аудио
                handleMediaRecording();
            }
        };

        // ЛОГИКА МЕДИАЗАПИСИ (КРУЖКИ И АУДИО)
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecordingNow = false;
        let recordingStream = null;

        async function handleMediaRecording() {
            if (isRecordingNow) {
                // Остановить и отправить
                if (mediaRecorder) mediaRecorder.stop();
                if (recordingStream) recordingStream.getTracks().forEach(track => track.stop());
                circleRecordPreviewWindow.style.display = 'none';
                isRecordingNow = false;
                return;
            }

            // Запрашиваем тип записи (например, кружок видео по умолчанию, если есть камера)
            try {
                const useVideo = confirm("Записати кругле відеоповідомлення? (Скасувати — запише тільки аудіо)");
                const constraints = {
                    audio: true,
                    video: useVideo ? { width: 400, height: 400, facingMode: "user" } : false
                };

                recordingStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                if (useVideo) {
                    circlePreviewVideoElement.srcObject = recordingStream;
                    circleRecordPreviewWindow.style.display = 'block'; // Большой центрированный кружок
                }

                recordedChunks = [];
                mediaRecorder = new MediaRecorder(recordingStream);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: useVideo ? 'video/webm' : 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const base64Data = reader.result;
                        const mediaMessage = {
                            id: 'msg_' + Date.now(),
                            room: currentRoom,
                            from: myNick,
                            to: currentActiveChatPartner,
                            type: useVideo ? 'video_note' : 'audio_note',
                            fileData: base64Data,
                            timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                            status: 'sent'
                        };
                        socket.emit('chat_message', mediaMessage);
                        appendSingleMessage(mediaMessage);
                        scrollToBottom();
                    };
                };

                mediaRecorder.start();
                isRecordingNow = true;

            } catch (err) {
                alert("Помилка доступу до мікрофона чи камери: " + err.message);
            }
        }

        // ДОБАВЛЕНИЕ И ОТРИСОВКА СООБЩЕНИЙ В СТЕНУ ЧАТА (ФИКС ОВЕРФЛОУ УПРАВЛЕНИЯ)
        function appendSingleMessage(msg) {
            if (!msg) return;
            const isMy = msg.from === myNick;
            
            const row = document.createElement('div');
            row.className = `message-row ${isMy ? 'my' : 'their'}`;
            row.id = `msg-container-${msg.id}`;

            let contentHTML = '';

            if (msg.type === 'text') {
                contentHTML = `<div>${escapeHTML(msg.text)}</div>`;
            } else if (msg.type === 'audio_note') {
                // Фикс контейнера аудио — кнопки строго внутри границ
                contentHTML = `
                    <div class="audio-wrapper">
                        <button class="audio-btn" onclick="playAudioMessage('${msg.id}')" id="audio-btn-${msg.id}">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <div style="font-size:12px; color:var(--text-muted); white-space:nowrap;">Голосове повідомлення</div>
                        <audio id="audio-src-${msg.id}" src="${msg.fileData}"></audio>
                    </div>
                `;
            } else if (msg.type === 'video_note') {
                // Фикс круглого видеосообщения — видео ровно по центру, кнопки не выходят за бортики
                contentHTML = `
                    <div class="video-note-container">
                        <video id="video-src-${msg.id}" src="${msg.fileData}" loop playsinline></video>
                        <div class="video-note-overlay">
                            <button class="video-note-play-btn" onclick="toggleVideoNote('${msg.id}')" id="video-btn-${msg.id}">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            }

            row.innerHTML = `
                <div class="message-bubble">
                    ${contentHTML}
                    <div class="msg-meta">
                        <span>${msg.timestamp}</span>
                        ${isMy ? `<span style="color:#4cd964;">✓</span>` : ''}
                    </div>
                </div>
            `;
            
            messagesDisplayWall.appendChild(row);
        }

        // Функции проигрывания мультимедиа
        function playAudioMessage(id) {
            const aud = document.getElementById(`audio-src-${id}`);
            const btn = document.getElementById(`audio-btn-${id}`);
            if (aud.paused) {
                aud.play();
                btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                aud.onended = () => btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
            } else {
                aud.pause();
                btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
            }
        }

        function toggleVideoNote(id) {
            const vid = document.getElementById(`video-src-${id}`);
            const btn = document.getElementById(`video-btn-${id}`);
            if (vid.paused) {
                vid.play();
                btn.style.opacity = '0'; // скрываем кнопку во время воспроизведения
                btn.parentElement.parentElement.onclick = () => { // клик по самому кружку ставит на паузу
                    vid.pause();
                    btn.style.opacity = '1';
                    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
                };
            } else {
                vid.pause();
                btn.style.opacity = '1';
                btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
            }
        }

        // ОТРИСОВКА БОКОВОГО СПИСКА ЧАТОВ С АВАТАРКАМИ
        function renderChatsList() {
            chatsListTarget.innerHTML = '';
            activeChats.forEach(username => {
                const isOnline = onlineUsers.includes(username);
                const profile = loadedProfiles[username] || {};
                const displayName = profile.displayName || username;
                
                const item = document.createElement('div');
                item.className = `chat-item ${currentActiveChatPartner === username ? 'active' : ''}`;
                
                // Рендер аватарки
                let avatarContent = username.charAt(0).toUpperCase();
                if (profile.avatar) avatarContent = `<img src="${profile.avatar}">`;

                item.innerHTML = `
                    <div class="avatar">${avatarContent}</div>
                    <div class="chat-info">
                        <div class="chat-info-top">
                            <span class="chat-name">${escapeHTML(displayName)} ${isOnline ? '<span class="status-dot"></span>' : ''}</span>
                        </div>
                        <div class="chat-preview">@${escapeHTML(username)}</div>
                    </div>
                `;
                item.onclick = () => openChatWithUser(username);
                chatsListTarget.appendChild(item);
            });
        }

        // ОБНОВЛЕНИЕ ШАПКИ АКТИВНОГО ЧАТА
        function updateActiveChatHeader() {
            if (!currentActiveChatPartner) return;
            const isOnline = onlineUsers.includes(currentActiveChatPartner);
            const profile = loadedProfiles[currentActiveChatPartner] || {};
            
            document.getElementById('active-chat-name').innerText = profile.displayName || currentActiveChatPartner;
            document.getElementById('active-chat-status').innerText = isOnline ? 'у мережі' : 'офлайн';
            
            const avatarEl = document.getElementById('active-chat-avatar');
            if (profile.avatar) {
                avatarEl.innerHTML = `<img src="${profile.avatar}">`;
            } else {
                avatarEl.innerHTML = currentActiveChatPartner.charAt(0).toUpperCase();
            }
        }

        // Вспомогательные функции апдейта аватарок в системе
        function updateAvatarDisplay(elementId, username) {
            const el = document.getElementById(elementId);
            const profile = loadedProfiles[username] || {};
            if (profile.avatar) {
                el.innerHTML = `<img src="${profile.avatar}">`;
            } else {
                el.innerHTML = username.charAt(0).toUpperCase();
            }
        }

        // МОДАЛЬНОЕ ОКНО ПРОФИЛЯ С ПЕРЕВОДОМ В BASE64
        function openProfileModal() {
            const profile = loadedProfiles[myNick] || {};
            document.getElementById('profile-display-name-input').value = profile.displayName || myNick;
            document.getElementById('profile-bio-input').value = profile.bio || '';
            updateAvatarDisplay('modal-avatar-preview', myNick);
            document.getElementById('profile-edit-modal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profile-edit-modal').style.display = 'none';
        }

        // Логика чтения и сжатия загруженного фото аватара
        document.getElementById('avatar-upload-file').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const base64 = reader.result;
                document.getElementById('modal-avatar-preview').innerHTML = `<img src="${base64}">`;
                document.getElementById('modal-avatar-preview').dataset.blob = base64;
            };
        };

        function saveProfileChanges() {
            const dName = document.getElementById('profile-display-name-input').value.trim();
            const bioText = document.getElementById('profile-bio-input').value.trim();
            const avBlob = document.getElementById('modal-avatar-preview').dataset.blob || (loadedProfiles[myNick] ? loadedProfiles[myNick].avatar : '');

            socket.emit('update_profile', {
                displayName: dName || myNick,
                bio: bioText,
                avatar: avBlob
            });
            closeProfileModal();
        }

        // Утилиты
        function scrollToBottom() { messagesDisplayWall.scrollTop = messagesDisplayWall.scrollHeight; }
        function escapeHTML(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
    </script>
</body>
</html>
