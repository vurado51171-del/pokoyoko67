<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burmalda Messenger</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 0; background: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Левая панель (Главное меню чатов) */
        #sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; flex-shrink: 0; transition: all 0.2s; }
        
        /* Шапка с ником и кнопками */
        .sidebar-header { padding: 15px; background: #262626; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .my-profile { font-weight: bold; color: #007bff; font-size: 16px; }
        .header-controls { display: flex; gap: 8px; align-items: center; }
        .search-trigger-btn, .settings-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; transition: color 0.2s; padding: 5px; outline: none; }
        .search-trigger-btn:hover, .settings-btn:hover { color: #fff; }

        /* Поле поиска друзей */
        .search-container { padding: 10px 15px; background: #2d2d2d; border-bottom: 1px solid #333; display: none; }
        .search-container.active { display: block; }
        .search-container input { width: 100%; padding: 8px 10px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 5px; outline: none; font-size: 16px; }

        .section-title { padding: 10px 15px; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Список добавленных чатов */
        #chats-list { flex-grow: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #252525; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .chat-item:hover { background: #262626; }
        .chat-item.active { background: #2d2d2d; border-left: 4px solid #007bff; }
        .status-dot { font-size: 11px; color: #888; }
        .status-dot.online { color: #28a745; font-weight: bold; }

        /* Главная зона чата (Правая сторона) */
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #141414; position: relative; }
        #chat-header { padding: 16px; background: #1e1e1e; border-bottom: 1px solid #2d2d2d; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 12px; }
        
        /* Кнопка «Назад» для мобильной версии (по умолчанию скрыта на ПК) */
        .back-btn { display: none; background: #2d2d2d; border: 1px solid #444; color: white; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .back-btn:hover { background: #3a3a3a; }

        /* Сообщения */
        #messages { list-style-type: none; padding: 20px; margin: 0; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        #messages li { padding: 10px 14px; background: #262626; margin-bottom: 8px; border-radius: 8px; max-width: 60%; width: fit-content; word-break: break-word; position: relative; }
        #messages li.my-msg { background: #007bff; align-self: flex-end; color: white; padding-right: 35px; }
        
        /* Стиль для галочек прочтения */
        .msg-status { position: absolute; bottom: 4px; right: 8px; font-size: 11px; color: rgba(255, 255, 255, 0.6); font-weight: bold; }
        .msg-status.read { color: #00d4ff; }

        /* Нижняя панель ввода текста */
        #form { padding: 15px; background: #1e1e1e; display: flex; border-top: 1px solid #2d2d2d; }
        #input { flex-grow: 1; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; outline: none; font-size: 16px; }
        #button { padding: 12px 25px; margin-left: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; flex-shrink: 0; }
        #button:disabled { background: #444; cursor: not-allowed; }
        
        /* Заглушка, когда чат не выбран */
        .no-chat-selected { margin: auto; text-align: center; color: #555; font-size: 18px; line-height: 1.6; }

        /* МОДАЛЬНОЕ ОКНО НАСТРОЕК */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1e1e1e; padding: 25px; border-radius: 10px; width: 100%; max-width: 350px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; color: #007bff; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; outline: none; }
        .modal-close:hover { color: #fff; }
        
        /* Свойства аккаунта в настройках */
        .account-property { margin-bottom: 12px; font-size: 14px; color: #bbb; }
        .account-property strong { color: #fff; }
        .settings-logout-btn { width: 100%; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; font-size: 15px; }
        .settings-logout-btn:hover { background: #bd2130; }

        /* УНИВЕРСАЛЬНЫЙ АДАПТИВ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 768px) {
            #sidebar { width: 100%; display: flex; }
            #chat-main { display: none; width: 100%; }
            
            /* Если открыт чат на мобилке, скрываем боковую панель, показываем чат и кнопку Назад */
            body.chat-opened #sidebar { display: none; }
            body.chat-opened #chat-main { display: flex; }
            body.chat-opened .back-btn { display: block; }
            
            #messages li { max-width: 80%; }
            .no-chat-selected { display: none; } /* На смартфонах пустая заглушка не имеет смысла */
            #form { padding: 10px; }
            #button { padding: 12px 18px; margin-left: 6px; }
            
            /* ФИКС ДЛЯ АНДРОИД: принудительный показ клавиатуры */
            #input {
                font-size: 16px !important;
                opacity: 1 !important;
                visibility: visible !important;
                display: block !important;
                -webkit-appearance: none;
                appearance: none;
            }
            #form {
                position: relative;
                z-index: 10;
                background: #1e1e1e;
            }
            body.chat-opened #chat-main {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 20;
            }
            #input:focus {
                border-color: #28a745;
                outline: none;
            }
        }
    </style>
</head>
<body id="main-body" style="display: none;">

<div id="sidebar">
    <div class="sidebar-header">
        <div class="my-profile" id="my-profile-name">Загрузка...</div>
        <div class="header-controls">
            <button class="search-trigger-btn" id="search-toggle-btn" title="Поиск людей">🔍</button>
            <button class="settings-btn" id="settings-toggle-btn" title="Настройки аккаунта">⚙️</button>
        </div>
    </div>
    
    <div class="search-container" id="search-frame">
        <input type="text" id="search-input" placeholder="Введите имя и нажмите Enter...">
    </div>
    
    <div class="section-title">Ваши диалоги</div>
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <div id="no-chat-placeholder" class="no-chat-selected">
        <p>Бурмалда Мессенджер<br><span style="font-size: 14px; color: #444;">Выберите чат или нажмите 🔍, чтобы добавить друга</span></p>
    </div>
    
    <div id="chat-area" style="display: none; flex-direction: column; height: 100%;">
        <div id="chat-header">
            <button class="back-btn" onclick="closeChatMobile()">⬅ Назад</button>
            <span id="chat-title-text">Чат</span>
        </div>
        <ul id="messages"></ul>
        <div id="form">
            <input id="input" autocomplete="off" placeholder="Напишите сообщение..." />
            <button id="button">Отправить</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <div class="modal-title">
            <span>⚙️ Настройки</span>
            <button class="modal-close" id="settings-close-btn">&times;</button>
        </div>
        <div id="account-info">
            <div class="account-property">Профиль: <strong id="info-nick">...</strong></div>
            <div class="account-property">Статус: <strong style="color: #28a745;">В сети (Online)</strong></div>
            <div class="account-property">Авторизация: <strong style="color: #007bff;">Токен защиты валиден</strong></div>
            <div class="account-property">Время входа: <small id="info-login-time" style="color: #888;"></small></div>
        </div>
        <button class="settings-logout-btn" onclick="logout()">Выйти из профиля 🚪</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // 1. ДЕКОДИРОВАНИЕ URL-ТОКЕНА И ПРОВЕРКА АВТОРИЗАЦИИ
    const urlParams = new URLSearchParams(window.location.search);
    const authToken = urlParams.get('auth');
    let myNick = 'Аноним';
    let authorized = false;
    let sessionTimeString = 'Неизвестно';

    if (authToken) {
        try {
            const decoded = decodeURIComponent(atob(authToken));
            const parts = decoded.split('_');
            myNick = parts[0];
            const loginTime = parseInt(parts[1]);
            
            if (!isNaN(loginTime)) {
                sessionTimeString = new Date(loginTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " " + new Date(loginTime).toLocaleDateString();
            }
            
            if (Date.now() - loginTime < 86400000 && myNick) {
                authorized = true;
            }
        } catch (e) {
            console.error("Ошибка разбора авторизационного токена:", e);
        }
    }

    if (!authorized) {
        alert('Доступ заблокирован! Пожалуйста, пройдите авторизацию на главной странице.');
        window.location.href = '/'; 
    } else {
        document.getElementById('main-body').style.display = 'flex';
    }

    // 2. РАБОТА С СЕТЕВЫМИ СОКЕТАМИ И ИНТЕРФЕЙСОМ
    const socket = io();
    document.getElementById('my-profile-name').textContent = "Я: " + myNick;
    
    document.getElementById('info-nick').textContent = myNick;
    document.getElementById('info-login-time').textContent = sessionTimeString;

    let currentRoom = null;
    let currentActiveChatPartner = null;
    let onlineUsers = [];

    let activeChats = JSON.parse(localStorage.getItem('burmalda_chat_list')) || [];
    let savedMessages = JSON.parse(localStorage.getItem('burmalda_msg_history')) || {};

    const searchToggleBtn = document.getElementById('search-toggle-btn');
    const searchFrame = document.getElementById('search-frame');
    const searchInput = document.getElementById('search-input');
    const chatsList = document.getElementById('chats-list');
    
    const chatPlaceholder = document.getElementById('no-chat-placeholder');
    const chatArea = document.getElementById('chat-area');
    const chatTitleText = document.getElementById('chat-title-text');
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('button');

    // ЭЛЕМЕНТЫ ОКНА НАСТРОЕК
    const settingsToggleBtn = document.getElementById('settings-toggle-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsCloseBtn = document.getElementById('settings-close-btn');

    settingsToggleBtn.onclick = () => {
        settingsModal.classList.add('active');
    };
    settingsCloseBtn.onclick = () => {
        settingsModal.classList.remove('active');
    };
    settingsModal.onclick = (e) => {
        if (e.target === settingsModal) settingsModal.classList.remove('active');
    };

    socket.emit('store user', myNick);

    socket.on('online users', (users) => {
        onlineUsers = Array.isArray(users) ? users : [];
        renderChatsList();
    });

    searchToggleBtn.onclick = function(e) {
        e.preventDefault();
        searchFrame.classList.toggle('active');
        if (searchFrame.classList.contains('active')) {
            searchInput.focus();
        }
    };

    searchInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
            const targetNick = searchInput.value.trim();
            if (!targetNick) return;
            if (targetNick.toLowerCase() === myNick.toLowerCase()) {
                alert("Нельзя создать чат с самим собой!");
                return;
            }

            if (!activeChats.includes(targetNick)) {
                activeChats.push(targetNick);
                localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
            }

            searchInput.value = '';
            searchFrame.classList.remove('active');
            openChatWith(targetNick);
        }
    };

    function renderChatsList() {
        chatsList.innerHTML = '';
        if (activeChats.length === 0) {
            chatsList.innerHTML = '<div style="padding: 15px; color: #555; font-size: 14px; text-align: center;">Список пуст.<br>Нажмите на 🔍 вверху</div>';
            return;
        }

        activeChats.forEach(user => {
            if (!user) return;
            const item = document.createElement('div');
            item.className = 'chat-item';
            if (currentActiveChatPartner === user) item.classList.add('active');
            
            const isOnline = onlineUsers.includes(user);
            item.innerHTML = `
                <span>${user}</span>
                <span class="status-dot ${isOnline ? 'online' : ''}">${isOnline ? '● онлайн' : 'офлайн'}</span>
            `;

            item.onclick = () => openChatWith(user);
            chatsList.appendChild(item);
        });
    }

    function openChatWith(user) {
        if (!user) return;
        currentActiveChatPartner = user;
        currentRoom = [myNick, user].sort().join('_');

        chatPlaceholder.style.display = 'none';
        chatArea.style.display = 'flex';
        chatTitleText.textContent = `Диалог с: ${user}`;

        document.body.classList.add('chat-opened');

        socket.emit('join room', user);
        loadMessagesHistory();
        renderChatsList();
        
        // Отправляем скрытый сигнал прочтения собеседнику
        sendReadSignal();
        
        setTimeout(() => {
            input.focus();
            input.click();
        }, 300);
    }

    function closeChatMobile() {
        document.body.classList.remove('chat-opened');
        currentActiveChatPartner = null;
        currentRoom = null;
        renderChatsList();
    }

    socket.on('force join room', (roomName) => {
        if (!roomName) return;
        const cleanRoomName = String(roomName);
        const partner = cleanRoomName.replace(myNick, '').replace('_', '');
        if (!partner) return;

        if (!activeChats.includes(partner)) {
            activeChats.push(partner);
            localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
            renderChatsList();
        }
        socket.emit('join room', partner);
    });

    function sendMessage() {
        const text = input.value.trim();
        if (text && currentRoom) {
            // Привязываем таймстамп как уникальный ID сообщения
            const msgData = { 
                room: currentRoom, 
                text: text, 
                user: myNick,
                msgId: Date.now() 
            };
            socket.emit('private chat message', msgData);
            input.value = '';
        }
    }

    // Функция отправки скрытого сигнала прочтения
    function sendReadSignal() {
        if (currentRoom) {
            socket.emit('private chat message', { 
                room: currentRoom, 
                text: '[READ_SIGNAL]', 
                user: myNick 
            });
        }
    }

    button.onclick = sendMessage;
    input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    socket.on('chat message', (data) => {
        if (!data || !data.room) return;
        const roomKey = String(data.room);

        // Перехватываем сигнал прочтения
        if (data.text === '[READ_SIGNAL]') {
            if (roomKey === currentRoom && data.user !== myNick) {
                // Если мы в этом чате и сигнал от собеседника — красим наши галочки в синий
                const systemStatuses = messagesContainer.querySelectorAll('.msg-status');
                systemStatuses.forEach(span => {
                    span.textContent = '✓✓';
                    span.classList.add('read');
                });
                
                // Обновляем историю в локалсторидже, чтобы галочки не слетали
                if (savedMessages[roomKey]) {
                    savedMessages[roomKey].forEach(m => { if(m.user === myNick) m.isRead = true; });
                    localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
                }
            }
            return; // Скрываем сам сервисный текст из чата
        }

        if (!savedMessages[roomKey]) savedMessages[roomKey] = [];
        
        // Если мы уже открыли этот чат, то входящее сообщение от собеседника сразу триггерит отправку ответа "Прочитано"
        if (roomKey === currentRoom && data.user !== myNick) {
            setTimeout(sendReadSignal, 300);
        }

        savedMessages[roomKey].push(data);
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));

        if (roomKey === currentRoom) {
            displaySingleMessage(data);
        }
    });

    function loadMessagesHistory() {
        messagesContainer.innerHTML = '';
        if (currentRoom && savedMessages[currentRoom]) {
            savedMessages[currentRoom].forEach(displaySingleMessage);
        }
    }

    function displaySingleMessage(data) {
        if (!messagesContainer || !data) return;
        const item = document.createElement('li');
        
        const userDisplay = data.user ? String(data.user) : 'User';
        const textDisplay = data.text ? String(data.text) : '';

        if (data.user === myNick) {
            item.classList.add('my-msg');
            // Проверяем, было ли сообщение уже прочитано ранее
            const checkRead = data.isRead ? '✓✓' : '✓';
            const readClass = data.isRead ? 'msg-status read' : 'msg-status';
            
            item.innerHTML = `<strong>Я:</strong> ${textDisplay} <span class="${readClass}">${checkRead}</span>`;
        } else {
            item.innerHTML = `<strong>${userDisplay}:</strong> ${textDisplay}`;
        }
        
        messagesContainer.appendChild(item);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function logout() {
        window.location.href = '/';
    }

    renderChatsList();
</script>
</body>
</html>
