<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram Monochrome Glass</title>
    <style>
        /* Монохромні змінні рідкого скла (Liquid Glass) */
        :root {
            --bg-body: #000000;
            --bg-sidebar: rgba(15, 15, 15, 0.7);
            --bg-chat-main: #050505;
            --bg-header: rgba(15, 15, 15, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #888888;
            --msg-partner: rgba(25, 25, 25, 0.8);
            --msg-my: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(30, 30, 30, 0.6);
            --input-text: #ffffff;
            --blur-val: blur(25px);
            --accent-color: #ffffff;
        }

        body.light-theme {
            --bg-body: #f3f3f3;
            --bg-sidebar: rgba(255, 255, 255, 0.45);
            --bg-chat-main: #fafafa;
            --bg-header: rgba(240, 240, 240, 0.5);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-main: #111111;
            --text-secondary: #666666;
            --msg-partner: rgba(0, 0, 0, 0.06);
            --msg-my: rgba(0, 0, 0, 0.12);
            --input-bg: rgba(255, 255, 255, 0.7);
            --input-text: #111111;
            --blur-val: blur(25px);
            --accent-color: #111111;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg-body); color: var(--text-main); }
        body { display: flex; position: relative; }
        
        /* Гарні тонкі скроллбари */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 10px; opacity: 0.3; }

        /* ЛІВА ПАНЕЛЬ (Скляний сайдбар) */
        #sidebar { 
            width: 340px; 
            background: var(--bg-sidebar); 
            backdrop-filter: var(--blur-val);
            -webkit-backdrop-filter: var(--blur-val);
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            z-index: 10;
            height: 100dvh;
        }
        
        .sidebar-header { 
            padding: 16px 14px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .my-profile { 
            font-weight: 600; 
            font-size: 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 6px 12px; 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border-color); 
        }
        body.light-theme .my-profile { background: rgba(0, 0, 0, 0.03); }
        .my-profile:hover { transform: scale(1.02); background: rgba(255,255,255,0.1); }
        
        .header-controls { display: flex; gap: 8px; align-items: center; }
        
        .control-btn { 
            background: none; 
            border: 1px solid var(--border-color); 
            font-size: 15px; 
            cursor: pointer; 
            color: var(--text-main); 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            outline: none; 
        }
        .control-btn:hover { background: var(--text-main); color: var(--bg-body); transform: scale(1.05); }

        .search-container { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
        .search-input { 
            width: 100%; 
            padding: 10px 14px; 
            background: var(--input-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            color: var(--input-text); 
            outline: none; 
            font-size: 14px; 
        }
        .search-input:focus { border-color: var(--text-secondary); }

        /* Кнопка швидкого додавання в списку пошуку */
        .quick-add-box {
            padding: 4px 6px;
            animation: itemIn 0.2s ease both;
        }
        .quick-add-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed var(--border-color);
            color: var(--text-main);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            font-size: 13px;
        }
        body.light-theme .quick-add-btn { background: rgba(0,0,0,0.04); }
        .quick-add-btn:hover { background: var(--text-main); color: var(--bg-body); }

        .section-title { padding: 12px 16px 6px 16px; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        
        #chats-list { flex-grow: 1; overflow-y: auto; padding: 0 8px 10px 8px; }
        .chat-item { 
            padding: 12px 14px; 
            margin-bottom: 4px; 
            border-radius: 14px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            user-select: none; 
            border: 1px solid transparent; 
            animation: itemIn 0.2s ease both;
        }
        @keyframes itemIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-item:hover { background: rgba(255, 255, 255, 0.04); }
        body.light-theme .chat-item:hover { background: rgba(0, 0, 0, 0.03); }
        .chat-item.active { background: rgba(255, 255, 255, 0.08); border-color: var(--border-color); }
        body.light-theme .chat-item.active { background: rgba(0, 0, 0, 0.06); }
        
        .chat-info-block { display: flex; align-items: center; gap: 12px; color: var(--text-main); }
        .chat-info-block span { font-weight: 500; font-size: 14px; }
        
        .status-dot { font-size: 11px; color: var(--text-secondary); padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.05); }
        body.light-theme .status-dot { background: rgba(0,0,0,0.04); }
        .status-dot.online { color: #ffffff; background: rgba(255, 255, 255, 0.2); font-weight: 600; }
        body.light-theme .status-dot.online { color: #000000; background: rgba(0, 0, 0, 0.1); }

        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-color); }
        .avatar-placeholder { 
            width: 40px; height: 40px; border-radius: 50%; 
            background: var(--text-main); color: var(--bg-body); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 14px; text-transform: uppercase; flex-shrink: 0; 
        }

        /* ПРАВА ПАНЕЛЬ ЧАТУ */
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-chat-main); position: relative; height: 100dvh; }
        
        #chat-header { 
            padding: 14px 20px; 
            background: var(--bg-header); 
            backdrop-filter: var(--blur-val);
            -webkit-backdrop-filter: var(--blur-val);
            border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; justify-content: space-between; height: 60px; z-index: 5;
        }
        .header-meta { display: flex; align-items: center; gap: 12px; }
        #chat-title-text { cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-main); font-weight: 600; }
        
        .back-btn { 
            display: none; background: var(--input-bg); border: 1px solid var(--border-color); 
            color: var(--text-main); padding: 6px 12px; border-radius: 14px; cursor: pointer; font-size: 13px; font-weight: 600; 
        }
        
        #messages { 
            list-style-type: none; padding: 20px; margin: 0; flex-grow: 1; overflow-y: auto; 
            display: flex; flex-direction: column; 
        }
        
        /* ПОВІДОМЛЕННЯ */
        .msg-container { position: relative; margin-bottom: 10px; display: flex; flex-direction: column; max-width: 65%; width: fit-content; animation: msgFadeIn 0.15s ease both; }
        .msg-container.my-wrapper { align-self: flex-end; }
        @keyframes msgFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        #messages li { 
            padding: 10px 14px; background: var(--msg-partner); border-radius: 16px; 
            border-top-left-radius: 4px; word-break: break-word; user-select: none; color: var(--text-main); 
            position: relative; cursor: pointer; width: 100%; border: 1px solid var(--border-color);
        }
        #messages li.my-msg { 
            background: var(--msg-my); 
            border-radius: 16px; border-top-right-radius: 4px; color: var(--text-main); 
        }
        
        /* Цитата відповіді */
        .msg-reply-quote {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid var(--text-main);
            padding: 4px 8px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-main);
            opacity: 0.8;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        body.light-theme .msg-reply-quote { background: rgba(0,0,0,0.05); }

        .msg-status { position: absolute; bottom: 3px; right: 8px; font-size: 10px; color: var(--text-secondary); }
        .msg-status.read { color: var(--text-main); font-weight: bold; }

        /* РЕАКЦІЇ */
        .reaction-picker { 
            position: absolute; top: -42px; left: 6px; background: var(--bg-sidebar); 
            border: 1px solid var(--border-color); border-radius: 30px; padding: 4px 10px; 
            display: none; gap: 8px; z-index: 50; box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
            animation: scaleUp 0.12s ease both; 
        }
        .msg-container.my-wrapper .reaction-picker { left: auto; right: 6px; }
        .reaction-picker span { font-size: 18px; cursor: pointer; }
        .reaction-picker span:hover { transform: scale(1.25); }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .reactions-holder { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .reaction-chip { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 12px; padding: 2px 7px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; color: var(--text-main); }
        body.light-theme .reaction-chip { background: rgba(0,0,0,0.03); }
        .reaction-chip.active-my { background: var(--text-main); color: var(--bg-body); font-weight: bold; }

        /* НИЖНЯ ФОРМА ВВЕДЕННЯ */
        #form-wrapper {
            background: var(--bg-header); 
            backdrop-filter: var(--blur-val); 
            -webkit-backdrop-filter: var(--blur-val);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 10px 14px 14px 14px;
        }
        
        #reply-preview-area {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--text-main);
            padding: 6px 12px;
            margin-bottom: 8px;
            border-radius: 4px;
        }
        body.light-theme #reply-preview-area { background: rgba(0,0,0,0.03); }
        #reply-preview-text { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 85%; color: var(--text-main); }
        .cancel-reply-btn { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; font-weight: bold; }

        #form { display: flex; gap: 10px; align-items: center; width: 100%; }
        #input { flex-grow: 1; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--input-text); border-radius: 20px; outline: none; font-size: 14px; }
        #input:focus { border-color: var(--text-secondary); }
        #button { padding: 11px 22px; background: var(--text-main); color: var(--bg-body); border: none; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 14px; }
        #button:hover { transform: scale(1.02); }
        
        .no-chat-selected { margin: auto; text-align: center; color: var(--text-secondary); font-size: 15px; }

        /* Контекстне меню */
        .context-menu { position: fixed; background: var(--bg-sidebar); backdrop-filter: var(--blur-val); -webkit-backdrop-filter: var(--blur-val); border: 1px solid var(--border-color); border-radius: 12px; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 170px; padding: 6px; }
        .context-menu button { background: none; border: none; color: var(--text-main); width: 100%; text-align: left; padding: 10px 12px; font-size: 13px; cursor: pointer; outline: none; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .context-menu button:hover { background: rgba(255, 255, 255, 0.08); }
        body.light-theme .context-menu button:hover { background: rgba(0, 0, 0, 0.04); }
        .context-menu button.delete-btn { color: #ef4444; }

        /* МОДАЛКИ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 12px; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-sidebar); backdrop-filter: var(--blur-val); border: 1px solid var(--border-color); padding: 22px; border-radius: 20px; width: 100%; max-width: 360px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); animation: modalBounce 0.18s ease both; }
        @keyframes modalBounce { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); color: var(--text-main); display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: rgba(255,255,255,0.05); border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .account-property { margin-bottom: 14px; font-size: 13px; }
        .account-property label { display: block; color: var(--text-secondary); margin-bottom: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .profile-name-input, .profile-desc-input { width: 100%; padding: 9px 12px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--input-text); border-radius: 8px; outline: none; font-size: 13px; }
        .profile-desc-input { resize: none; height: 65px; }

        .profile-avatar-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 18px; }
        .modal-avatar { width: 84px; height: 84px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
        .modal-avatar-placeholder { width: 84px; height: 84px; border-radius: 50%; background: var(--text-main); color: var(--bg-body); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        .upload-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 14px; border-radius: 14px; cursor: pointer; font-size: 12px; }

        .lang-select { width: 100%; padding: 8px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--input-text); border-radius: 8px; }
        .settings-logout-btn { width: 100%; padding: 10px; background: #b91c1c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; display: flex; }
            #chat-main { display: none; width: 100%; }
            body.chat-opened #sidebar { display: none; }
            body.chat-opened #chat-main { display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; height: 100dvh; }
            body.chat-opened .back-btn { display: block; }
            .msg-container { max-width: 85%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div class="my-profile" id="my-profile-name" onclick="openMyProfile()">...</div>
        <div class="header-controls">
            <button class="control-btn" onclick="toggleTheme()" title="Змінити тему">🌓</button>
            <button class="control-btn" id="settings-toggle-btn">⚙️</button>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Пошук або новий нік...">
        <div id="quick-add-container" class="quick-add-box" style="display: none;"></div>
    </div>

    <div class="section-title" id="lbl-dialogs">Діалоги</div>
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <div id="no-chat-placeholder" class="no-chat-selected">
        <p id="placeholder-text">BurmaldaGram<br><span style="font-size: 12px;">Оберіть чат для початку спілкування</span></p>
    </div>
    
    <div id="chat-area" style="display: none; flex-direction: column; height: 100%;">
        <div id="chat-header">
            <div class="header-meta">
                <button class="back-btn" id="btn-back">⬅ Назад</button>
                <span id="chat-title-text" onclick="openPartnerProfile()">Чат</span>
            </div>
            <div id="chat-typing-status" class="typing-indicator"></div>
        </div>
        
        <ul id="messages"></ul>
        
        <div id="form-wrapper">
            <div id="reply-preview-area">
                <div id="reply-preview-text">Відповідь на повідомлення...</div>
                <button class="cancel-reply-btn" onclick="cancelReply()">&times;</button>
            </div>
            <div id="form">
                <input id="input" autocomplete="off" placeholder="Напишіть повідомлення..." />
                <button id="button">Надіслати</button>
            </div>
        </div>
    </div>
</div>

<!-- Налаштування -->
<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <div class="modal-title">
            <span id="modal-title-text">⚙️ Налаштування</span>
            <button class="modal-close" id="settings-close-btn">&times;</button>
        </div>
        
        <div class="profile-avatar-container">
            <div id="modal-avatar-view"></div>
            <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" onchange="handleAvatarUpload(this)">
            <button class="upload-btn" id="lbl-upload-btn" onclick="document.getElementById('avatar-file-input').click()">📁 Фото</button>
        </div>

        <div id="account-info">
            <div class="account-property">
                <label id="lbl-profile-name">Ім'я в чаті:</label>
                <input type="text" id="profile-display-name" class="profile-name-input" oninput="saveMyDisplayName(this.value)">
            </div>
            <div class="account-property">
                <span id="lbl-profile">Юзернейм (ID):</span> <strong id="info-nick">...</strong>
            </div>
            <div class="account-property">
                <span id="lbl-status">Статус:</span> <strong id="lbl-online-status">...</strong>
            </div>
            <div class="account-property">
                <label id="lbl-bio-title">Про себе:</label>
                <textarea id="profile-desc" class="profile-desc-input" oninput="saveMyBio(this.value)"></textarea>
            </div>
            <div class="account-property" id="login-time-block">
                <label id="lbl-time">Час входу:</label> <span id="info-login-time" style="font-weight: bold;"></span>
            </div>
        </div>

        <div class="lang-select-container" id="lang-select-block">
            <label id="lbl-lang-title" style="display:block; font-size:11px; margin-bottom:4px; font-weight:bold;">Мова:</label>
            <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="uk">Українська</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>

        <button class="settings-logout-btn" id="btn-logout" onclick="logout()">Вийти 🚪</button>
    </div>
</div>

<div class="context-menu" id="global-context-menu"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

            ctxDeleteChat: "Видалити чат 🗑",

            notesTitle: "📝 Нотатки (Ви)"
        },
        ru: {

            placeholderText: "BurmaldaGram<br><span style='font-size: 13px;'>Выберите чат из списка</span>",
            backBtn: "⬅ Назад",
            inputPlaceholder: "Напишите сообщение...",
            btnSend: "Отправить",
            settingsTitle: "⚙️ Настройки",
            profileTitle: "👤 Профиль",
            profile: "Юзернейм (ID):",
            profileName: "Имя в чате:",
            status: "Статус:",
            online: "В сети",
            offline: "Оффлайн",
            loginTime: "Время входа:",
            logoutBtn: "Выйти 🚪",
            emptyList: "Чаты отсутствуют.",
            ctxDeleteChat: "Удалить чат 🗑",

            ctxDeleteMsg: "Убрать для всех 🗑",

            chatStatusOffline: "оффлайн",
            typingText: "печатает...",
            uploadBtn: "📁 Фото",
            bioPlaceholder: "О себе:",
            bioEmpty: "Ничего не указано",
            searchPlaceholder: "Поиск или новый ник...",
            notesTitle: "📝 Заметки (Вы)"
        },
        en: {
            dialogsTitle: "Dialogs",
            placeholderText: "BurmaldaGram<br><span style='font-size: 13px;'>Select a chat</span>",
            backBtn: "⬅ Back",
            inputPlaceholder: "Write a message...",
            btnSend: "Send",
            settingsTitle: "⚙️ Settings",
            profileTitle: "👤 Profile",
            profile: "Username (ID):",
            profileName: "Display Name:",
            status: "Status:",
            online: "Online",
            offline: "Offline",
            loginTime: "Login time:",
            logoutBtn: "Log out 🚪",
            emptyList: "No chats yet.",
            ctxDeleteChat: "Delete chat 🗑",
            ctxReply: "Reply ↩",
            ctxDeleteMsg: "Delete for all 🗑",
            chatStatusOnline: "online",
            chatStatusOffline: "offline",
            typingText: "is typing...",
            uploadBtn: "📁 Photo",
            bioPlaceholder: "About me:",
            bioEmpty: "Nothing specified",
            searchPlaceholder: "Search or new username...",
            notesTitle: "📝 Notes (You)"
        }
    };

    let currentLang = localStorage.getItem('burmalda_lang') || 'uk';
    const urlParams = new URLSearchParams(window.location.search);
    const authToken = urlParams.get('auth');
    let myNick = 'Аноним'; 
    let authorized = false;
    let sessionTimeString = 'Невідомо';
    let replyTargetMsg = null;

    if(localStorage.getItem('burmalda_theme') === 'light') {
        document.body.classList.add('light-theme');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('burmalda_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    if (authToken) {
        try {
            const decoded = decodeURIComponent(atob(authToken));
            const parts = decoded.split('_');
            myNick = parts[0]; 
            const loginTime = parseInt(parts[1]);
            if (!isNaN(loginTime)) {
                sessionTimeString = new Date(loginTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " " + new Date(loginTime).toLocaleDateString();
            }
            if (Date.now() - loginTime < 86400000 && myNick) authorized = true;
        } catch (e) { console.error(e); }
    }

    if (!authorized) {
        alert('Доступ заблоковано!'); window.location.href = '/'; 
    } else {
        document.body.style.display = 'flex';
    }

    const socket = io();
    let currentRoom = null;
    let currentActiveChatPartner = null;
    let onlineUsers = [];

    let savedMessages = {};
    try {
        const rawHistory = localStorage.getItem('burmalda_msg_history');
        if (rawHistory) savedMessages = JSON.parse(rawHistory);
    } catch (e) {}

    let localProfiles = JSON.parse(localStorage.getItem('burmalda_profiles_data')) || {};
    let activeChats = JSON.parse(localStorage.getItem('burmalda_chat_list')) || [];

    const chatsList = document.getElementById('chats-list');
    const chatPlaceholder = document.getElementById('no-chat-placeholder');
    const chatArea = document.getElementById('chat-area');
    const chatTitleText = document.getElementById('chat-title-text');
    const typingStatusEl = document.getElementById('chat-typing-status');
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('button');
    const contextMenu = document.getElementById('global-context-menu');
    const searchInput = document.getElementById('search-input');
    const quickAddContainer = document.getElementById('quick-add-container');
    const replyPreviewArea = document.getElementById('reply-preview-area');
    const replyPreviewText = document.getElementById('reply-preview-text');

    const settingsToggleBtn = document.getElementById('settings-toggle-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsCloseBtn = document.getElementById('settings-close-btn');

    settingsToggleBtn.onclick = () => { openMyProfile(); };
    settingsCloseBtn.onclick = () => { settingsModal.classList.remove('active'); };

    document.getElementById('btn-back').onclick = () => { if (document.body.classList.contains('chat-opened')) window.history.back(); };

    window.onpopstate = function() {
        if (document.body.classList.contains('chat-opened')) {
            document.body.classList.remove('chat-opened');
            currentActiveChatPartner = null; currentRoom = null; 
            chatArea.style.display = 'none'; chatPlaceholder.style.display = 'block'; 
            window.history.replaceState({}, "", window.location.pathname + '?auth=' + urlParams.get('auth'));
            renderChatsList();
        }
    };

    // Оновлена логіка сокетів — ПОВНИЙ захист від вилітання з онлайну
    socket.on('connect', () => {
        socket.emit('store user', myNick);
        socket.emit('request profiles'); 
        activeChats.forEach(p => { socket.emit('join room', p); });
    });

    searchInput.oninput = function() {
        const val = this.value.trim().toLowerCase();
        renderChatsList(val);
        
        // Інша беззапитна система додавання: якщо нік новий — пропонуємо додати прямо в списку
        if (val.length > 0 && val !== myNick.toLowerCase() && val !== '__notes__' && !activeChats.some(c => c.toLowerCase() === val)) {
            quickAddContainer.innerHTML = `<button class="quick-add-btn" onclick="addNewContactViaSearch('${this.value.trim()}')">➕ Додати "@${this.value.trim()}"</button>`;
            quickAddContainer.style.display = 'block';
        } else {
            quickAddContainer.style.display = 'none';
        }
    };

    function addNewContactViaSearch(username) {
        const cleanName = username.trim();
        if(!cleanName || cleanName === myNick) return;
        if (!activeChats.includes(cleanName)) {
            activeChats.push(cleanName);
            localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
        }
        socket.emit('join room', cleanName);
        searchInput.value = '';
        quickAddContainer.style.display = 'none';
        openChatWith(cleanName);
    }

    function getVisibleName(username) {
        if (username === '__notes__') return translations[currentLang].notesTitle;
        const uData = localProfiles[username];
        if (uData && uData.displayName && uData.displayName.trim() !== '') return uData.displayName.trim();
        return username;
    }

    function getAvatarHTML(username, cssClass = 'avatar') {
        if (username === '__notes__') return `<div class="${cssClass === 'avatar'?'avatar-placeholder':'modal-avatar-placeholder'}" style="background:#fff; color:#000;">📝</div>`;
        const uData = localProfiles[username];
        if (uData && uData.avatar) return `<img src="${uData.avatar}" class="${cssClass}" alt="">`;
        const visibleName = getVisibleName(username);
        const firstLetter = visibleName ? visibleName.charAt(0) : '?';
        const placeholderClass = cssClass === 'avatar' ? 'avatar-placeholder' : 'modal-avatar-placeholder';
        return `<div class="${placeholderClass}">${firstLetter}</div>`;
    }

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById('lang-select').value = currentLang;
        document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${getVisibleName(myNick)}</span>`;
        document.getElementById('lbl-dialogs').textContent = t.dialogsTitle;
        document.getElementById('placeholder-text').innerHTML = t.placeholderText;
        document.getElementById('btn-back').textContent = t.backBtn;
        searchInput.placeholder = t.searchPlaceholder;
        input.placeholder = t.inputPlaceholder;
        button.textContent = t.btnSend;

        document.getElementById('lbl-profile-name').textContent = t.profileName;
        document.getElementById('lbl-profile').textContent = t.profile;
        document.getElementById('lbl-status').textContent = t.status;
        document.getElementById('lbl-bio-title').textContent = t.bioPlaceholder;
        document.getElementById('lbl-time').textContent = t.loginTime;
        document.getElementById('btn-logout').textContent = t.logoutBtn;
        document.getElementById('lbl-upload-btn').textContent = t.uploadBtn;

        if (settingsModal.classList.contains('active')) {
            const openedNick = document.getElementById('info-nick').textContent;
            if(openedNick === '__notes__') {
                settingsModal.classList.remove('active');
                return;
            }
            const isMe = (openedNick === myNick);
            document.getElementById('modal-title-text').textContent = isMe ? t.settingsTitle : t.profileTitle;
            
            const isOnline = onlineUsers.includes(openedNick) || openedNick === myNick;
            const statusLabel = document.getElementById('lbl-online-status');
            statusLabel.textContent = isOnline ? t.online : t.offline;
            statusLabel.style.color = isOnline ? var(--text-main) : var(--text-secondary);
        }
        renderChatsList(searchInput.value.trim().toLowerCase()); 
        loadMessagesHistory();
    }

    function openMyProfile() {
        const t = translations[currentLang];
        document.getElementById('info-nick').textContent = myNick; 
        const myData = localProfiles[myNick] || { avatar: '', bio: '', displayName: '' };
        
        document.getElementById('profile-display-name').disabled = false;
        document.getElementById('profile-display-name').value = myData.displayName || myNick;
        document.getElementById('profile-desc').disabled = false;
        document.getElementById('profile-desc').value = myData.bio || '';
        document.getElementById('profile-desc').placeholder = t.bioEmpty;

        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar');
        document.getElementById('info-login-time').textContent = sessionTimeString;

        document.getElementById('lbl-upload-btn').style.display = 'block';
        document.getElementById('btn-logout').style.display = 'block';
        document.getElementById('lang-select-block').style.display = 'block';
        document.getElementById('login-time-block').style.display = 'block';

        settingsModal.classList.add('active');
        applyLanguage();
    }

    function openPartnerProfile() {
        if (!currentActiveChatPartner || currentActiveChatPartner === '__notes__') return;
        const t = translations[currentLang];
        document.getElementById('info-nick').textContent = currentActiveChatPartner; 

        const partnerData = localProfiles[currentActiveChatPartner] || { avatar: '', bio: '', displayName: '' };
        
        document.getElementById('profile-display-name').disabled = true;
        document.getElementById('profile-display-name').value = partnerData.displayName || currentActiveChatPartner;
        
        document.getElementById('profile-desc').disabled = true; 
        document.getElementById('profile-desc').value = partnerData.bio || '';
        document.getElementById('profile-desc').placeholder = t.bioEmpty;

        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(currentActiveChatPartner, 'modal-avatar');

        document.getElementById('lbl-upload-btn').style.display = 'none';
        document.getElementById('btn-logout').style.display = 'none';
        document.getElementById('lang-select-block').style.display = 'none';
        document.getElementById('login-time-block').style.display = 'none'; 

        settingsModal.classList.add('active');
        applyLanguage();
    }

    function changeLanguage(lang) {
        currentLang = lang; 
        localStorage.setItem('burmalda_lang', lang); 
        applyLanguage();
    }

    function saveMyDisplayName(newName) {
        if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
        localProfiles[myNick].displayName = newName;
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
        document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${getVisibleName(myNick)}</span>`;
        renderChatsList(searchInput.value.trim().toLowerCase());
        socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
    }

    function saveMyBio(text) {
        if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
        localProfiles[myNick].bio = text;
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
        socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
    }

    function handleAvatarUpload(inputEl) {
        const file = inputEl.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
            localProfiles[myNick].avatar = e.target.result;
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar');
            document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${getVisibleName(myNick)}</span>`;
            renderChatsList(searchInput.value.trim().toLowerCase());
            socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
        };
        reader.readAsDataURL(file);
    }

    socket.on('broadcast profile update', (packet) => {
        if (packet && packet.user && packet.data) {
            localProfiles[packet.user] = packet.data;
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            renderChatsList(searchInput.value.trim().toLowerCase());
            if (currentActiveChatPartner === packet.user) {
                chatTitleText.innerHTML = `${getAvatarHTML(packet.user)} <span>${getVisibleName(packet.user)}</span>`;
            }
        }
    });

    socket.on('all profiles data', (serverProfiles) => {
        if (serverProfiles) {
            localProfiles = { ...localProfiles, ...serverProfiles };
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            applyLanguage();
        }
    });

    socket.on('online users', (users) => { 
        onlineUsers = Array.isArray(users) ? users : []; 
        renderChatsList(searchInput.value.trim().toLowerCase()); 
    });

    input.oninput = () => {
        if (currentRoom && currentActiveChatPartner !== '__notes__') {
            socket.emit('private chat message', { room: currentRoom, text: '[TYPING_SIGNAL]', user: myNick });
        }
    };

    let remoteTypingTimer = null;

    socket.on('chat message', (data) => {
        if (!data || !data.room) return;
        const roomKey = String(data.room);

        if (data.text === '[TYPING_SIGNAL]') {
            if (roomKey === currentRoom && data.user !== myNick) {
                typingStatusEl.textContent = translations[currentLang].typingText;
                typingStatusEl.style.display = 'block';
                clearTimeout(remoteTypingTimer);
                remoteTypingTimer = setTimeout(() => { typingStatusEl.style.display = 'none'; }, 250);
            }
            return;
        }

        if (data.text === '[READ_SIGNAL]') {
            if (roomKey === currentRoom && data.user !== myNick) {
                const systemStatuses = messagesContainer.querySelectorAll('.msg-status');
                systemStatuses.forEach(span => { span.textContent = '✓✓'; span.classList.add('read'); });
                if (savedMessages[roomKey]) {
                    savedMessages[roomKey].forEach(m => { if(m.user === myNick) m.isRead = true; });
                    localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
                }
            }
            return;
        }

        // Автододавання контакту, якщо нам хтось написав
        if (data.user !== myNick) {
            if (!activeChats.includes(data.user)) {
                activeChats.push(data.user);
                localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
                renderChatsList(searchInput.value.trim().toLowerCase());
            }
        }

        if (data.user === myNick) return;
        if (!savedMessages[roomKey]) savedMessages[roomKey] = [];
        
        const isDuplicate = savedMessages[roomKey].some(m => m.msgId === data.msgId);
        if (!isDuplicate) {
            savedMessages[roomKey].push(data);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }

        if (roomKey === currentRoom) {
            setTimeout(sendReadSignal, 200); 
            typingStatusEl.style.display = 'none';
            displaySingleMessage(data);
        }
    });

    socket.on('message_delete_broadcast', (data) => {
        const { room, msgId } = data;
        if (savedMessages[room]) {
            savedMessages[room] = savedMessages[room].filter(m => m.msgId !== msgId);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }
        if (room === currentRoom) {
            const wrapper = document.getElementById('wrapper-' + msgId);
            if (wrapper) wrapper.remove();
        }
    });

    socket.on('update_message_data', (data) => {
        const { room, msgId, reactions } = data;
        if (room !== currentRoom) return;
        if (savedMessages[room]) {
            const localMsg = savedMessages[room].find(m => m.msgId === msgId);
            if (localMsg) localMsg.reactions = reactions;
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }
        const holder = document.getElementById('reactions-holder-' + msgId);
        if (holder) renderReactions(msgId, reactions, holder);
    });

    function renderChatsList(filterText = '') {
        chatsList.innerHTML = ''; const t = translations[currentLang];
        
        // Рендеримо закріплені чат-нотатки на самому верху
        if (t.notesTitle.toLowerCase().includes(filterText) || 'нотатки'.includes(filterText)) {
            const notesItem = document.createElement('div');
            notesItem.className = 'chat-item' + (currentActiveChatPartner === '__notes__' ? ' active' : '');
            notesItem.innerHTML = `
                <div class="chat-info-block">${getAvatarHTML('__notes__')}<span>${t.notesTitle}</span></div>
                <span class="status-dot">📝 cloud</span>
            `;
            notesItem.onclick = () => openChatWith('__notes__');
            chatsList.appendChild(notesItem);
        }

        const filtered = activeChats.filter(user => {
            if (!user || user === '__notes__') return false;
            return getVisibleName(user).toLowerCase().includes(filterText) || user.toLowerCase().includes(filterText);
        });

        filtered.forEach((user) => {
            const item = document.createElement('div'); 
            item.className = 'chat-item' + (currentActiveChatPartner === user ? ' active' : '');
            const isOnline = onlineUsers.includes(user);
            item.innerHTML = `
                <div class="chat-info-block">${getAvatarHTML(user)}<span>${getVisibleName(user)}</span></div>
                <span class="status-dot ${isOnline?'online':''}">${isOnline ? t.chatStatusOnline : t.chatStatusOffline}</span>
            `;
            item.onclick = () => openChatWith(user);
            item.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); showChatContextMenu(e.clientX, e.clientY, user); };
            chatsList.appendChild(item);
        });
    }

    function openChatWith(user) {
        if (!user) return;
        currentActiveChatPartner = user;
        
        if (user === '__notes__') {
            currentRoom = 'notes_' + myNick;
        } else {
            currentRoom = [myNick, user].sort().join('_');
            socket.emit('join room', user);
        }

        chatPlaceholder.style.display = 'none'; chatArea.style.display = 'flex';
        chatTitleText.innerHTML = `${getAvatarHTML(user)} <span>${getVisibleName(user)}</span>`;
        
        if (!document.body.classList.contains('chat-opened')) {
            const newUrl = window.location.pathname + window.location.search + '&chat=' + encodeURIComponent(user);
            window.history.pushState({ chatOpened: true, partner: user }, "", newUrl);
        }
        document.body.classList.add('chat-opened');
        
        cancelReply();
        loadMessagesHistory(); 
        renderChatsList(searchInput.value.trim().toLowerCase()); 
        sendReadSignal();
        setTimeout(() => { input.focus(); }, 100);
    }

    function sendMessage() {
        const text = input.value.trim();
        if (text && currentRoom) {
            const generatedId = 'msg-' + Date.now() + Math.floor(Math.random() * 1000);
            
            const msgPacket = {
                room: currentRoom, 
                text: text, 
                user: myNick, 
                msgId: generatedId, 
                isRead: (currentActiveChatPartner === '__notes__'), 
                time: Date.now(), 
                reactions: {},
                replyTo: replyTargetMsg ? { msgId: replyTargetMsg.msgId, user: replyTargetMsg.user, text: replyTargetMsg.text } : null
            };

            if (!savedMessages[currentRoom]) savedMessages[currentRoom] = [];
            savedMessages[currentRoom].push(msgPacket);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
            displaySingleMessage(msgPacket);
            
            if (currentActiveChatPartner !== '__notes__') {
                socket.emit('private chat message', msgPacket);
            }
            
            input.value = ''; 
            cancelReply();
            input.focus();
        }
    }

    function sendReadSignal() { 
        if (currentRoom && currentActiveChatPartner !== '__notes__') {
            socket.emit('private chat message', { room: currentRoom, text: '[READ_SIGNAL]', user: myNick }); 
        }
    }

    button.onclick = sendMessage; input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    function loadMessagesHistory() {
        messagesContainer.innerHTML = '';
        if (currentRoom && savedMessages && savedMessages[currentRoom]) {
            const historyArray = savedMessages[currentRoom];
            if (Array.isArray(historyArray)) historyArray.forEach(displaySingleMessage);
        }
    }

    function renderReactions(msgId, reactions, holderElement) {
        holderElement.innerHTML = ''; if (!reactions) return;
        Object.keys(reactions).forEach(emoji => {
            const voters = reactions[emoji];
            if (!Array.isArray(voters) || voters.length === 0) return;
            const hasMyVote = voters.includes(myNick);
            const chip = document.createElement('div');
            chip.className = 'reaction-chip' + (hasMyVote ? ' active-my' : '');
            chip.innerHTML = `${emoji} <span>${voters.length}</span>`;
            chip.onclick = (e) => {
                e.stopPropagation();
                if (currentActiveChatPartner === '__notes__') return;
                socket.emit('message_reaction', {
                    room: currentRoom, msgId: msgId, reaction: hasMyVote ? null : emoji, username: myNick
                });
            };
            holderElement.appendChild(chip);
        });
    }

    function displaySingleMessage(data) {
        if (!messagesContainer || !data) return;
        let wrapper = document.getElementById('wrapper-' + data.msgId);
        if (wrapper) {
            if (data.isRead) {
                const existingStatus = wrapper.querySelector('.msg-status');
                if (existingStatus) { existingStatus.textContent = '✓✓'; existingStatus.classList.add('read'); }
            }
            return;
        }
        
        const msgTime = data.time ? new Date(data.time) : new Date();
        const hours = String(msgTime.getHours()).padStart(2, '0');
        const minutes = String(msgTime.getMinutes()).padStart(2, '0');

        wrapper = document.createElement('div');
        wrapper.id = 'wrapper-' + data.msgId;
        wrapper.className = 'msg-container' + (data.user === myNick ? ' my-wrapper' : '');

        const picker = document.createElement('div');
        picker.className = 'reaction-picker';
        const emojis = ['👍', '🔥', '❤️', '😂', '😮', '💩', '🤡'];
        emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.textContent = emoji;
            span.onclick = (e) => {
                e.stopPropagation(); picker.style.display = 'none';
                if (currentActiveChatPartner === '__notes__') return;
                const currentReactions = data.reactions || {};
                const alreadyHasIt = currentReactions[emoji] && currentReactions[emoji].includes(myNick);
                socket.emit('message_reaction', { room: currentRoom, msgId: data.msgId, reaction: alreadyHasIt ? null : emoji, username: myNick });
            };
            picker.appendChild(span);
        });

        const item = document.createElement('li');
        item.id = data.msgId;
        if (data.user === myNick) item.classList.add('my-msg');
        
        if(data.replyTo) {
            const replyQuote = document.createElement('div');
            replyQuote.className = 'msg-reply-quote';
            replyQuote.innerHTML = `<b>${getVisibleName(data.replyTo.user)}</b>: ${data.replyTo.text}`;
            item.appendChild(replyQuote);
        }

        const textSpan = document.createElement('span');
        textSpan.textContent = data.text;
        item.appendChild(textSpan);

        const timeHtml = `<span style="font-size: 10px; opacity:0.5; margin-left: 8px; float: right; margin-top: 4px;">${hours}:${minutes}</span>`;
        
        if (data.user === myNick) {
            const checkRead = data.isRead ? '✓✓' : '✓';
            const readClass = data.isRead ? 'msg-status read' : 'msg-status';
            item.insertAdjacentHTML('beforeend', `${timeHtml}<span class="${readClass}" style="margin-left:5px; position:static; float:right; margin-top:4px;">${checkRead}</span>`);
        } else {
            item.insertAdjacentHTML('beforeend', timeHtml);
        }

        item.onclick = (e) => {
            e.stopPropagation(); 
            if (currentActiveChatPartner === '__notes__') return;
            const currentDisplay = picker.style.display;
            document.querySelectorAll('.reaction-picker').forEach(p => p.style.display = 'none');
            picker.style.display = currentDisplay === 'flex' ? 'none' : 'flex';
        };

        item.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); showMsgContextMenu(e.clientX, e.clientY, data); };

        let pressTimer;
        item.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => {
                const touch = e.touches[0];
                showMsgContextMenu(touch.clientX, touch.clientY, data);
            }, 550);
        }, { passive: true });
        item.addEventListener('touchend', () => clearTimeout(pressTimer));
        item.addEventListener('touchmove', () => clearTimeout(pressTimer));

        const reactionsHolder = document.createElement('div');
        reactionsHolder.id = 'reactions-holder-' + data.msgId;
        reactionsHolder.className = 'reactions-holder';

        wrapper.appendChild(picker); wrapper.appendChild(item); wrapper.appendChild(reactionsHolder);
        messagesContainer.appendChild(wrapper);
        renderReactions(data.msgId, data.reactions, reactionsHolder);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showMsgContextMenu(x, y, msgData) {
        const t = translations[currentLang];
        contextMenu.style.left = `${x}px`; contextMenu.style.top = `${y}px`;
        
        let html = `<button onclick="window.setupReplyMessage('${msgData.msgId}')">↩ ${t.ctxReply}</button>`;
        if(msgData.user === myNick) {
            html += `<button onclick="window.executeDeleteMessage('${msgData.msgId}')" class="delete-btn">🗑 ${t.ctxDeleteMsg}</button>`;
        }
        
        contextMenu.innerHTML = html;
        contextMenu.style.display = 'block';
    }

    window.setupReplyMessage = function(msgId) {
        if(!savedMessages[currentRoom]) return;
        const msg = savedMessages[currentRoom].find(m => m.msgId === msgId);
        if(!msg) return;
        replyTargetMsg = msg;
        replyPreviewText.innerHTML = `↩ Відповідь <b>${getVisibleName(msg.user)}</b>:<br><small>${msg.text}</small>`;
        replyPreviewArea.style.display = 'flex';
        input.focus();
    };

    window.cancelReply = function() { replyTargetMsg = null; replyPreviewArea.style.display = 'none'; };

    window.executeDeleteMessage = function(msgId) {
        if (savedMessages[currentRoom]) {
            savedMessages[currentRoom] = savedMessages[currentRoom].filter(m => m.msgId !== msgId);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }
        const wrapper = document.getElementById('wrapper-' + msgId);
        if (wrapper) wrapper.remove();
        
        if (currentActiveChatPartner !== '__notes__') {
            socket.emit('private chat message', { room: currentRoom, text: '[DELETE_SIGNAL]', msgId: msgId, user: myNick });
            socket.emit('delete_message_broadcast', { room: currentRoom, msgId: msgId });
        }
    };

    document.addEventListener('click', () => {
        document.querySelectorAll('.reaction-picker').forEach(p => p.style.display = 'none');
        contextMenu.style.display = 'none';
    });

    function showChatContextMenu(x, y, partnerNick) {
        contextMenu.style.left = `${x}px`; contextMenu.style.top = `${y}px`;
        contextMenu.innerHTML = `<button onclick="window.executeDeleteChat('${partnerNick}')" class="delete-btn">${translations[currentLang].ctxDeleteChat}</button>`;
        contextMenu.style.display = 'block';
    }

    window.executeDeleteChat = function(partnerNick) {
        const generatedRoom = [myNick, partnerNick].sort().join('_');
        if (savedMessages[generatedRoom]) delete savedMessages[generatedRoom];
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        activeChats = activeChats.filter(c => c !== partnerNick);
        localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
        if (generatedRoom === currentRoom) {
            currentActiveChatPartner = null; currentRoom = null;
            chatArea.style.display = 'none'; chatPlaceholder.style.display = 'block'; 
        }
        renderChatsList(searchInput.value.trim().toLowerCase());
    };

    function logout() { localStorage.removeItem('burmalda_auth_token'); window.location.href = '/'; }
    applyLanguage();
</script>
</body>
</html>
