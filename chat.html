<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaldaGram</title>
    <style>
        /* --- ОСНОВНЫЕ СТИЛИ ИНТЕРФЕЙСА (ТЕМНАЯ ТЕМА) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0e1621; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        .app-container { display: flex; width: 100%; height: 100%; }
        
        /* Боковая панель */
        .sidebar { width: 320px; background-color: #17212b; border-right: 1px solid #101921; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #101921; }
        .user-block { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #2b5278; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .nav-icons { display: flex; gap: 15px; color: #6c7883; cursor: pointer; }
        .section-title { padding: 10px 15px; font-size: 12px; color: #4e657a; font-weight: bold; text-transform: uppercase; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; cursor: pointer; transition: 0.2s; }
        .chat-item:hover, .chat-item.active { background-color: #202b36; }
        .chat-info { display: flex; align-items: center; gap: 10px; }
        .chat-status { font-size: 12px; color: #6c7883; }
        .chat-status.online { color: #40a7e3; }

        /* Основное окно чата */
        .chat-window { flex: 1; background-color: #0e1621; display: flex; flex-direction: column; position: relative; }
        .chat-header { height: 60px; background-color: #17212b; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid #101921; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-area { padding: 15px; background-color: #17212b; display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background-color: #24303f; border: none; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        .btn-send { background-color: #1f7ec1; border: none; padding: 12px 24px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        .btn-send:hover { background-color: #248fda; }

        /* МОДАЛЬНОЕ ОКНО ПРОФИЛЯ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: #17212b; width: 400px; border-radius: 12px; padding: 25px; border: 1px solid #2b394a; position: relative; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: bold; color: #40a7e3; display: flex; align-items: center; gap: 8px; }
        .close-btn { cursor: pointer; font-size: 20px; color: #6c7883; background: none; border: none; }
        
        .avatar-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
        .modal-avatar { width: 90px; height: 90px; font-size: 36px; }
        .upload-btn { background: #24303f; color: #e2e2e2; border: 1px solid #3b4d61; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #7f91a4; margin-bottom: 5px; }
        .form-input, .form-textarea { width: 100%; background: #101921; border: 1px solid #24303f; border-radius: 6px; padding: 10px; color: #fff; outline: none; font-size: 14px; }
        .form-textarea { resize: none; height: 70px; }
        .form-input:disabled, .form-textarea:disabled { background: #141d26; color: #888; border-color: #1c2630; cursor: not-allowed; }
        
        .status-text { font-size: 14px; font-weight: bold; }
        .status-text.offline { color: #ee6060; }
        .status-text.online { color: #4db872; }

        .btn-logout { width: 100%; background-color: #da4453; border: none; padding: 12px; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn-logout:hover { background-color: #e95765; }
        
        select.form-input { cursor: pointer; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' fill='white'><path d='M25 35L10 15h30z'/></svg>"); background-size: 12px; background-repeat: no-repeat; background-position: calc(100% - 10px) center; padding-right: 30px; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- БОКОВАЯ ПАНЕЛЬ -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-block" onclick="openMyProfile()">
                    <div class="avatar" id="my-avatar-top">О</div>
                    <span id="my-name-top" style="font-weight: bold;">остап</span>
                </div>
                <div class="nav-icons">
                    <span>🔍</span>
                    <span onclick="openMyProfile()">⚙️</span>
                </div>
            </div>
            <div class="section-title" id="lbl-dialogs">Ваші діалоги</div>
            <div class="chat-list" id="chats-container">
                <!-- Рендерится скриптом -->
            </div>
        </div>

        <!-- ОКНО ЧАТА -->
        <div class="chat-window">
            <div class="chat-header" id="chat-header-user" style="cursor:pointer;" onclick="openPartnerProfile()">
                <div class="avatar" id="active-chat-avatar">-</div>
                <span id="active-chat-name" style="font-weight: bold;">Выберите чат</span>
            </div>
            <div class="chat-messages" id="messages-container">
                <div style="color: #6c7883; text-align: center; margin-top: 50px;" id="placeholder-text">Выберите, кому хотите написать</div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="message-input" placeholder="Напішіть повідомлення...">
                <button class="btn-send" id="btn-send">Надіслати</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО НАСТРОЕК / ПРОФИЛЯ -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title">
                    👤 <span id="modal-title-text">Профіль користувача</span>
                </div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>

            <div class="avatar-container">
                <div class="avatar modal-avatar" id="modal-avatar-view">D</div>
                <!-- Кнопка загрузки фото (скрывается в чужом профиле) -->
                <button class="upload-btn" id="btn-upload-photo">📁 <span id="lbl-upload-btn">Загрузить фото</span></button>
            </div>

            <div class="form-group">
                <label id="lbl-profile-name">Имя в чате (Ник):</label>
                <input type="text" class="form-input" id="profile-display-name">
            </div>

            <div class="form-group">
                <span id="lbl-username-id">Юзернейм (ID):</span> <strong id="info-nick">durov</strong>
            </div>

            <div class="form-group">
                <span id="lbl-status">Статус:</span> <span class="status-text offline" id="lbl-online-status">офлайн</span>
            </div>

            <div class="form-group">
                <label id="lbl-bio-title">О себе / Описание:</label>
                <!-- Поле остается видимым всегда, но блокируется через JS для чужих -->
                <textarea class="form-textarea" id="profile-desc"></textarea>
            </div>

            <!-- Блок Времени Входа (Показывается ТОЛЬКО владельцу) -->
            <div class="form-group" id="login-time-block">
                <label id="lbl-time">Время входа:</label>
                <span id="info-login-time" style="font-size: 14px; font-weight: bold; color: #40a7e3;">16.06.2026 15:36</span>
            </div>

            <!-- Блок Выбора Языка (Показывается ТОЛЬКО владельцу) -->
            <div class="form-group" id="lang-select-block">
                <label id="lbl-lang-title">Язык приложения / Мова:</label>
                <select class="form-input" id="lang-select" onchange="changeLanguage(this.value)">
                    <option value="ru">Русский</option>
                    <option value="uk">Українська</option>
                    <option value="en">English</option>
                </select>
            </div>

            <!-- Кнопка Выхода (Скрывается в чужом профиле) -->
            <button class="btn-logout" id="btn-logout">Выйти из профиля 🚪</button>
        </div>
    </div>

    <script>
        // --- ДАННЫЕ И ЛОКАЛИЗАЦИЯ ---
        const translations = {
            ru: {
                settingsTitle: "Настройки профиля",
                profileTitle: "Профиль пользователя",
                profileName: "Имя в чате (Ник):",
                usernameId: "Юзернейм (ID):",
                status: "Статус:",
                bioPlaceholder: "О себе / Описание:",
                loginTime: "Время входа:",
                langTitle: "Язык приложения:",
                logoutBtn: "Выйти из профиля 🚪",
                uploadBtn: "Загрузить фото",
                online: "онлайн",
                offline: "офлайн",
                dialogsTitle: "Ваши диалоги",
                placeholderText: "Выберите, кому хотите написать",
                inputPlaceholder: "Напишите сообщение...",
                btnSend: "Отправить"
            },
            uk: {
                settingsTitle: "Налаштування профілю",
                profileTitle: "Профіль користувача",
                profileName: "Ім'я в чаті (Нік):",
                usernameId: "Юзернейм (ID):",
                status: "Статус:",
                bioPlaceholder: "Про себе / Опис:",
                loginTime: "Час входу:",
                langTitle: "Мова додатка:",
                logoutBtn: "Вийти з профілю 🚪",
                uploadBtn: "Завантажити фото",
                online: "онлайн",
                offline: "офлайн",
                dialogsTitle: "Ваші діалоги",
                placeholderText: "Оберіть, кому хочете написати",
                inputPlaceholder: "Напишіть повідомлення...",
                btnSend: "Надіслати"
            },
            en: {
                settingsTitle: "Profile Settings",
                profileTitle: "User Profile",
                profileName: "Chat Name (Nickname):",
                usernameId: "Username (ID):",
                status: "Status:",
                bioPlaceholder: "About me / Description:",
                loginTime: "Login Time:",
                langTitle: "App Language:",
                logoutBtn: "Log Out 🚪",
                uploadBtn: "Upload Photo",
                online: "online",
                offline: "offline",
                dialogsTitle: "Your Dialogs",
                placeholderText: "Select someone to chat with",
                inputPlaceholder: "Write a message...",
                btnSend: "Send"
            }
        };

        // Состояние приложения
        let currentLang = "uk"; // По умолчанию украинский, как на скрине
        let myNick = "остап";
        let currentActiveChatPartner = "durov";
        const onlineUsers = ["остап"]; // durov в офлайне
        let sessionTimeString = "16.06.2026 15:36";

        // Симуляция базы данных профилей
        let localProfiles = {
            "остап": { avatar: "О", bio: "Пишу код на коленке", displayName: "остап" },
            "durov": { avatar: "D", bio: "Nothing specified", displayName: "durov" },
            "gg": { avatar: "G", bio: "Привет, я тут!", displayName: "gg" }
        };

        const usersList = ["остап", "durov", "gg", "Alexafti", "Бурмалда", "чекушка"];

        // Элементы DOM
        const settingsModal = document.getElementById('profileModal');
        const messageInput = document.getElementById('message-input');
        const btnSend = document.getElementById('btn-send');

        // Инициализация при старте страницы
        window.onload = function() {
            applyLanguage();
            renderChatsList();
            selectChat(currentActiveChatPartner);
        };

        // Смена языка из селектора
        function changeLanguage(lang) {
            currentLang = lang;
            applyLanguage();
        }

        // --- ФУНКЦИЯ ДИНАМИЧЕСКОГО ПЕРЕВОДА ИНТЕРФЕЙСА ---
        function applyLanguage() {
            const t = translations[currentLang];
            
            // Локализация основного экрана
            document.getElementById('lbl-dialogs').textContent = t.dialogsTitle;
            document.getElementById('placeholder-text').textContent = t.placeholderText;
            messageInput.placeholder = t.inputPlaceholder;
            btnSend.textContent = t.btnSend;
            
            // Локализация текстов внутри модалки (переводятся на лету)
            document.getElementById('lbl-profile-name').textContent = t.profileName;
            document.getElementById('lbl-username-id').textContent = t.usernameId;
            document.getElementById('lbl-status').textContent = t.status;
            document.getElementById('lbl-bio-title').textContent = t.bioPlaceholder;
            document.getElementById('lbl-time').textContent = t.loginTime;
            document.getElementById('lbl-lang-title').textContent = t.langTitle;
            document.getElementById('btn-logout').innerHTML = t.logoutBtn;
            document.getElementById('lbl-upload-btn').textContent = t.uploadBtn;

            // Синхронизируем значение селектора языка
            document.getElementById('lang-select').value = currentLang;

            // Если модалка сейчас открыта, обновляем в ней статус и заголовки в зависимости от того, чей это профиль
            if (settingsModal.classList.contains('active')) {
                const isMe = (document.getElementById('info-nick').textContent === myNick);
                document.getElementById('modal-title-text').textContent = isMe ? t.settingsTitle : t.profileTitle;
                
                const currentNick = document.getElementById('info-nick').textContent;
                const isOnline = onlineUsers.includes(currentNick);
                const statusElem = document.getElementById('lbl-online-status');
                statusElem.textContent = isOnline ? t.online : t.offline;
                statusElem.className = `status-text ${isOnline ? 'online' : 'offline'}`;
            }

            renderChatsList();
        }

        // --- ОТКРЫТИЕ СВОЕГО ПРОФИЛЯ (НАСТРОЙКИ) ---
        function openMyProfile() {
            const t = translations[currentLang];
            
            document.getElementById('modal-title-text').textContent = t.settingsTitle;
            document.getElementById('info-nick').textContent = myNick;
            
            const myData = localProfiles[myNick] || { avatar: 'О', bio: '', displayName: myNick };
            
            // РАЗРЕШАЕМ редактировать свои поля
            document.getElementById('profile-display-name').disabled = false;
            document.getElementById('profile-display-name').value = myData.displayName;
            document.getElementById('profile-desc').disabled = false;
            document.getElementById('profile-desc').value = myData.bio;

            // Рендер аватарки
            document.getElementById('modal-avatar-view').textContent = myData.avatar;

            // ПОКАЗЫВАЕМ элементы владельца: смену фото, выход, смену языка, время входа
            document.getElementById('btn-upload-photo').style.display = 'flex';
            document.getElementById('btn-logout').style.display = 'flex';
            document.getElementById('lang-select-block').style.display = 'block';
            document.getElementById('login-time-block').style.display = 'block';
            document.getElementById('info-login-time').textContent = sessionTimeString;

            const isOnline = onlineUsers.includes(myNick);
            document.getElementById('lbl-online-status').textContent = isOnline ? t.online : t.offline;
            document.getElementById('lbl-online-status').className = `status-text ${isOnline ? 'online' : 'offline'}`;

            settingsModal.classList.add('active');
        }

        // --- ОТКРЫТИЕ ЧУЖОГО ПРОФИЛЯ (ПРОСМОТР) ---
        function openPartnerProfile() {
            if (!currentActiveChatPartner) return;
            const t = translations[currentLang];
            
            document.getElementById('modal-title-text').textContent = t.profileTitle;
            document.getElementById('info-nick').textContent = currentActiveChatPartner;
            
            const partnerData = localProfiles[currentActiveChatPartner] || { avatar: currentActiveChatPartner[0].toUpperCase(), bio: 'Nothing specified', displayName: currentActiveChatPartner };
            
            // ЖЕСТКАЯ БЛОКИРОВКА инпутов от изменений (Имя + О себе остаются на месте)
            document.getElementById('profile-display-name').disabled = true;
            document.getElementById('profile-display-name').value = partnerData.displayName;
            
            document.getElementById('profile-desc').disabled = true; // Оставляем поле, но запрещаем редактировать!
            document.getElementById('profile-desc').value = partnerData.bio;

            // Рендер аватарки партнера
            document.getElementById('modal-avatar-view').textContent = partnerData.avatar;

            // СКРЫВАЕМ элементы управления, чтобы нельзя было сломать чужой профиль или выйти из своего
            document.getElementById('btn-upload-photo').style.style.display = 'none';
            document.getElementById('btn-logout').style.display = 'none';
            document.getElementById('lang-select-block').style.display = 'none'; // Скрываем смену языка из чужого профиля
            document.getElementById('login-time-block').style.display = 'none'; // Прячем время входа (убирает баг перекрытия)

            const isOnline = onlineUsers.includes(currentActiveChatPartner);
            document.getElementById('lbl-online-status').textContent = isOnline ? t.online : t.offline;
            document.getElementById('lbl-online-status').className = `status-text ${isOnline ? 'online' : 'offline'}`;

            settingsModal.classList.add('active');
        }

        function closeModal() {
            settingsModal.classList.remove('active');
        }

        // Вспомогательные функции рендера списка чатов
        function renderChatsList() {
            const container = document.getElementById('chats-container');
            const t = translations[currentLang];
            container.innerHTML = '';
            
            usersList.forEach(user => {
                const isOnline = onlineUsers.includes(user);
                const data = localProfiles[user] || { avatar: user[0].toUpperCase(), displayName: user };
                const isActive = user === currentActiveChatPartner ? 'active' : '';
                
                const html = `
                    <div class="chat-item ${isActive}" onclick="selectChat('${user}')">
                        <div class="chat-info">
                            <div class="avatar">${data.avatar}</div>
                            <span style="font-weight: 500;">${data.displayName}</span>
                        </div>
                        <span class="chat-status ${isOnline ? 'online' : ''}">${isOnline ? t.online : t.offline}</span>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function selectChat(user) {
            currentActiveChatPartner = user;
            const data = localProfiles[user] || { avatar: user[0].toUpperCase(), displayName: user };
            document.getElementById('active-chat-avatar').textContent = data.avatar;
            document.getElementById('active-chat-name').textContent = data.displayName;
            document.getElementById('messages-container').innerHTML = `<div style='color: #6c7883; text-align: center; margin-top: 50px;'>Диалог с пользователем ${data.displayName} пуст.</div>`;
            renderChatsList();
        }
    </script>
</body>
</html>
