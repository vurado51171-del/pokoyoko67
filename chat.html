<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram Premium Glass</title>
    <style>
        :root {
            --bg-body: #060907;
            --bg-sidebar: rgba(10, 15, 12, 0.45);
            --bg-chat-main: rgba(15, 22, 18, 0.2);
            --bg-header: rgba(10, 15, 12, 0.6);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-secondary: #7f928a;
            --msg-partner: rgba(28, 38, 33, 0.75);
            --msg-my: rgba(16, 185, 129, 0.18);
            --input-bg: rgba(10, 15, 12, 0.7);
            --input-text: #ffffff;
            --blur-val: blur(30px);
            --accent-color: #10b981;
        }

        body.light-theme {
            --bg-body: #f4f7f5;
            --bg-sidebar: rgba(240, 244, 241, 0.65);
            --bg-chat-main: rgba(255, 255, 255, 0.3);
            --bg-header: rgba(240, 244, 241, 0.7);
            --border-color: rgba(0, 0, 0, 0.06);
            --text-main: #111827;
            --text-secondary: #6b7c74;
            --msg-partner: rgba(230, 235, 232, 0.9);
            --msg-my: rgba(16, 185, 129, 0.25);
            --input-bg: rgba(255, 255, 255, 0.85);
            --input-text: #111827;
            --blur-val: blur(30px);
            --accent-color: #059669;
        }

        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg-body); color: var(--text-main); }
        body { display: flex; position: relative; }

        .liquid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; overflow: hidden; pointer-events: none;
        }
        .liquid-blob {
            position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.35;
            animation: floatAround 25s infinite alternate ease-in-out;
        }
        .blob-green { width: 450px; height: 450px; background: #10b981; top: -10%; left: 20%; animation-duration: 22s; }
        .blob-white { width: 350px; height: 350px; background: #ffffff; bottom: 10%; right: 15%; animation-duration: 28s; opacity: 0.15; }
        .blob-black { width: 500px; height: 500px; background: #000000; bottom: -5%; left: -10%; animation-duration: 32s; opacity: 0.6; }
        body.light-theme .blob-black { opacity: 0.08; background: #a7f3d0; }

        @keyframes floatAround {
            0% { transform: translateY(0px) scale(1) rotate(0deg); }
            50% { transform: translateY(40px) translateX(30px) scale(1.1) rotate(180deg); }
            100% { transform: translateY(-20px) translateX(-40px) scale(0.95) rotate(360deg); }
        }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 10px; opacity: 0.2; }

        #sidebar { 
            width: 350px; background: var(--bg-sidebar); backdrop-filter: var(--blur-val); -webkit-backdrop-filter: var(--blur-val);
            border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; height: 100dvh;
        }
        
        .sidebar-header { padding: 16px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .my-profile { font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 6px 12px; border-radius: 20px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); }
        body.light-theme .my-profile { background: rgba(0, 0, 0, 0.02); }
        .my-profile:hover { transform: scale(1.02); background: rgba(255,255,255,0.07); }
        
        .header-controls { display: flex; gap: 8px; align-items: center; }
        .control-btn { background: none; border: 1px solid var(--border-color); font-size: 15px; cursor: pointer; color: var(--text-main); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; outline: none; }
        .control-btn:hover { background: var(--accent-color); color: white; transform: scale(1.05); border-color: transparent; }

        .search-container { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
        .search-input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 14px; color: var(--input-text); outline: none; font-size: 14px; }
        .search-input:focus { border-color: var(--accent-color); }

        .section-title { padding: 14px 16px 6px 16px; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        
        #chats-list { flex-grow: 1; overflow-y: auto; padding: 0 8px 10px 8px; }
        .chat-item { 
            padding: 12px 14px; margin-bottom: 5px; border-radius: 14px; 
            cursor: pointer; display: flex; justify-content: space-between; 
            align-items: center; user-select: none; border: 1px solid transparent; 
            animation: itemIn 0.2s ease both;
        }
        @keyframes itemIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .chat-item:hover { background: rgba(255, 255, 255, 0.04); }
        body.light-theme .chat-item:hover { background: rgba(0, 0, 0, 0.02); }
        .chat-item.active { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.25); }
        
        .chat-info-block { display: flex; align-items: center; gap: 12px; color: var(--text-main); }
        .chat-info-block span { font-weight: 500; font-size: 14.5px; }
        
        .status-dot { font-size: 11px; color: var(--text-secondary); padding: 2px 7px; border-radius: 8px; background: rgba(255,255,255,0.03); }
        .status-dot.online { color: #10b981; background: rgba(16, 185, 129, 0.12); font-weight: 600; }

        .avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-color); }
        .avatar-placeholder { 
            width: 42px; height: 42px; border-radius: 50%; 
            background: var(--accent-color); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 15px; text-transform: uppercase; flex-shrink: 0; 
        }

        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-chat-main); backdrop-filter: var(--blur-val); -webkit-backdrop-filter: var(--blur-val); position: relative; height: 100dvh; z-index: 5; }
        
        #chat-header { 
            padding: 14px 20px; background: var(--bg-header); border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; justify-content: space-between; height: 64px; z-index: 5;
        }
        .header-meta { display: flex; align-items: center; gap: 12px; }
        #chat-title-text { cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-main); font-weight: 600; font-size: 16px; }
        
        .back-btn { 
            display: none; background: var(--input-bg); border: 1px solid var(--border-color); 
            color: var(--text-main); padding: 8px 14px; border-radius: 14px; cursor: pointer; font-size: 13px; font-weight: 600; 
        }
        
        #messages { list-style-type: none; padding: 20px; margin: 0; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .msg-container { position: relative; margin-bottom: 10px; display: flex; flex-direction: column; max-width: 70%; width: fit-content; animation: msgFadeIn 0.15s ease both; }
        .msg-container.my-wrapper { align-self: flex-end; }
        @keyframes msgFadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #messages li { 
            padding: 11px 15px; background: var(--msg-partner); border-radius: 18px; 
            border-top-left-radius: 4px; word-break: break-word; user-select: none; color: var(--text-main); 
            position: relative; cursor: pointer; width: 100%; border: 1px solid var(--border-color);
        }
        #messages li.my-msg { background: var(--msg-my); border-radius: 18px; border-top-right-radius: 4px; color: var(--text-main); }
        
        .msg-reply-quote {
            background: rgba(0, 0, 0, 0.12); border-left: 3px solid var(--accent-color);
            padding: 4px 8px; margin-bottom: 6px; border-radius: 4px; font-size: 12px;
            color: var(--text-main); opacity: 0.9; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .msg-status { position: absolute; bottom: 3px; right: 8px; font-size: 10px; color: var(--text-secondary); }
        .msg-status.read { color: #10b981; font-weight: bold; }

        .reaction-picker { 
            position: absolute; top: -45px; left: 6px; background: var(--input-bg); backdrop-filter: var(--blur-val);
            border: 1px solid var(--border-color); border-radius: 30px; padding: 5px 12px; 
            display: none; gap: 9px; z-index: 50; box-shadow: 0 8px 25px rgba(0,0,0,0.2); animation: scaleUp 0.12s ease both; 
        }
        .msg-container.my-wrapper .reaction-picker { left: auto; right: 6px; }
        .reaction-picker span { font-size: 19px; cursor: pointer; }
        .reaction-picker span:hover { transform: scale(1.3); }

        .reactions-holder { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .reaction-chip { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 2px 8px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; color: var(--text-main); }
        .reaction-chip.active-my { background: var(--accent-color); color: white; font-weight: bold; }

        #form-wrapper { background: var(--bg-header); border-top: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 12px 14px 16px 14px; }
        
        #reply-preview-area {
            display: none; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.04); border-left: 3px solid var(--accent-color);
            padding: 6px 12px; margin-bottom: 8px; border-radius: 5px;
        }
        #reply-preview-text { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 85%; color: var(--text-main); }
        .cancel-reply-btn { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; font-weight: bold; }

        #form { display: flex; gap: 10px; align-items: center; width: 100%; }
        #input { flex-grow: 1; padding: 13px 18px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--input-text); border-radius: 22px; outline: none; font-size: 14.5px; }
        #input:focus { border-color: var(--accent-color); }
        #button { padding: 12px 24px; background: var(--accent-color); color: white; border: none; border-radius: 22px; cursor: pointer; font-weight: 600; font-size: 14.5px; }
        #button:hover { transform: scale(1.02); opacity: 0.95; }
        
        .no-chat-selected { margin: auto; text-align: center; color: var(--text-secondary); font-size: 15px; user-select: none; }

        .context-menu { position: fixed; background: var(--bg-sidebar); backdrop-filter: var(--blur-val); -webkit-backdrop-filter: var(--blur-val); border: 1px solid var(--border-color); border-radius: 14px; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.25); min-width: 180px; padding: 6px; }
        .context-menu button { background: none; border: none; color: var(--text-main); width: 100%; text-align: left; padding: 11px 14px; font-size: 13.5px; cursor: pointer; outline: none; border-radius: 9px; display: flex; align-items: center; gap: 8px; }
        .context-menu button:hover { background: rgba(255, 255, 255, 0.06); }
        .context-menu button.delete-btn { color: #ef4444; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 12px; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-sidebar); backdrop-filter: var(--blur-val); border: 1px solid var(--border-color); padding: 24px; border-radius: 24px; width: 100%; max-width: 370px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); animation: modalBounce 0.18s ease both; }
        @keyframes modalBounce { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); color: var(--text-main); display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: rgba(255,255,255,0.05); border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .account-property { margin-bottom: 14px; font-size: 13px; }
        .account-property label { display: block; color: var(--text-secondary); margin-bottom: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .profile-name-input, .profile-desc-input { width: 100%; padding: 10px 14px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--input-text); border-radius: 10px; outline: none; font-size: 13.5px; }
        .profile-desc-input { resize: none; height: 70px; }

        .profile-avatar-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 18px; }
        .modal-avatar { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
        .modal-avatar-placeholder { width: 88px; height: 88px; border-radius: 50%; background: var(--accent-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: bold; }
        .upload-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 7px 16px; border-radius: 14px; cursor: pointer; font-size: 12.5px; }

        .lang-select { width: 100%; padding: 9px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--input-text); border-radius: 10px; }
        .settings-logout-btn { width: 100%; padding: 11px; background: #dc2626; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; display: flex; }
            #chat-main { display: none; width: 100%; }
            body.chat-opened #sidebar { display: none; }
            body.chat-opened #chat-main { display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; height: 100dvh; }
            body.chat-opened .back-btn { display: block; }
            .msg-container { max-width: 85%; }
        }
    </style>
</head>
<body>

<div class="liquid-bg">
    <div class="liquid-blob blob-green"></div>
    <div class="liquid-blob blob-white"></div>
    <div class="liquid-blob blob-black"></div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <div class="my-profile" id="my-profile-name" onclick="openMyProfile()">...</div>
        <div class="header-controls">
            <button class="control-btn" onclick="toggleTheme()" title="Змінити тему">🌓</button>
            <button class="control-btn" id="settings-toggle-btn">⚙️</button>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Пошук нікнейму...">
    </div>

    <div class="section-title" id="lbl-dialogs">Діалоги</div>
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <div id="no-chat-placeholder" class="no-chat-selected">
        <p id="placeholder-text">BurmaldaGram<br><span style="font-size: 12px;">Оберіть чат для початку спілкування</span></p>
    </div>
    
    <div id="chat-area" style="display: none; flex-direction: column; height: 100%;">
        <div id="chat-header">
            <div class="header-meta">
                <button class="back-btn" id="btn-back">⬅ Назад</button>
                <span id="chat-title-text" onclick="openPartnerProfile()">Чат</span>
            </div>
            <div id="chat-typing-status" class="typing-indicator"></div>
        </div>
        
        <ul id="messages"></ul>
        
        <div id="form-wrapper">
            <div id="reply-preview-area">
                <div id="reply-preview-text">Відповідь на повідомлення...</div>
                <button class="cancel-reply-btn" onclick="cancelReply()">&times;</button>
            </div>
            <div id="form">
                <input id="input" autocomplete="off" placeholder="Напишіть повідомлення..." />
                <button id="button">Надіслати</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <div class="modal-title">
            <span id="modal-title-text">⚙️ Налаштування</span>
            <button class="modal-close" id="settings-close-btn">&times;</button>
        </div>
        
        <div class="profile-avatar-container">
            <div id="modal-avatar-view"></div>
            <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" onchange="handleAvatarUpload(this)">
            <button class="upload-btn" id="lbl-upload-btn" onclick="document.getElementById('avatar-file-input').click()">📁 Фото</button>
        </div>

        <div id="account-info">
            <div class="account-property">
                <label id="lbl-profile-name">Ім'я в чаті:</label>
                <input type="text" id="profile-display-name" class="profile-name-input" oninput="saveMyDisplayName(this.value)">
            </div>
            <div class="account-property">
                <span id="lbl-profile">Юзернейм (ID):</span> <strong id="info-nick">...</strong>
            </div>
            <div class="account-property">
                <span id="lbl-status">Статус:</span> <strong id="lbl-online-status">...</strong>
            </div>
            <div class="account-property">
                <label id="lbl-bio-title">Про себе:</label>
                <textarea id="profile-desc" class="profile-desc-input" oninput="saveMyBio(this.value)"></textarea>
            </div>
            <div class="account-property" id="login-time-block">
                <label id="lbl-time">Час входу:</label> <span id="info-login-time" style="font-weight: bold;"></span>
            </div>
        </div>

        <div class="lang-select-container" id="lang-select-block">
            <label id="lbl-lang-title" style="display:block; font-size:11px; margin-bottom:4px; font-weight:bold;">Мова:</label>
            <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="uk">Українська</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>

        <button class="settings-logout-btn" id="btn-logout" onclick="logout()">Вийти 🚪</button>
    </div>
</div>

<div class="context-menu" id="global-context-menu"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const translations = {
        uk: {
            dialogsTitle: "Діалоги",
            placeholderText: "BurmaldaGram<br><span style='font-size: 13px;'>Оберіть чат зі списку</span>",
            backBtn: "⬅ Назад",
            inputPlaceholder: "Напишіть повідомлення...",
            btnSend: "Надіслати",
            settingsTitle: "⚙️ Налаштування",
            profileTitle: "👤 Профіль",
            profile: "Юзернейм (ID):",
            profileName: "Ім'я в чаті:",
            status: "Статус:",
            online: "В мережі",
            offline: "Офлайн",
            loginTime: "Час входу:",
            logoutBtn: "Вийти 🚪",
            emptyList: "Чати відсутні.",
            ctxDeleteChat: "Видалити чат 🗑",
            ctxReply: "Відповісти ↩",
            ctxDeleteMsg: "Видалити для всіх 🗑",
            chatStatusOnline: "онлайн",
            chatStatusOffline: "офлайн",
            typingText: "пише...",
            uploadBtn: "📁 Фото",
            bioPlaceholder: "Про себе:",
            bioEmpty: "Нічого не вказано",
            searchPlaceholder: "Пошук нікнейму...",
            notesTitle: "📝 Нотатки (Ви)"
        },
        ru: {
            dialogsTitle: "Диалоги",
            placeholderText: "BurmaldaGram<br><span style='font-size: 13px;'>Выберите чат из списка</span>",
            backBtn: "⬅ Назад",
            inputPlaceholder: "Напишите сообщение...",
            btnSend: "Отправить",
            settingsTitle: "⚙️ Настройки",
            profileTitle: "👤 Профиль",
            profile: "Юзернейм (ID):",
            profileName: "Имя в чате:",
            status: "Статус:",
            online: "В сети",
            offline: "Оффлайн",
            loginTime: "Время входа:",
            logoutBtn: "Выйти 🚪",
            emptyList: "Чаты отсутствуют.",
            ctxDeleteChat: "Убрать чат 🗑",
            ctxReply: "Ответить ↩",
            ctxDeleteMsg: "Убрать для всех 🗑",
            chatStatusOnline: "онлайн",
            chatStatusOffline: "оффлайн",
            typingText: "печатает...",
            uploadBtn: "📁 Фото",
            bioPlaceholder: "О себе:",
            bioEmpty: "Ничего не указано",
            searchPlaceholder: "Поиск никнейма...",
            notesTitle: "📝 Заметки (Вы)"
        },
        en: {
            dialogsTitle: "Dialogs",
            placeholderText: "BurmaldaGram<br><span style='font-size: 13px;'>Select a chat</span>",
            backBtn: "⬅ Back",
            inputPlaceholder: "Write a message...",
            btnSend: "Send",
            settingsTitle: "⚙️ Settings",
            profileTitle: "👤 Profile",
            profile: "Username (ID):",
            profileName: "Display Name:",
            status: "Status:",
            online: "Online",
            offline: "Offline",
            loginTime: "Login time:",
            logoutBtn: "Log out 🚪",
            emptyList: "No chats yet.",
            ctxDeleteChat: "Delete chat 🗑",
            ctxReply: "Reply ↩",
            ctxDeleteMsg: "Delete for all 🗑",
            chatStatusOnline: "online",
            chatStatusOffline: "offline",
            typingText: "is typing...",
            uploadBtn: "Photo",
            bioPlaceholder: "About me:",
            bioEmpty: "Nothing specified",
            searchPlaceholder: "Search username...",
            notesTitle: "Notes (You)"
        }
    };

    let currentLang = localStorage.getItem('burmalda_lang') || 'uk';
    if (!translations[currentLang]) currentLang = 'uk';

    const urlParams = new URLSearchParams(window.location.search);
    const authToken = urlParams.get('auth');
    let myNick = 'Аноним'; 
    let authorized = false;
    let sessionTimeString = 'Невідомо';
    let replyTargetMsg = null;

    if(localStorage.getItem('burmalda_theme') === 'light') {
        document.body.classList.add('light-theme');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('burmalda_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    if (authToken) {
        try {
            const decoded = decodeURIComponent(atob(authToken));
            const parts = decoded.split('_');
            myNick = parts[0]; 
            const loginTime = parseInt(parts[1]);
            if (!isNaN(loginTime)) {
                sessionTimeString = new Date(loginTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " " + new Date(loginTime).toLocaleDateString();
            }
            if (Date.now() - loginTime < 86400000 && myNick) authorized = true;
        } catch (e) { console.error('Помилка авторизації:', e); }
    }

    if (!authorized) {
        alert('Доступ заблоковано!'); window.location.href = '/'; 
    }

    const socket = io();
    let currentRoom = null;
    let currentActiveChatPartner = null;
    let onlineUsers = [];

    let savedMessages = {};
    try { savedMessages = JSON.parse(localStorage.getItem('burmalda_msg_history')) || {}; } catch (e) { savedMessages = {}; }

    let localProfiles = {};
    try { localProfiles = JSON.parse(localStorage.getItem('burmalda_profiles_data')) || {}; } catch (e) { localProfiles = {}; }

    let activeChats = [];
    try { 
        activeChats = JSON.parse(localStorage.getItem('burmalda_chat_list')) || []; 
        if(!Array.isArray(activeChats)) activeChats = [];
    } catch (e) { activeChats = []; }

    const chatsList = document.getElementById('chats-list');
    const chatPlaceholder = document.getElementById('no-chat-placeholder');
    const chatArea = document.getElementById('chat-area');
    const chatTitleText = document.getElementById('chat-title-text');
    const typingStatusEl = document.getElementById('chat-typing-status');
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('button');
    const contextMenu = document.getElementById('global-context-menu');
    const searchInput = document.getElementById('search-input');
    const replyPreviewArea = document.getElementById('reply-preview-area');
    const replyPreviewText = document.getElementById('reply-preview-text');

    const settingsToggleBtn = document.getElementById('settings-toggle-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsCloseBtn = document.getElementById('settings-close-btn');

    settingsToggleBtn.onclick = () => { openMyProfile(); };
    settingsCloseBtn.onclick = () => { settingsModal.classList.remove('active'); };

    document.getElementById('btn-back').onclick = () => { if (document.body.classList.contains('chat-opened')) window.history.back(); };

    window.onpopstate = function() {
        if (document.body.classList.contains('chat-opened')) {
            document.body.classList.remove('chat-opened');
            currentActiveChatPartner = null; currentRoom = null; 
            chatArea.style.display = 'none'; chatPlaceholder.style.display = 'block'; 
            
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.delete('chat');
            window.history.replaceState({}, "", currentUrl.pathname + currentUrl.search);
            renderChatsList();
        }
    };

    socket.on('connect', () => {
        socket.emit('store user', myNick);
        socket.emit('request profiles'); 
        
        socket.emit('join room', myNick); 
        socket.emit('join room', myNick + '_notes');
        
        activeChats.forEach(p => { 
            if (p && p !== myNick) {
                socket.emit('join room', p); 
                socket.emit('join room', [myNick, p].sort().join('_'));
            }
        });
    });

    searchInput.oninput = function() {
        const val = this.value.trim();
        renderChatsList(val.toLowerCase());
    };

    searchInput.onkeypress = function(e) {
        if (e.key === 'Enter') {
            const targetUser = this.value.trim();
            if (targetUser && targetUser !== myNick) {
                if (!activeChats.includes(targetUser)) {
                    activeChats.push(targetUser);
                    localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
                }
                this.value = '';
                openChatWith(targetUser);
            }
        }
    };

    function getVisibleName(username) {
        if (username === myNick) return translations[currentLang].notesTitle;
        const uData = localProfiles[username];
        if (uData && uData.displayName && uData.displayName.trim() !== '') return uData.displayName.trim();
        return username;
    }

    function getAvatarHTML(username, cssClass = 'avatar') {
        if (username === myNick && cssClass === 'avatar') {
            return `<div class="avatar-placeholder" style="background:#10b981;">📝</div>`;
        }
        const uData = localProfiles[username];
        if (uData && uData.avatar) return `<img src="${uData.avatar}" class="${cssClass}" alt="">`;
        const visibleName = getVisibleName(username);
        const firstLetter = visibleName ? visibleName.charAt(0) : '?';
        const placeholderClass = cssClass === 'avatar' ? 'avatar-placeholder' : 'modal-avatar-placeholder';
        return `<div class="${placeholderClass}">${firstLetter}</div>`;
    }

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById('lang-select').value = currentLang;
        document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${myNick}</span>`;
        document.getElementById('lbl-dialogs').textContent = t.dialogsTitle;
        document.getElementById('placeholder-text').innerHTML = t.placeholderText;
        document.getElementById('btn-back').textContent = t.backBtn;
        searchInput.placeholder = t.searchPlaceholder;
        input.placeholder = t.inputPlaceholder;
        button.textContent = t.btnSend;

        document.getElementById('lbl-profile-name').textContent = t.profileName;
        document.getElementById('lbl-profile').textContent = t.profile;
        document.getElementById('lbl-status').textContent = t.status;
        document.getElementById('lbl-bio-title').textContent = t.bioPlaceholder;
        document.getElementById('lbl-time').textContent = t.loginTime;
        document.getElementById('btn-logout').textContent = t.logoutBtn;
        document.getElementById('lbl-upload-btn').textContent = t.uploadBtn;

        renderChatsList(searchInput.value.trim().toLowerCase()); 
        loadMessagesHistory();
    }

    function openMyProfile() {
        const t = translations[currentLang];
        document.getElementById('info-nick').textContent = myNick; 
        const myData = localProfiles[myNick] || { avatar: '', bio: '', displayName: '' };
        
        document.getElementById('profile-display-name').disabled = false;
        document.getElementById('profile-display-name').value = myData.displayName || myNick;
        document.getElementById('profile-desc').disabled = false;
        document.getElementById('profile-desc').value = myData.bio || '';
        document.getElementById('profile-desc').placeholder = t.bioEmpty;

        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar');
        document.getElementById('info-login-time').textContent = sessionTimeString;

        settingsModal.classList.add('active');
    }

    function openPartnerProfile() {
        if (!currentActiveChatPartner || currentActiveChatPartner === myNick) return;
        const t = translations[currentLang];
        document.getElementById('info-nick').textContent = currentActiveChatPartner; 

        const partnerData = localProfiles[currentActiveChatPartner] || { avatar: '', bio: '', displayName: '' };
        
        document.getElementById('profile-display-name').disabled = true;
        document.getElementById('profile-display-name').value = partnerData.displayName || currentActiveChatPartner;
        document.getElementById('profile-desc').disabled = true; 
        document.getElementById('profile-desc').value = partnerData.bio || '';

        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(currentActiveChatPartner, 'modal-avatar');
        settingsModal.classList.add('active');
    }

    function changeLanguage(lang) {
        currentLang = lang; 
        localStorage.setItem('burmalda_lang', lang); 
        applyLanguage();
    }

    function saveMyDisplayName(newName) {
        if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
        localProfiles[myNick].displayName = newName;
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
        socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
    }

    function saveMyBio(text) {
        if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
        localProfiles[myNick].bio = text;
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
        socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
    }

    function handleAvatarUpload(inputEl) {
        const file = inputEl.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
            localProfiles[myNick].avatar = e.target.result;
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar');
            socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
        };
        reader.readAsDataURL(file);
    }

    socket.on('broadcast profile update', (packet) => {
        if (packet && packet.user && packet.data) {
            localProfiles[packet.user] = packet.data;
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            renderChatsList(searchInput.value.trim().toLowerCase());
            if (currentActiveChatPartner === packet.user) {
                chatTitleText.innerHTML = `${getAvatarHTML(packet.user)} <span>${getVisibleName(packet.user)}</span>`;
            }
        }
    });

    socket.on('all profiles data', (serverProfiles) => {
        if (serverProfiles) {
            localProfiles = { ...localProfiles, ...serverProfiles };
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            applyLanguage();
        }
    });

    socket.on('online users', (users) => { 
        onlineUsers = Array.isArray(users) ? users : []; 
        renderChatsList(searchInput.value.trim().toLowerCase()); 
    });

    input.oninput = () => {
        if (currentRoom && currentActiveChatPartner !== myNick) {
            socket.emit('chat message', { 
                room: currentRoom, 
                to: currentActiveChatPartner,
                receiver: currentActiveChatPartner,
                text: '[TYPING_SIGNAL]', 
                message: '[TYPING_SIGNAL]',
                user: myNick,
                sender: myNick
            });
        }
    };

    let remoteTypingTimer = null;

    socket.on('chat message', (data) => {
        if (!data) return;
        
        let chatPartner = null;
        if (data.user === myNick || data.sender === myNick) {
            if (data.receiver && data.receiver !== myNick) chatPartner = data.receiver;
            else if (data.to && data.to !== myNick) chatPartner = data.to;
            else if (data.room && data.room.includes('_')) {
                chatPartner = data.room.split('_').find(p => p !== myNick);
            } else {
                chatPartner = myNick;
            }
        } else {
            chatPartner = data.sender || data.user;
        }

        if (!chatPartner) return;

        if (data.text === '[TYPING_SIGNAL]' || data.message === '[TYPING_SIGNAL]') {
            if (chatPartner === currentActiveChatPartner) {
                typingStatusEl.textContent = translations[currentLang].typingText;
                typingStatusEl.style.display = 'block';
                clearTimeout(remoteTypingTimer);
                remoteTypingTimer = setTimeout(() => { typingStatusEl.style.display = 'none'; }, 500);
            }
            return;
        }

        if (data.text === '[READ_SIGNAL]' || data.message === '[READ_SIGNAL]') {
            if (chatPartner === currentActiveChatPartner && data.user !== myNick && data.sender !== myNick) {
                const systemStatuses = messagesContainer.querySelectorAll('.msg-status');
                systemStatuses.forEach(span => { span.textContent = '✓✓'; span.classList.add('read'); });
                if (savedMessages[chatPartner]) {
                    savedMessages[chatPartner].forEach(m => { if(m.user === myNick || m.sender === myNick) m.isRead = true; });
                    localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
                }
            }
            return;
        }

        if (chatPartner !== myNick && !activeChats.includes(chatPartner)) {
            activeChats.push(chatPartner);
            localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
            socket.emit('join room', [myNick, chatPartner].sort().join('_'));
            socket.emit('join room', chatPartner);
            renderChatsList(searchInput.value.trim().toLowerCase());
        }

        if ((data.user === myNick || data.sender === myNick) && chatPartner !== myNick) return; 
        
        if (!savedMessages[chatPartner]) savedMessages[chatPartner] = [];
        const isDuplicate = savedMessages[chatPartner].some(m => m.msgId === data.msgId);
        if (!isDuplicate) {
            savedMessages[chatPartner].push(data);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }

        if (chatPartner === currentActiveChatPartner) {
            setTimeout(sendReadSignal, 100); 
            typingStatusEl.style.display = 'none';
            displaySingleMessage(data);
        }
    });

    socket.on('message_delete_broadcast', (data) => {
        if (!data) return;
        const { msgId } = data;
        Object.keys(savedMessages).forEach(partner => {
            savedMessages[partner] = savedMessages[partner].filter(m => m.msgId !== msgId);
        });
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        const wrapper = document.getElementById('wrapper-' + msgId);
        if (wrapper) wrapper.remove();
    });

    socket.on('update_message_data', (data) => {
        if (!data) return;
        const { msgId, reactions } = data;
        Object.keys(savedMessages).forEach(partner => {
            const localMsg = savedMessages[partner].find(m => m.msgId === msgId);
            if (localMsg) localMsg.reactions = reactions;
        });
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        const holder = document.getElementById('reactions-holder-' + msgId);
        if (holder) renderReactions(msgId, reactions, holder);
    });

    function renderChatsList(filterText = '') {
        if(!chatsList) return;
        chatsList.innerHTML = ''; 
        const t = translations[currentLang];

        if (myNick.toLowerCase().includes(filterText) || 'нотатки notes'.includes(filterText) || filterText === '') {
            const notesItem = document.createElement('div');
            notesItem.className = 'chat-item' + (currentActiveChatPartner === myNick ? ' active' : '');
            notesItem.innerHTML = `
                <div class="chat-info-block">${getAvatarHTML(myNick)}<span>${t.notesTitle}</span></div>
                <span class="status-dot online">cloud</span>
            `;
            notesItem.onclick = () => openChatWith(myNick);
            chatsList.appendChild(notesItem);
        }
        
        const filtered = activeChats.filter(user => {
            if (!user || user === myNick) return false;
            return getVisibleName(user).toLowerCase().includes(filterText) || user.toLowerCase().includes(filterText);
        });

        filtered.forEach((user) => {
            const item = document.createElement('div'); 
            item.className = 'chat-item' + (currentActiveChatPartner === user ? ' active' : '');
            const isOnline = onlineUsers.map(u => u.toLowerCase()).includes(user.toLowerCase());
            item.innerHTML = `
                <div class="chat-info-block">${getAvatarHTML(user)}<span>${getVisibleName(user)}</span></div>
                <span class="status-dot ${isOnline?'online':''}">${isOnline ? t.chatStatusOnline : t.chatStatusOffline}</span>
            `;
            item.onclick = () => openChatWith(user);
            item.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); showChatContextMenu(e.clientX, e.clientY, user); };
            chatsList.appendChild(item);
        });
    }

    function openChatWith(user) {
        if (!user) return;
        currentActiveChatPartner = user;
        currentRoom = user === myNick ? myNick + '_notes' : [myNick, user].sort().join('_'); 
        
        socket.emit('join room', currentRoom);
        if(user !== myNick) {
            socket.emit('join room', user);
        }

        chatPlaceholder.style.display = 'none'; chatArea.style.display = 'flex';
        chatTitleText.innerHTML = `${getAvatarHTML(user)} <span>${getVisibleName(user)}</span>`;
        
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('chat', user);
        if (!document.body.classList.contains('chat-opened')) {
            window.history.pushState({ chatOpened: true, partner: user }, "", currentUrl.pathname + currentUrl.search);
        } else {
            window.history.replaceState({ chatOpened: true, partner: user }, "", currentUrl.pathname + currentUrl.search);
        }
        document.body.classList.add('chat-opened');
        
        cancelReply();
        loadMessagesHistory(); 
        renderChatsList(searchInput.value.trim().toLowerCase()); 
        sendReadSignal();
        setTimeout(() => { if(input) input.focus(); }, 150);
    }

    function sendMessage() {
        const text = input.value.trim();
        if (text && currentActiveChatPartner) {
            const generatedId = 'msg-' + Date.now() + Math.floor(Math.random() * 1000);
            
            const msgPacket = {
                room: currentRoom, 
                to: currentActiveChatPartner,
                receiver: currentActiveChatPartner,
                recipient: currentActiveChatPartner,
                user: myNick, 
                sender: myNick,
                text: text, 
                message: text,
                msgId: generatedId, 
                isRead: false, 
                time: Date.now(), 
                reactions: {},
                replyTo: replyTargetMsg ? { msgId: replyTargetMsg.msgId, user: replyTargetMsg.user, text: replyTargetMsg.text } : null
            };

            if (currentActiveChatPartner !== myNick && !activeChats.includes(currentActiveChatPartner)) {
                activeChats.push(currentActiveChatPartner);
                localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
                socket.emit('join room', [myNick, currentActiveChatPartner].sort().join('_'));
                socket.emit('join room', currentActiveChatPartner);
                renderChatsList();
            }

            if (!savedMessages[currentActiveChatPartner]) savedMessages[currentActiveChatPartner] = [];
            savedMessages[currentActiveChatPartner].push(msgPacket);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
            displaySingleMessage(msgPacket);
            
            socket.emit('chat message', msgPacket);
            
            input.value = ''; 
            cancelReply();
            input.focus();
        }
    }

    function sendReadSignal() { 
        if (currentRoom && currentActiveChatPartner !== myNick) {
            socket.emit('chat message', { 
                room: currentRoom, 
                to: currentActiveChatPartner,
                receiver: currentActiveChatPartner,
                text: '[READ_SIGNAL]', 
                message: '[READ_SIGNAL]',
                user: myNick,
                sender: myNick 
            }); 
        }
    }

    button.onclick = sendMessage; input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    function loadMessagesHistory() {
        messagesContainer.innerHTML = '';
        if (currentActiveChatPartner && savedMessages && savedMessages[currentActiveChatPartner]) {
            const historyArray = savedMessages[currentActiveChatPartner];
            if (Array.isArray(historyArray)) historyArray.forEach(displaySingleMessage);
        }
    }

    function renderReactions(msgId, reactions, holderElement) {
        holderElement.innerHTML = ''; 
        if (!reactions || typeof reactions !== 'object') return;
        Object.keys(reactions).forEach(emoji => {
            const voters = reactions[emoji];
            if (!Array.isArray(voters) || voters.length === 0) return;
            const hasMyVote = voters.includes(myNick);
            const chip = document.createElement('div');
            chip.className = 'reaction-chip' + (hasMyVote ? ' active-my' : '');
            chip.innerHTML = `${emoji} <span>${voters.length}</span>`;
            chip.onclick = (e) => {
                e.stopPropagation();
                socket.emit('message_reaction', {
                    room: currentRoom, msgId: msgId, reaction: hasMyVote ? null : emoji, username: myNick
                });
            };
            holderElement.appendChild(chip);
        });
    }

    function displaySingleMessage(data) {
        if (!messagesContainer || !data) return;
        let wrapper = document.getElementById('wrapper-' + data.msgId);
        if (wrapper) {
            if (data.isRead) {
                const existingStatus = wrapper.querySelector('.msg-status');
                if (existingStatus) { existingStatus.textContent = '✓✓'; existingStatus.classList.add('read'); }
            }
            return;
        }
        
        const msgTime = data.time ? new Date(data.time) : new Date();
        const hours = String(msgTime.getHours()).padStart(2, '0');
        const minutes = String(msgTime.getMinutes()).padStart(2, '0');

        wrapper = document.createElement('div');
        wrapper.id = 'wrapper-' + data.msgId;
        wrapper.className = 'msg-container' + ((data.user === myNick || data.sender === myNick) ? ' my-wrapper' : '');

        const picker = document.createElement('div');
        picker.className = 'reaction-picker';
        const emojis = ['👍', '🔥', '❤️', '😂', '😮', '🤡'];
        emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.textContent = emoji;
            span.onclick = (e) => {
                e.stopPropagation(); picker.style.display = 'none';
                const currentReactions = data.reactions || {};
                const alreadyHasIt = currentReactions[emoji] && currentReactions[emoji].includes(myNick);
                socket.emit('message_reaction', { room: currentRoom, msgId: data.msgId, reaction: alreadyHasIt ? null : emoji, username: myNick });
            };
            picker.appendChild(span);
        });

        const item = document.createElement('li');
        item.id = data.msgId;
        if (data.user === myNick || data.sender === myNick) item.classList.add('my-msg');
        
        if(data.replyTo) {
            const replyQuote = document.createElement('div');
            replyQuote.className = 'msg-reply-quote';
            replyQuote.innerHTML = `<b>${getVisibleName(data.replyTo.user)}</b>: ${data.replyTo.text}`;
            item.appendChild(replyQuote);
        }

        const textSpan = document.createElement('span');
        textSpan.textContent = data.text || data.message || '';
        item.appendChild(textSpan);

        const timeHtml = `<span style="font-size: 10px; opacity:0.5; margin-left: 8px; float: right; margin-top: 4px;">${hours}:${minutes}</span>`;
        
        if (data.user === myNick || data.sender === myNick) {
            const checkRead = data.isRead ? '✓✓' : '✓';
            const readClass = data.isRead ? 'msg-status read' : 'msg-status';
            item.insertAdjacentHTML('beforeend', `${timeHtml}<span class="${readClass}" style="margin-left:5px; position:static; float:right; margin-top:4px;">${checkRead}</span>`);
        } else {
            item.insertAdjacentHTML('beforeend', timeHtml);
        }

        item.onclick = (e) => {
            e.stopPropagation(); 
            const currentDisplay = picker.style.display;
            document.querySelectorAll('.reaction-picker').forEach(p => p.style.display = 'none');
            picker.style.display = currentDisplay === 'flex' ? 'none' : 'flex';
        };

        item.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); showMsgContextMenu(e.clientX, e.clientY, data); };

        let pressTimer;
        item.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => {
                const touch = e.touches[0];
                showMsgContextMenu(touch.clientX, touch.clientY, data);
            }, 600);
        }, { passive: true });
        item.addEventListener('touchend', () => clearTimeout(pressTimer));
        item.addEventListener('touchmove', () => clearTimeout(pressTimer));

        const reactionsHolder = document.createElement('div');
        reactionsHolder.id = 'reactions-holder-' + data.msgId;
        reactionsHolder.className = 'reactions-holder';

        wrapper.appendChild(picker); wrapper.appendChild(item); wrapper.appendChild(reactionsHolder);
        messagesContainer.appendChild(wrapper);
        renderReactions(data.msgId, data.reactions, reactionsHolder);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showMsgContextMenu(x, y, msgData) {
        const t = translations[currentLang];
        contextMenu.style.left = `${x}px`; contextMenu.style.top = `${y}px`;
        
        let html = `<button onclick="window.setupReplyMessage('${msgData.msgId}')">↩ ${t.ctxReply}</button>`;
        if(msgData.user === myNick || msgData.sender === myNick) {
            html += `<button onclick="window.executeDeleteMessage('${msgData.msgId}')" class="delete-btn">🗑 ${t.ctxDeleteMsg}</button>`;
        }
        
        contextMenu.innerHTML = html;
        contextMenu.style.display = 'block';
    }

    window.setupReplyMessage = function(msgId) {
        if(!currentActiveChatPartner || !savedMessages[currentActiveChatPartner]) return;
        const msg = savedMessages[currentActiveChatPartner].find(m => m.msgId === msgId);
        if(!msg) return;
        replyTargetMsg = msg;
        replyPreviewText.innerHTML = `↩ Відповідь <b>${getVisibleName(msg.user || msg.sender)}</b>:<br><small>${msg.text || msg.message}</small>`;
        replyPreviewArea.style.display = 'flex';
        input.focus();
    };

    window.cancelReply = function() { replyTargetMsg = null; replyPreviewArea.style.display = 'none'; };

    window.executeDeleteMessage = function(msgId) {
        if (currentActiveChatPartner && savedMessages[currentActiveChatPartner]) {
            savedMessages[currentActiveChatPartner] = savedMessages[currentActiveChatPartner].filter(m => m.msgId !== msgId);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }
        const wrapper = document.getElementById('wrapper-' + msgId);
        if (wrapper) wrapper.remove();
        
        socket.emit('chat message', { room: currentRoom, to: currentActiveChatPartner, receiver: currentActiveChatPartner, text: '[DELETE_SIGNAL]', message: '[DELETE_SIGNAL]', msgId: msgId, user: myNick, sender: myNick });
        socket.emit('delete_message_broadcast', { room: currentRoom, msgId: msgId });
    };

    document.addEventListener('click', () => {
        document.querySelectorAll('.reaction-picker').forEach(p => p.style.display = 'none');
        contextMenu.style.display = 'none';
    });

    function showChatContextMenu(x, y, partnerNick) {
        contextMenu.style.left = `${x}px`; contextMenu.style.top = `${y}px`;
        contextMenu.innerHTML = `<button onclick="window.executeDeleteChat('${partnerNick.replace(/'/g, "\\'")}')" class="delete-btn">${translations[currentLang].ctxDeleteChat}</button>`;
        contextMenu.style.display = 'block';
    }

    window.executeDeleteChat = function(partnerNick) {
        if (savedMessages[partnerNick]) delete savedMessages[partnerNick];
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        activeChats = activeChats.filter(c => c !== partnerNick);
        localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
        if (partnerNick === currentActiveChatPartner) {
            currentActiveChatPartner = null; currentRoom = null;
            chatArea.style.display = 'none'; chatPlaceholder.style.display = 'block'; 
        }
        renderChatsList(searchInput.value.trim().toLowerCase());
    };

    function logout() { localStorage.removeItem('burmalda_auth_token'); window.location.href = '/'; }
    applyLanguage();
</script>
</body>
</html>
