<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmalda Messenger</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; flex-shrink: 0; }
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #141414; position: relative; }
        
        #messages { list-style-type: none; padding: 20px; margin: 0; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        #messages li { padding: 10px 14px; background: #262626; margin-bottom: 8px; border-radius: 8px; max-width: 80%; width: fit-content; word-break: break-word; font-size: 15px; }
        #messages li.my-msg { background: #007bff; align-self: flex-end; }
        
        #form { padding: 10px; background: #1e1e1e; display: flex; border-top: 1px solid #2d2d2d; flex-shrink: 0; }
        #input { flex-grow: 1; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; font-size: 16px; outline: none; -webkit-appearance: none; }
        #button { padding: 12px 20px; margin-left: 8px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }

        @media (max-width: 768px) {
            #sidebar { display: none; }
            body.chat-opened #sidebar { display: none; }
            body.chat-opened #chat-main { display: flex; width: 100%; }
            #chat-main { display: none; }
        }
    </style>
</head>
<body id="main-body" style="display: none;">

<div id="sidebar">
    <div style="padding:15px; border-bottom:1px solid #333;">Ваши диалоги</div>
    <div id="chats-list" style="flex-grow:1; overflow-y:auto;"></div>
</div>

<div id="chat-main">
    <div id="chat-area" style="display:none; flex-direction:column; height:100%;">
        <div id="chat-header" style="padding:15px; border-bottom:1px solid #333; font-weight:bold;">Чат</div>
        <ul id="messages"></ul>
        <div id="form">
            <input id="input" autocomplete="off" placeholder="Сообщение..." />
            <button id="button">Отправить</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // Инициализация
    const urlParams = new URLSearchParams(window.location.search);
    const authToken = urlParams.get('auth');
    let myNick = 'Аноним';
    
    // Авторизация
    if (authToken) {
        try {
            const decoded = decodeURIComponent(atob(authToken));
            myNick = decoded.split('_')[0];
            document.getElementById('main-body').style.display = 'flex';
        } catch(e) { window.location.href = '/'; }
    } else { window.location.href = '/'; }

    const socket = io();
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    
    socket.emit('store user', myNick);

    function openChatWith(user) {
        document.body.classList.add('chat-opened');
        document.getElementById('chat-area').style.display = 'flex';
        setTimeout(() => input.focus(), 300);
    }

    function sendMessage() {
        if (input.value.trim()) {
            socket.emit('private chat message', { text: input.value });
            input.value = '';
        }
    }

    socket.on('chat message', (data) => {
        if (!data) return;
        const li = document.createElement('li');
        li.textContent = (data.user || 'Гость') + ": " + (data.text || '');
        if (data.user === myNick) li.classList.add('my-msg');
        messages.appendChild(li);
        messages.scrollTop = messages.scrollHeight;
    });

    document.getElementById('button').onclick = sendMessage;
</script>
</body>
</html>
