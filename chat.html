<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* ПРЕМІУМ ДИЗАЙН: Глибші кольори та сучасні шрифти */
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000000; color: #f5f5f7; display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; max-width: 100%; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        /* Бокова панель */
        #sidebar { width: 340px; background: #0f0f11; border-right: 1px solid #1f1f23; display: flex; flex-direction: column; flex-shrink: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        
        .sidebar-header { padding: 16px; background: rgba(15, 15, 17, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f1f23; position: sticky; top: 0; z-index: 2; }
        .my-profile { font-weight: 600; color: #007aff; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; transition: opacity 0.2s; }
        .my-profile:hover { opacity: 0.8; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        
        .search-trigger-btn, .settings-btn { background: rgba(255, 255, 255, 0.05); border: none; font-size: 16px; cursor: pointer; color: #aaa; transition: all 0.2s ease; padding: 8px; border-radius: 50%; outline: none; display: flex; align-items: center; justify-content: center; }
        .search-trigger-btn:hover, .settings-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }

        .search-container { padding: 12px 16px; background: #131316; border-bottom: 1px solid #1f1f23; display: none; }
        .search-container.active { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .search-container input { width: 100%; padding: 12px 16px; background: #1c1c1e; border: 1px solid transparent; color: white; border-radius: 12px; outline: none; font-size: 14px; transition: all 0.3s; }
        .search-container input:focus { border-color: #007aff; background: #232326; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); }

        .section-title { padding: 16px 16px 8px 16px; font-size: 11px; color: #8e8e93; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; }
        
        #chats-list { flex-grow: 1; overflow-y: auto; padding: 0 8px; }
        .chat-item { padding: 12px; border-radius: 12px; margin-bottom: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; user-select: none; position: relative; }
        .chat-item:hover { background: #1c1c1e; }
        .chat-item.active { background: #007aff; color: white !important; }
        .chat-item.blocked { opacity: 0.5; filter: grayscale(100%); }

        .chat-flags { display: flex; gap: 6px; position: absolute; right: 16px; top: 14px; font-size: 12px; }

        @keyframes glowPulse { 0% { box-shadow: inset 0 0 0px rgba(0, 122, 255, 0); } 50% { box-shadow: inset 0 0 15px rgba(0, 122, 255, 0.4); } 100% { box-shadow: inset 0 0 0px rgba(0, 122, 255, 0); } }
        .chat-item.glow-active { animation: glowPulse 2s infinite ease-in-out; border: 1px solid #007aff; }
        
        .chat-info-block { display: flex; align-items: center; gap: 14px; max-width: 80%; }
        .chat-item-name { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
        .chat-item-bio { font-size: 13px; color: #8e8e93; }
        .chat-item.active .chat-item-bio { color: rgba(255, 255, 255, 0.8); }
        
        .status-dot { font-size: 11px; color: #55555f; margin-top: 22px; }
        .status-dot.online { color: #32d74b; font-weight: bold; }
        .chat-item.active .status-dot.online { color: #fff; }

        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; display: block; border: 1px solid rgba(255,255,255,0.05); }
        .avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; text-transform: uppercase; flex-shrink: 0; }

        /* Головна зона чату */
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #000000; position: relative; height: 100%; min-width: 0; }
        
        /* Ефект скла на хедері */
        #chat-header { padding: 12px 20px; background: rgba(15, 15, 17, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid #1f1f23; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 12px; z-index: 15; position: absolute; top: 0; width: 100%; }
        
        .header-meta { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        #chat-title-text { cursor: pointer; display: flex; align-items: center; gap: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.2s; }
        #chat-title-text:hover { opacity: 0.8; }
        .typing-indicator { font-size: 13px; color: #32d74b; font-style: italic; display: none; font-weight: normal; }
        
        .header-actions { display: flex; gap: 12px; }
        .call-btn { background: rgba(50, 215, 75, 0.15); color: #32d74b; border: 1px solid rgba(50, 215, 75, 0.3); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .call-btn:hover { background: #32d74b; color: #000; transform: scale(1.05); box-shadow: 0 4px 12px rgba(50, 215, 75, 0.3); }

        .back-btn { display: none; background: transparent; border: none; color: #007aff; padding: 6px 0; cursor: pointer; font-size: 16px; font-weight: 500; }
        .back-btn:hover { opacity: 0.8; }

        #pinned-message-bar { background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(10px); padding: 10px 20px; display: none; align-items: center; justify-content: space-between; font-size: 13px; color: #007aff; cursor: pointer; z-index: 12; user-select: none; transition: background 0.2s; margin-top: 73px; border-bottom: 1px solid #1f1f23; }
        #pinned-message-bar:hover { background: #2c2c2e; }
        .pinned-bar-content { display: flex; flex-direction: column; overflow: hidden; max-width: 85%; border-left: 3px solid #007aff; padding-left: 10px; }
        .pinned-bar-title { font-weight: 700; font-size: 12px; display: flex; gap: 8px; align-items: center; color: #007aff; }
        .pin-counter { background: rgba(0, 122, 255, 0.15); color: #007aff; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .pinned-bar-text { color: #aeaeb2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 3px; font-size: 13px; }
        .unpin-btn-x { background: none; border: none; color: #8e8e93; font-size: 20px; cursor: pointer; padding: 4px; transition: color 0.2s; }
        .unpin-btn-x:hover { color: #ff453a; }
        
        #messages { list-style-type: none; padding: 90px 20px 20px 20px; margin: 0; flex-grow: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }
        .msg-container { position: relative; margin-bottom: 16px; display: flex; flex-direction: column; max-width: 75%; width: fit-content; z-index: 1; }
        .msg-container.my-wrapper { align-self: flex-end; }

        #messages li { padding: 12px 16px; background: #1c1c1e; border-radius: 20px; word-break: break-word; user-select: none; color: #f5f5f7; position: relative; cursor: pointer; transition: background 0.2s; width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 4px; font-size: 15px; line-height: 1.4; }
        #messages li:hover { background: #2c2c2e; }
        
        /* Бабли користувача */
        #messages li.my-msg { background: #007aff; border-bottom-right-radius: 4px; box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25); }
        #messages li.my-msg:hover { background: #006ce0; }
        
        /* Стікери */
        #messages li.msg-sticker { background: transparent !important; box-shadow: none !important; padding: 0 !important; }
        .sticker-img { width: 160px; height: 160px; object-fit: contain; display: block; filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5)); }
        
        /* Кружечки (Відео) */
        .circle-video { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; display: block; border: 4px solid #007aff; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .audio-msg { border-radius: 20px; outline: none; height: 40px; }

        .msg-meta-line { display: flex; align-items: center; justify-content: flex-end; gap: 6px; align-self: flex-end; margin-top: 4px; font-size: 11px; width: 100%; }
        .msg-sticker .msg-meta-line { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 12px; width: auto; position: absolute; bottom: 8px; right: 8px; }
        
        .msg-time { color: rgba(255, 255, 255, 0.5); }
        .my-msg .msg-time { color: rgba(255, 255, 255, 0.8); }
        .msg-sticker .msg-time { color: #fff; }
        .msg-status { color: rgba(255, 255, 255, 0.5); font-weight: bold; font-size: 12px; transition: color 0.3s; }
        .my-msg .msg-status { color: rgba(255, 255, 255, 0.8); }
        .msg-status.read { color: #32d74b; }

        .reply-quote { background: rgba(0, 0, 0, 0.2); border-left: 3px solid #007aff; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 6px; color: #aeaeb2; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .my-msg .reply-quote { border-left-color: #fff; background: rgba(255, 255, 255, 0.15); color: #fff; }

        .chat-media-wrapper { margin-top: 4px; border-radius: 14px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.05); max-width: 100%; }
        .chat-media-img { width: 100%; max-width: 320px; max-height: 280px; object-fit: contain; display: block; cursor: pointer; transition: opacity 0.2s; }

        .reaction-picker { position: absolute; top: -55px; left: 0; background: rgba(30, 30, 32, 0.95); backdrop-filter: blur(10px); border: 1px solid #2c2c2e; border-radius: 30px; padding: 6px 12px; display: none; gap: 10px; z-index: 99; box-shadow: 0 8px 25px rgba(0,0,0,0.6); user-select: none; align-items: center; max-width: 280px; flex-wrap: wrap; }
        .msg-container.my-wrapper .reaction-picker { left: auto; right: 0; }
        .reaction-picker span { font-size: 22px; cursor: pointer; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .reaction-picker span:hover { transform: scale(1.4) translateY(-2px); }

        .reactions-holder { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .reaction-chip { background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 14px; padding: 4px 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; user-select: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .reaction-chip:hover { background: #2c2c2e; transform: scale(1.05); }
        .reaction-chip.active-my { background: rgba(0, 122, 255, 0.15); border-color: #007aff; }

        /* Ефект скла на панелі вводу */
        #input-panel-container { background: rgba(15, 15, 17, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid #1f1f23; width: 100%; display: flex; flex-direction: column; position: relative; z-index: 110; }
        #reply-preview-bar { background: transparent; padding: 10px 20px; border-left: 4px solid #007aff; display: none; justify-content: space-between; align-items: center; font-size: 13px; border-bottom: 1px solid #1f1f23; }
        #reply-preview-text { color: #aeaeb2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 85%; font-weight: 500; }
        #reply-close-btn { background: none; border: none; color: #8e8e93; font-size: 22px; cursor: pointer; transition: color 0.2s; }
        #reply-close-btn:hover { color: #ff453a; }

        #form { padding: 14px 16px; display: flex; align-items: center; width: 100%; gap: 10px; flex-wrap: wrap; }
        #input { flex-grow: 1; padding: 14px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid transparent; color: white; border-radius: 24px; outline: none; font-size: 15px; transition: all 0.3s; min-width: 100px; }
        #input:focus { background: rgba(255, 255, 255, 0.1); border-color: #007aff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); }
        
        .media-btn-label, .tool-btn { background: transparent; border: none; color: #8e8e93; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .media-btn-label:hover, .tool-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }
        .tool-btn.recording { background: #ff453a !important; color: white !important; animation: pulseRecord 1.5s infinite; }
        
        @keyframes pulseRecord { 0% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 69, 58, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); } }

        #button { padding: 12px 20px; background: #007aff; color: #fff; border: none; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 15px; flex-shrink: 0; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        #button:hover { background: #006ce0; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0, 122, 255, 0.4); }
        
        /* Меню стікерів та емодзі поверх повідомлень */
        .popup-menu { position: absolute; bottom: 100%; margin-bottom: 15px; left: 15px; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(15px); border: 1px solid #2c2c2e; border-radius: 16px; padding: 12px; display: none; width: 320px; max-height: 280px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 9999; }
        .popup-menu.active { display: flex; flex-wrap: wrap; gap: 10px; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .popup-item { cursor: pointer; font-size: 28px; transition: transform 0.1s; padding: 4px; }
        .popup-item:hover { transform: scale(1.2); }
        .sticker-item { width: 65px; height: 65px; object-fit: contain; cursor: pointer; border-radius: 10px; transition: background 0.2s; padding: 4px; }
        .sticker-item:hover { background: rgba(255,255,255,0.1); }

        .no-chat-selected { margin: auto; text-align: center; color: #8e8e93; font-size: 18px; line-height: 1.6; user-select: none; background: rgba(28, 28, 30, 0.5); padding: 20px 40px; border-radius: 20px; backdrop-filter: blur(10px); }

        .context-menu { position: fixed; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(15px); border: 1px solid #2c2c2e; border-radius: 14px; display: none; z-index: 5500; box-shadow: 0 10px 30px rgba(0,0,0,0.7); min-width: 200px; overflow: hidden; padding: 4px; }
        .context-menu button { background: none; border: none; color: #f5f5f7; width: 100%; text-align: left; padding: 12px 16px; font-size: 14px; cursor: pointer; outline: none; display: block; transition: all 0.2s; border-radius: 10px; }
        .context-menu button:hover { background: rgba(255, 255, 255, 0.1); }
        .context-menu button.delete-btn { color: #ff453a; font-weight: 600; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.05); border-radius: 0 0 10px 10px; }
        .context-menu button.delete-btn:hover { background: rgba(255, 69, 58, 0.15); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 16px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content { background: #1c1c1e; padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid #2c2c2e; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: auto; transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #2c2c2e; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; outline: none; transition: background 0.2s; }
        .modal-close:hover { background: rgba(255,255,255,0.2); }
        
        .account-property { margin-bottom: 16px; font-size: 14px; color: #d1d1d6; }
        .account-property label { display: block; color: #8e8e93; margin-bottom: 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .profile-name-input, .profile-desc-input { width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid #2c2c2e; color: white; border-radius: 12px; outline: none; font-size: 15px; transition: all 0.2s; }
        .profile-name-input:focus, .profile-desc-input:focus { border-color: #007aff; }
        .profile-desc-input { resize: none; height: 80px; }
        .profile-name-input:disabled, .profile-desc-input:disabled { background: transparent; color: #8e8e93; border-color: transparent; cursor: not-allowed; padding-left: 0; }

        .profile-avatar-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; }
        .modal-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; border: 3px solid #007aff; box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3); }
        .modal-avatar-placeholder { width: 100px; height: 100px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .upload-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
        .upload-btn:hover { background: rgba(255,255,255,0.2); }

        .sticker-pack-creator { margin-top: 20px; border-top: 1px solid #2c2c2e; padding-top: 20px; }
        .pack-list { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .pack-item-preview { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.2s; }
        .pack-item-preview:hover { transform: scale(1.1); }

        .lang-select { width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid #2c2c2e; color: white; border-radius: 12px; outline: none; font-size: 15px; cursor: pointer; }
        
        .settings-logout-btn { width: 100%; padding: 14px; background: rgba(255, 69, 58, 0.1); color: #ff453a; border: 1px solid rgba(255, 69, 58, 0.3); border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 24px; font-size: 15px; transition: all 0.2s; }
        .settings-logout-btn:hover { background: #ff453a; color: white; }
        
        /* Дзвінки */
        .video-chat-container { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; align-items: center; position: relative; }
        #remote-video { width: 100%; max-width: 320px; border-radius: 20px; background: #000; border: 2px solid #2c2c2e; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #local-video { width: 110px; border-radius: 14px; background: #111; border: 2px solid #32d74b; margin-top: -80px; margin-right: -190px; z-index: 10; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }

        @media (max-width: 768px) {
            #sidebar { width: 100%; display: flex; }
            #chat-main { display: none; width: 100%; }
            body.chat-opened #sidebar { display: none; }
            body.chat-opened #chat-main { display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; }
            body.chat-opened .back-btn { display: block; font-size: 24px; padding: 0 10px 0 0; }
            .msg-container { max-width: 90%; }
            .no-chat-selected { display: none; }
            #form { padding: 10px; gap: 6px; }
            .tool-btn, .media-btn-label { width: 38px; height: 38px; font-size: 18px; }
            #button { padding: 10px 16px; font-size: 14px; }
            #chat-header { position: relative; }
            #messages { padding-top: 20px; }
        }
    </style>
</head>
<body id="main-body" style="display: none;">

<div id="sidebar">
    <div class="sidebar-header">
        <div class="my-profile" id="my-profile-name" onclick="openMyProfile()">...</div>
        <div class="header-controls">
            <button class="search-trigger-btn" id="search-toggle-btn">🔍</button>
            <button class="settings-btn" id="settings-toggle-btn">⚙️</button>
        </div>
    </div>
    <div class="search-container" id="search-frame">
        <input type="text" id="search-input" autocomplete="off">
    </div>
    <div class="section-title" id="lbl-dialogs">Диалоги</div>
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <div id="no-chat-placeholder" class="no-chat-selected">
        <p id="placeholder-text">BurmaldaGram Premium<br><span style="font-size: 13px; color: #8e8e93;">Оберіть чат або скористайтеся пошуком 🔍</span></p>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // БЕЗПЕКА XSS
    function escapeHTML(str) {
        if (typeof str !== 'string') return str;
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    // --- ЗВУКИ (Рінгтон додано) ---
    const audioSend = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');
    const audioReceiveInChat = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
    const audioReceiveOutChat = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    const audioRingtone = new Audio('https://assets.mixkit.co/active_storage/sfx/2870/2870-preview.mp3'); // Звук дзвінка
    
    audioSend.volume = 0.5; audioReceiveInChat.volume = 0.6; audioReceiveOutChat.volume = 0.8;
    audioRingtone.volume = 0.8;
    audioRingtone.loop = true;

    const translations = {
        uk: { searchPlaceholder: "Введіть ім'я...", dialogsTitle: "Ваші діалоги", placeholderText: "BurmaldaGram Premium<br><span style='font-size: 13px; color: #8e8e93;'>Оберіть чат 🔍</span>", backBtn: "‹", inputPlaceholder: "Напишіть повідомлення...", btnSend: "Надіслати", settingsTitle: "⚙️ Налаштування", profileTitle: "👤 Профіль", profile: "ID:", profileName: "Нік:", status: "Статус:", online: "в мережі", offline: "офлайн", loginTime: "Вхід:", logoutBtn: "Вийти та очистити 🚪", emptyList: "Список порожній", selfChatError: "Не можна створювати чат із собою!", ctxReply: "Відповісти ↩", ctxEdit: "Редагувати ✏️", userNotFound: "Не знайдено!", ctxPin: "Закріпити повідомлення 📌", ctxUnpin: "Відкріпити повідомлення 🔓", ctxDeleteMy: "Видалити (своє) 🗑", chatStatusOnline: "● онлайн", chatStatusOffline: "офлайн", typingText: "пише...", uploadBtn: "📁 Завантажити", bioPlaceholder: "Про себе:", bioEmpty: "Пусто", replyPrefix: "Відповідь: ", pinnedLabel: "Закріплено", blockedMeText: "Цей користувач вас заблокував." },
        ru: { searchPlaceholder: "Введите имя...", dialogsTitle: "Диалоги", placeholderText: "BurmaldaGram Premium", backBtn: "‹", inputPlaceholder: "Напишите...", btnSend: "Отправить", settingsTitle: "⚙️ Настройки", profileTitle: "👤 Профиль", profile: "ID:", profileName: "Ник:", status: "Статус:", online: "в сети", offline: "офлайн", loginTime: "Вход:", logoutBtn: "Выйти и очистить 🚪", emptyList: "Пусто", selfChatError: "Нельзя с собой!", ctxReply: "Ответить ↩", ctxEdit: "Изменить ✏️", userNotFound: "Не найден!", ctxPin: "Закрепить 📌", ctxUnpin: "Открепить 🔓", ctxDeleteMy: "Удалить 🗑", chatStatusOnline: "● онлайн", chatStatusOffline: "офлайн", typingText: "печатает...", uploadBtn: "📁 Загрузить", bioPlaceholder: "О себе:", bioEmpty: "Пусто", replyPrefix: "Ответ: ", pinnedLabel: "Закреплено", blockedMeText: "Этот пользователь вас заблокировал." },
        en: { searchPlaceholder: "Search...", dialogsTitle: "Chats", placeholderText: "BurmaldaGram Premium", backBtn: "‹", inputPlaceholder: "Message...", btnSend: "Send", settingsTitle: "⚙️ Settings", profileTitle: "👤 Profile", profile: "ID:", profileName: "Name:", status: "Status:", online: "online", offline: "offline", loginTime: "Login:", logoutBtn: "Log out & Clear 🚪", emptyList: "Empty", selfChatError: "Can't chat with yourself!", ctxReply: "Reply ↩", ctxEdit: "Edit ✏️", userNotFound: "Not found!", ctxPin: "Pin 📌", ctxUnpin: "Unpin 🔓", ctxDeleteMy: "Delete 🗑", chatStatusOnline: "● online", chatStatusOffline: "offline", typingText: "typing...", uploadBtn: "📁 Upload", bioPlaceholder: "Bio:", bioEmpty: "Empty", replyPrefix: "Reply: ", pinnedLabel: "Pinned", blockedMeText: "You are blocked by this user." }
    };
    let currentLang = localStorage.getItem('burmalda_lang') || 'uk';
    const urlParams = new URLSearchParams(window.location.search);
    const authToken = urlParams.get('auth');
    let myNick = 'Анонім';
    let authorized = false;
    let sessionTimeString = 'Невідомо';
    
    if (authToken) {
        try {
            const decoded = decodeURIComponent(atob(authToken));
            const parts = decoded.split('_');
            myNick = parts[0]; 
            const loginTime = parseInt(parts[1]);
            if (!isNaN(loginTime)) sessionTimeString = new Date(loginTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " " + new Date(loginTime).toLocaleDateString();
            if (Date.now() - loginTime < 86400000 && myNick) authorized = true;
        } catch (e) { console.error("Помилка авторизації:", e); }
    }

    if (!authorized) { alert('Доступ заблоковано!'); window.location.href = '/'; } 
    else { document.getElementById('main-body').style.display = 'flex'; }

    // --- ІЗОЛЯЦІЯ АКАУНТІВ (Ключі з прив'язкою до myNick) ---
    const getKey = (base) => `${base}_${myNick}`;
    
    let replyTargetMsgId = null;
    let editTargetMsgId = null;
    let activeChats = JSON.parse(localStorage.getItem(getKey('burmalda_chat_list'))) || [];
    let glowingChats = JSON.parse(localStorage.getItem(getKey('burmalda_glow_chats'))) || {};
    let pinnedMessages = JSON.parse(localStorage.getItem(getKey('burmalda_pinned_data'))) || {};
    let currentPinIndex = 0;
    let chatSettings = JSON.parse(localStorage.getItem(getKey('burmalda_chat_settings'))) || {};
    let myCustomStickers = JSON.parse(localStorage.getItem(getKey('burmalda_custom_stickers'))) || [];
    let savedMessages = JSON.parse(localStorage.getItem(getKey('burmalda_msg_history'))) || {};
    const ALL_EMOJIS = ['👍','❤️','😂','😮','😢','🙏','😎','🔥','💯','🎉','💩','👽','👻','🤡','🤝','💪','👀','🧠',' Ukraine','🍉'];

    const socket = io();
    
    function saveActiveChats() {
        localStorage.setItem(getKey('burmalda_chat_list'), JSON.stringify(activeChats));
        if (typeof socket !== 'undefined' && authorized) {
            socket.emit('sync_chat_list', { chatList: activeChats });
        }
    }

    let currentRoom = null;
    let currentActiveChatPartner = null;
    let onlineUsers = [];

    // Профілі можуть бути спільними (щоб бачити аватарки інших), але можемо й ізолювати
    let localProfiles = JSON.parse(localStorage.getItem('burmalda_profiles_data')) || {};

    const searchToggleBtn = document.getElementById('search-toggle-btn');
    const searchFrame = document.getElementById('search-frame');
    const searchInput = document.getElementById('search-input');
    const chatsList = document.getElementById('chats-list');
    const chatPlaceholder = document.getElementById('no-chat-placeholder');
    const chatArea = document.getElementById('chat-area');
    const chatTitleText = document.getElementById('chat-title-text');
    const typingStatusEl = document.getElementById('chat-typing-status');
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('button');
    const contextMenu = document.getElementById('global-context-menu');
    const settingsToggleBtn = document.getElementById('settings-toggle-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsCloseBtn = document.getElementById('settings-close-btn');
    const pinnedMessageBar = document.getElementById('pinned-message-bar');
    const pinnedBarTextContent = document.getElementById('pinned-bar-text-content');
    const pinCounterBadge = document.getElementById('pin-counter-badge');
    const emojiMenu = document.getElementById('emoji-menu');
    const stickerMenu = document.getElementById('sticker-menu');

    settingsToggleBtn.onclick = () => { openMyProfile(); };
    settingsCloseBtn.onclick = () => { settingsModal.classList.remove('active'); };
    document.getElementById('btn-back').onclick = () => { 
        if (document.body.classList.contains('chat-opened')) window.history.back();
    };
    window.onpopstate = function(event) { 
        if (document.body.classList.contains('chat-opened')) { 
            document.body.classList.remove('chat-opened');
            currentActiveChatPartner = null; currentRoom = null;
            chatArea.style.display = 'none'; chatPlaceholder.style.display = 'block'; 
            const cleanUrl = window.location.pathname + '?auth=' + urlParams.get('auth');
            window.history.replaceState({}, "", cleanUrl); 
            renderChatsList(); 
        } 
    };

    function getVisibleName(username) { 
        const uData = localProfiles[username];
        if (uData && uData.displayName && uData.displayName.trim() !== '') return uData.displayName.trim(); 
        return username;
    }

    function getAvatarHTML(username, cssClass = 'avatar') { 
        const uData = localProfiles[username];
        if (uData && uData.avatar && uData.avatar.startsWith('data:image')) { 
            return `<img src="${uData.avatar}" class="${cssClass}" id="av-node-${username}" alt="">`;
        } 
        const visibleName = getVisibleName(username);
        const firstLetter = visibleName ? visibleName.charAt(0) : '?'; 
        const placeholderClass = cssClass === 'avatar' ? 'avatar-placeholder' : 'modal-avatar-placeholder';
        const colors = ['#007aff', '#32d74b', '#ff453a', '#ff9f0a', '#5e5ce6', '#ff375f', '#bf5af2']; 
        let charCodeSum = 0;
        for (let i = 0; i < username.length; i++) charCodeSum += username.charCodeAt(i); 
        const pickedColor = colors[charCodeSum % colors.length];
        return `<div class="${placeholderClass}" id="av-node-${username}" style="background-color: ${pickedColor}">${firstLetter}</div>`; 
    }

    function applyLanguage() { 
        const t = translations[currentLang];
        document.getElementById('lang-select').value = currentLang;
        document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${getVisibleName(myNick)}</span>`; 
        searchInput.placeholder = t.searchPlaceholder; 
        document.getElementById('lbl-dialogs').textContent = t.dialogsTitle; 
        document.getElementById('placeholder-text').innerHTML = t.placeholderText; 
        document.getElementById('btn-back').textContent = t.backBtn;
        input.placeholder = t.inputPlaceholder;
        button.textContent = t.btnSend; 
        document.getElementById('lbl-profile-name').textContent = t.profileName; 
        document.getElementById('lbl-profile').textContent = t.profile; 
        document.getElementById('lbl-status').textContent = t.status; 
        document.getElementById('lbl-bio-title').textContent = t.bioPlaceholder;
        document.getElementById('lbl-time').textContent = t.loginTime;
        document.getElementById('btn-logout').textContent = t.logoutBtn; 
        document.getElementById('lbl-upload-btn').textContent = t.uploadBtn; 

        if (settingsModal.classList.contains('active')) { 
            const openedNick = document.getElementById('info-nick').textContent;
            const isMe = (openedNick === myNick);
            document.getElementById('modal-title-text').textContent = isMe ? t.settingsTitle : t.profileTitle; 
            const isOnline = onlineUsers.includes(openedNick);
            const statusLabel = document.getElementById('lbl-online-status'); 
            statusLabel.textContent = isOnline ? t.online : t.offline; 
            statusLabel.style.color = isOnline ? '#32d74b' : '#ff453a';
        } 
        renderChatsList(); loadMessagesHistory(); renderStickersList();
    }

    function changeLanguage(lang) { currentLang = lang; localStorage.setItem('burmalda_lang', lang); applyLanguage(); }

    function openMyProfile() { 
        const t = translations[currentLang];
        document.getElementById('info-nick').textContent = myNick; 
        const myData = localProfiles[myNick] || { avatar: '', bio: '', displayName: '' }; 
        document.getElementById('profile-display-name').disabled = false;
        document.getElementById('profile-display-name').value = myData.displayName || myNick; 
        document.getElementById('profile-desc').disabled = false; document.getElementById('profile-desc').value = myData.bio || ''; document.getElementById('profile-desc').placeholder = t.bioEmpty; 
        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar');
        document.getElementById('info-login-time').textContent = sessionTimeString; 
        document.getElementById('lbl-upload-btn').style.display = 'block'; document.getElementById('btn-logout').style.display = 'block'; 
        document.getElementById('lang-select-block').style.display = 'block'; document.getElementById('login-time-block').style.display = 'block'; 
        document.getElementById('sticker-creator-block').style.display = 'block';
        applyLanguage(); settingsModal.classList.add('active');
    }

    function openPartnerProfile() { 
        if (!currentActiveChatPartner) return;
        const t = translations[currentLang]; document.getElementById('info-nick').textContent = currentActiveChatPartner; 
        const pData = localProfiles[currentActiveChatPartner] || { avatar: '', bio: '', displayName: '' };
        document.getElementById('profile-display-name').disabled = true; document.getElementById('profile-display-name').value = pData.displayName || currentActiveChatPartner; 
        document.getElementById('profile-desc').disabled = true; document.getElementById('profile-desc').value = pData.bio || ''; document.getElementById('profile-desc').placeholder = t.bioEmpty;
        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(currentActiveChatPartner, 'modal-avatar'); 
        document.getElementById('lbl-upload-btn').style.display = 'none'; document.getElementById('btn-logout').style.display = 'none'; 
        document.getElementById('lang-select-block').style.display = 'none'; document.getElementById('login-time-block').style.display = 'none'; 
        document.getElementById('sticker-creator-block').style.display = 'none';
        applyLanguage();
        settingsModal.classList.add('active');
    }

    function saveMyDisplayName(val) { 
        if (!localProfiles[myNick]) localProfiles[myNick] = {};
        localProfiles[myNick].displayName = val; 
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles)); socket.emit('update_profile', { username: myNick, data: localProfiles[myNick] }); 
        document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${getVisibleName(myNick)}</span>`;
    }

    function saveMyBio(val) { 
        if (!localProfiles[myNick]) localProfiles[myNick] = {};
        localProfiles[myNick].bio = val; 
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles)); socket.emit('update_profile', { username: myNick, data: localProfiles[myNick] });
    }

    function handleAvatarUpload(inputEl) { 
        const file = inputEl.files[0];
        if (!file) return; const reader = new FileReader(); 
        reader.onloadend = function() { 
            if (!localProfiles[myNick]) localProfiles[myNick] = {};
            localProfiles[myNick].avatar = reader.result; 
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles)); socket.emit('update_profile', { username: myNick, data: localProfiles[myNick] }); 
            document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar'); document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${getVisibleName(myNick)}</span>`;
        }; reader.readAsDataURL(file); 
    }

    function uploadCustomStickers(inputEl) {
        if (!inputEl.files || inputEl.files.length === 0) return;
        Array.from(inputEl.files).forEach(file => {
            const reader = new FileReader();
            reader.onloadend = () => {
                myCustomStickers.push(reader.result);
                localStorage.setItem(getKey('burmalda_custom_stickers'), JSON.stringify(myCustomStickers));
                renderStickersList();
            };
            reader.readAsDataURL(file);
        });
        inputEl.value = '';
    }

    function renderStickersList() {
        const preview = document.getElementById('my-stickers-preview');
        preview.innerHTML = '';
        myCustomStickers.forEach((st, idx) => {
            const img = document.createElement('img');
            img.src = st;
            img.className = 'pack-item-preview';
            img.onclick = () => {
                if (confirm("Видалити цей стікер?")) {
                    myCustomStickers.splice(idx, 1);
                    localStorage.setItem(getKey('burmalda_custom_stickers'), JSON.stringify(myCustomStickers));
                    renderStickersList();
                }
            };
            preview.appendChild(img);
        });
        stickerMenu.innerHTML = '';
        if (myCustomStickers.length === 0) {
            stickerMenu.innerHTML = '<span style="color:#8e8e93; font-size:13px;">У вас немає стікерів. Додайте їх в налаштуваннях.</span>';
        } else {
            myCustomStickers.forEach(st => {
                const img = document.createElement('img');
                img.src = st;
                img.className = 'sticker-item';
                img.onclick = () => sendSpecialMessage(st, 'sticker');
                stickerMenu.appendChild(img);
            });
        }
    }

    function buildEmojiMenu() {
        emojiMenu.innerHTML = '';
        ALL_EMOJIS.forEach(e => {
            const span = document.createElement('span');
            span.textContent = e;
            span.className = 'popup-item';

    function renderPinnedBar() {
        if (!currentRoom) return;

            pinnedMessageBar.style.display = 'none';

        scrollToPinnedMessage();
    }

    function pinMessage(msgId, text) {
        if (!Array.isArray(pinnedMessages[currentRoom])) pinnedMessages[currentRoom] = [];
        if (!pinnedMessages[currentRoom].some(p => p.id === msgId)) {
            pinnedMessages[currentRoom].push({ id: msgId, text: text });
            localStorage.setItem(getKey('burmalda_pinned_data'), JSON.stringify(pinnedMessages));
            socket.emit('pin_message', { room: currentRoom, action: 'add', pinData: { id: msgId, text: text } });
            currentPinIndex = pinnedMessages[currentRoom].length - 1;
            renderPinnedBar();
        }
    }

    function requestUnpin(e) {
        e.stopPropagation();
        const pins = pinnedMessages[currentRoom] || [];
        if (pins.length > 0) {
            const removed = pins[currentPinIndex];
            pinnedMessages[currentRoom].splice(currentPinIndex, 1);
            if (currentPinIndex >= pinnedMessages[currentRoom].length) currentPinIndex = 0;
            localStorage.setItem(getKey('burmalda_pinned_data'), JSON.stringify(pinnedMessages));
            socket.emit('pin_message', { room: currentRoom, action: 'remove', pinData: removed });
            renderPinnedBar();
        }
    }

    let mediaRecorder = null;
    let recordedChunks = [];
    let currentRecordType = null;

    async function startRecording(type) {
        try {
            const constraints = type === 'video_circle' ? { video: { facingMode: "user" }, audio: true } : { audio: true };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];
            
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const mimeType = type === 'video_circle' ? 'video/webm' : 'audio/webm';
                const blob = new Blob(recordedChunks, { type: mimeType });
                const reader = new FileReader();
                reader.onloadend = () => { sendSpecialMessage(reader.result, type); };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
        } catch(e) { alert('Помилка доступу до камери/мікрофона'); console.error(e); }
    }

    function toggleAudioRecord() {
        const btn = document.getElementById('btn-audio-rec');
        if (currentRecordType === 'audio') { mediaRecorder.stop(); currentRecordType = null; btn.classList.remove('recording'); } 
        else { if (mediaRecorder) mediaRecorder.stop(); startRecording('audio'); currentRecordType = 'audio'; btn.classList.add('recording'); }
    }

    function toggleVideoRecord() {
        const btn = document.getElementById('btn-video-rec');
        if (currentRecordType === 'video_circle') { mediaRecorder.stop(); currentRecordType = null; btn.classList.remove('recording'); } 
        else { if (mediaRecorder) mediaRecorder.stop(); startRecording('video_circle'); currentRecordType = 'video_circle'; btn.classList.add('recording'); }
    }

    function appendSingleMessage(msg) {

            const quoteDiv = document.createElement('div'); quoteDiv.className = 'reply-quote';

                if (originalMsg.type === 'sticker') quoteText = '🦄 Стікер';

            quoteDiv.textContent = quoteText;
            quoteDiv.onclick = (e) => { e.stopPropagation(); const targetNode = document.getElementById(`msg-item-${msg.replyTo}`); if (targetNode) targetNode.scrollIntoView({ behavior: 'smooth', block: 'center' }); };
            li.appendChild(quoteDiv);
        }

        if (msg.type === 'image') {
            const mediaWrapper = document.createElement('div');
            mediaWrapper.className = 'chat-media-wrapper'; mediaWrapper.style.padding = '4px';
            const placeholder = document.createElement('div'); placeholder.style.padding = '14px 20px'; placeholder.style.background = '#1c1c1e'; placeholder.style.borderRadius = '10px';
            placeholder.style.textAlign = 'center'; placeholder.style.cursor = 'pointer'; placeholder.style.border = '1px dashed #3a3a3c';
            placeholder.innerHTML = '🖼️ <b>Відкрити медіа</b>';
            placeholder.onclick = (e) => { e.stopPropagation(); placeholder.style.display = 'none'; const img = document.createElement('img'); img.src = msg.text; img.className = 'chat-media-img'; mediaWrapper.appendChild(img); };
            mediaWrapper.appendChild(placeholder); li.appendChild(mediaWrapper);
        } else if (msg.type === 'sticker') {
            const img = document.createElement('img'); img.src = msg.text; img.className = 'sticker-img'; li.appendChild(img);
        } else if (msg.type === 'audio') {
            const audio = document.createElement('audio'); audio.controls = true; audio.src = msg.text; audio.className = 'audio-msg'; li.appendChild(audio);
        } else if (msg.type === 'video_circle') {
            const video = document.createElement('video'); video.src = msg.text; video.autoplay = true; video.loop = true; video.muted = true; video.className = 'circle-video';
            video.onclick = (e) => { e.stopPropagation(); video.muted = !video.muted; }; li.appendChild(video);
        } else {
            const textNode = document.createElement('span');
            // ФІКС БЕЗПЕКИ: екранування тексту від ін'єкцій
            textNode.innerHTML = escapeHTML(msg.text) + (msg.edited ? ' <small style="color:rgba(255,255,255,0.6); font-size:10px; margin-left:4px;">(змінено)</small>' : ''); 
            li.appendChild(textNode);
        }

        const metaLine = document.createElement('div'); metaLine.className = 'msg-meta-line';
        const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); 
        
        let checkmarksHtml = '';
        if (msg.from === myNick) {
            const isRead = msg.status === 'read';
            const checkmarks = isRead ? '✓✓' : '✓';
            checkmarksHtml = `<span class="msg-status ${isRead ? 'read' : ''}" id="status-${msg.id}">${checkmarks}</span>`;
        }

        const reactionsHolder = document.createElement('div');
        reactionsHolder.className = 'reactions-holder'; li.appendChild(reactionsHolder);
        const picker = document.createElement('div'); picker.className = 'reaction-picker';
        ALL_EMOJIS.slice(0, 10).forEach(em => {

        liWrapper.appendChild(picker);

        li.onclick = (e) => { e.stopPropagation(); document.querySelectorAll('.reaction-picker').forEach(p => { if(p !== picker) p.style.display = 'none'; });
        picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex'; };
        li.oncontextmenu = (e) => { 
            e.preventDefault(); picker.style.display = 'none';
            let summary = msg.text;
            if (msg.type === 'image') summary = '📷 Фотографія';
            if (msg.type === 'sticker') summary = '🦄 Стікер';
            if (msg.type === 'audio') summary = '🎤 Аудіо';
            if (msg.type === 'video_circle') summary = '🔵 Відео';

            const menuOptions = [ { text: translations[currentLang].ctxReply, action: () => { setReplyTarget(msg.id, summary); } }, { text: translations[currentLang].ctxPin, action: () => { pinMessage(msg.id, summary); } } ];
            if (msg.from === myNick) {
                if (msg.type === 'text') menuOptions.push({ text: translations[currentLang].ctxEdit, action: () => { setEditTarget(msg.id, msg.text); } });
                menuOptions.push({ text: translations[currentLang].ctxDeleteMy, class: 'delete-btn', action: () => { requestSmartDeleteMessage(msg.id); } });
            }
            showContextMenu(e, menuOptions);
        }; 

        liWrapper.appendChild(li); messagesContainer.appendChild(liWrapper); renderReactionsUI(msg.id, msg.reactions, reactionsHolder);

    function toggleMessageReaction(msgId, reaction) {
        const chatMsgs = savedMessages[currentRoom] || []; const msg = chatMsgs.find(m => m.id === msgId); if (!msg) return;
        if (!msg.reactions) msg.reactions = {};
        if (!msg.reactions[reaction]) msg.reactions[reaction] = [];
        if (msg.reactions[reaction].includes(myNick)) { msg.reactions[reaction] = msg.reactions[reaction].filter(u => u !== myNick); } else { msg.reactions[reaction].push(myNick); }
        if (msg.reactions[reaction].length === 0) delete msg.reactions[reaction];
        localStorage.setItem(getKey('burmalda_msg_history'), JSON.stringify(savedMessages));
        socket.emit('message_reaction', { room: currentRoom, msgId: msgId, username: myNick, reaction: reaction, reactions: msg.reactions }); loadMessagesHistory();
    }

        resetCallControls();
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            document.getElementById('local-video').srcObject = localStream;
            socket.emit('call_request', { room: currentRoom, from: myNick, to: currentActiveChatPartner });
        } catch(e) { alert('Помилка доступу до камери або мікрофона'); endCall(); }
    }

    socket.on('call_request', async (data) => {
        if (data.to === myNick) {
            document.getElementById('call-modal').classList.add('active');
            document.getElementById('call-status-text').textContent = `${data.from} дзвонить...`;
            document.getElementById('btn-accept-call').style.display = 'inline-block';
            document.getElementById('btn-accept-call').onclick = () => acceptCall(data.room, data.from);
            
            // Запускаємо рінгтон
            audioRingtone.play().catch(e => console.log("Рінгтон заблоковано браузером:", e));
        }
    });
    
    async function acceptCall(room, caller) {
        audioRingtone.pause(); audioRingtone.currentTime = 0; // Зупиняємо рінгтон
        document.getElementById('btn-accept-call').style.display = 'none';
        document.getElementById('call-status-text').textContent = 'З\'єднання...';
        resetCallControls();
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            document.getElementById('local-video').srcObject = localStream;
            
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => { document.getElementById('remote-video').srcObject = event.streams[0]; };
            peerConnection.onicecandidate = (event) => { if (event.candidate) socket.emit('call_ice_candidate', { room, candidate: event.candidate }); };
            
            socket.emit('call_accept', { room, from: myNick });
        } catch(e) { alert('Помилка доступу до камери/мікрофона'); endCall(); }
    }

    socket.on('call_accept', async (data) => {
        audioRingtone.pause(); audioRingtone.currentTime = 0; // Зупиняємо якщо це той хто дзвонив
        document.getElementById('call-status-text').textContent = 'Розмова';
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.ontrack = (event) => { document.getElementById('remote-video').srcObject = event.streams[0]; };
        peerConnection.onicecandidate = (event) => { if (event.candidate) socket.emit('call_ice_candidate', { room: data.room, candidate: event.candidate }); };
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.emit('call_offer', { room: data.room, offer });
    });
    
    socket.on('call_offer', async (data) => {
        if (!peerConnection) return;
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('call_answer', { room: data.room, answer });
        document.getElementById('call-status-text').textContent = 'Розмова';
    });
    
    socket.on('call_answer', async (data) => {
        if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
    });
    
    socket.on('call_ice_candidate', async (data) => {
        if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
    });
    
    socket.on('call_end', () => { endCall(false); });
    socket.on('call_reject', () => { alert("Абонент відхилив дзвінок"); endCall(false); });

    function endCall(emit = true) {
        audioRingtone.pause(); audioRingtone.currentTime = 0; // Завжди зупиняємо рінгтон при завершенні
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        if (peerConnection) peerConnection.close();
        peerConnection = null; localStream = null;
        document.getElementById('local-video').srcObject = null;
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('call-modal').classList.remove('active');
        if(document.getElementById('btn-toggle-mic')) document.getElementById('btn-toggle-mic').style.display = 'none';
        if(document.getElementById('btn-toggle-cam')) document.getElementById('btn-toggle-cam').style.display = 'none';
        
        if (emit && currentRoom) {
            // Якщо ми дзвонили і скинули до підключення, відправляємо відхилення
            if(document.getElementById('btn-accept-call').style.display !== 'none') {
                 socket.emit('call_reject', { room: currentRoom });
            } else {
                 socket.emit('call_end', { room: currentRoom });
            }
        }
    }

    // --- SOCKET EVENTS ---
    socket.on('connect', () => { socket.emit('online_ping', { username: myNick }); });
    socket.on('online_list', (users) => { onlineUsers = users; applyLanguage(); });
    
    socket.on('restore_chats', (list) => {
        if (list && Array.isArray(list) && list.length > 0) {
            activeChats = list;
            localStorage.setItem(getKey('burmalda_chat_list'), JSON.stringify(activeChats));
            renderChatsList();
        }
    });

    socket.on('user_blocked_you', (data) => {
        if (data.room === currentRoom && data.blocked) {
            input.disabled = true;
            input.placeholder = translations[currentLang].blockedMeText || "Цей користувач вас заблокував.";
            button.disabled = true;
        }
    });
    
    socket.on('chat_message', (msg) => { 
        if (chatSettings[myNick] && chatSettings[myNick].blocked) return; 
        if (chatSettings[msg.from]?.blocked) return;

        if (msg.room !== currentRoom) {
            if (!activeChats.includes(msg.from)) { activeChats.push(msg.from); saveActiveChats(); }
            glowingChats[msg.from] = true; localStorage.setItem(getKey('burmalda_glow_chats'), JSON.stringify(glowingChats));
            
            if (!savedMessages[msg.room]) savedMessages[msg.room] = [];
            if (!savedMessages[msg.room].some(m => m.id === msg.id)) { savedMessages[msg.room].push(msg); localStorage.setItem(getKey('burmalda_msg_history'), JSON.stringify(savedMessages)); }
            renderChatsList();
            
            if (!chatSettings[msg.from]?.muted) audioReceiveOutChat.play().catch(e=>console.log(e));

        } else {
            if (!savedMessages[currentRoom]) savedMessages[currentRoom] = [];
            if (!savedMessages[currentRoom].some(m => m.id === msg.id)) { 
                savedMessages[currentRoom].push(msg);
                localStorage.setItem(getKey('burmalda_msg_history'), JSON.stringify(savedMessages));
                appendSingleMessage(msg); messagesContainer.scrollTop = messagesContainer.scrollHeight; 
                if (msg.from !== myNick) socket.emit('mark_read', { room: currentRoom, reader: myNick });
                if (!chatSettings[msg.from]?.muted) audioReceiveInChat.play().catch(e=>console.log(e));
            } 
        }
    });
    
    socket.on('messages_read', (data) => {
        if (savedMessages[data.room]) {
            let updated = false;
            savedMessages[data.room].forEach(msg => {
                if (msg.from !== data.reader && msg.status !== 'read') {
                    msg.status = 'read'; updated = true;
                    const statusEl = document.getElementById(`status-${msg.id}`);
                    if (statusEl) { statusEl.textContent = '✓✓'; statusEl.classList.add('read'); }
                }
            });
            if (updated) localStorage.setItem(getKey('burmalda_msg_history'), JSON.stringify(savedMessages));
        }
    });
    
    socket.on('edit_message', (data) => {
        if (currentRoom === data.room) { executeLocalEdit(data.msgId, data.newText); } 
        else if (savedMessages[data.room]) {
            const msg = savedMessages[data.room].find(m => m.id === data.msgId);
            if (msg) { msg.text = data.newText; msg.edited = true; localStorage.setItem(getKey('burmalda_msg_history'), JSON.stringify(savedMessages)); }
        }
    });
    
    socket.on('delete_message', (data) => {
        if (currentRoom === data.room) { executeLocalDeletion(data.msgId); } 
        else if (savedMessages[data.room]) {
            savedMessages[data.room] = savedMessages[data.room].filter(m => m.id !== data.msgId); localStorage.setItem(getKey('burmalda_msg_history'), JSON.stringify(savedMessages));
        }
    });
    
    socket.on('message_reaction', (data) => {
        if (savedMessages[data.room]) {
            const msg = savedMessages[data.room].find(m => m.id === data.msgId);
            if (msg) { msg.reactions = data.reactions || {}; localStorage.setItem(getKey('burmalda_msg_history'), JSON.stringify(savedMessages)); if (currentRoom === data.room) loadMessagesHistory(); }
        }
    });
    
    socket.on('pin_message', (data) => {
        const room = data.room;
        if (!Array.isArray(pinnedMessages[room])) pinnedMessages[room] = [];
        if (data.action === 'add') { if (!pinnedMessages[room].some(p => p.id === data.pinData.id)) pinnedMessages[room].push(data.pinData); } 
        else if (data.action === 'remove') { pinnedMessages[room] = pinnedMessages[room].filter(p => p.id !== data.pinData.id); }
        localStorage.setItem(getKey('burmalda_pinned_data'), JSON.stringify(pinnedMessages));
        if (room === currentRoom) { currentPinIndex = Math.max(0, pinnedMessages[room].length - 1); renderPinnedBar(); }
    });
    
    socket.on('typing_status', (data) => { 
        if (currentRoom === data.room && data.user !== myNick) { 
            typingStatusEl.textContent = `${getVisibleName(data.user)} ${translations[currentLang].typingText}`; typingStatusEl.style.display = data.isTyping ? 'block' : 'none'; 
        } 
    });
    
    socket.on('profile_broadcast', (profileUpdate) => { 
        localProfiles[profileUpdate.username] = profileUpdate.data; localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles)); 
        if (profileUpdate.username === currentActiveChatPartner || profileUpdate.username === myNick) { 
            const isOnline = onlineUsers.includes(currentActiveChatPartner);
            if (currentActiveChatPartner) { chatTitleText.innerHTML = `${getAvatarHTML(currentActiveChatPartner)} <span>${getVisibleName(currentActiveChatPartner)} ${isOnline ? '<small style="color:#32d74b; font-size:11px;">●</small>' : ''}</span>`; }
        } renderChatsList(); 
    });
    
    // --- ОЧИЩЕННЯ СЛІДІВ ПРИ ВИХОДІ ---
    function logout() { 
        localStorage.removeItem('burmalda_auth_token');
        // Повністю видаляємо всі дані цього користувача з браузера
        Object.keys(localStorage).forEach(key => {
            if (key.includes(`_${myNick}`)) {
                localStorage.removeItem(key);
            }
        });
        window.location.href = '/'; 
    }

    if (window.visualViewport) { 
        window.visualViewport.addEventListener('resize', () => { 
            const containerEl = document.getElementById('input-panel-container'); 
            if (window.visualViewport.height < window.innerHeight) { 
                const keyboardHeight = window.innerHeight - window.visualViewport.height; 
                containerEl.style.position = 'fixed'; 
                containerEl.style.bottom = keyboardHeight + 'px'; messagesContainer.style.paddingBottom = '90px'; setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 60); 
            } else { containerEl.style.position = 'relative'; containerEl.style.bottom = '0px'; messagesContainer.style.paddingBottom = '20px'; } 
        });
    }

    applyLanguage();
    const initialChatPartner = urlParams.get('chat'); if (initialChatPartner && activeChats.includes(initialChatPartner)) openChatWith(initialChatPartner);
</script>
