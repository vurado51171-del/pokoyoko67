<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BurmaldaGram Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #121212;
            --bg-chat: #0e0e0e;
            --border-color: #222222;
            --text-main: #ffffff;
            --text-muted: #888888;
            --my-msg: #ffffff;
            --my-msg-text: #000000;
            --other-msg: #1a1a1a;
            --other-msg-text: #ffffff;
            --accent: #ffffff;
        }

        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; position: relative; }

        /* Анімації */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Ліва панель */
        #sidebar { width: 340px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .sidebar-header { padding: 20px 15px; background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .my-profile { font-weight: 600; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: opacity 0.2s; }
        .my-profile:hover { opacity: 0.8; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .header-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); transition: color 0.2s, transform 0.2s; padding: 5px; outline: none; }
        .header-btn:hover { color: var(--text-main); transform: scale(1.05); }

        .search-container { padding: 12px 15px; background: #161616; border-bottom: 1px solid var(--border-color); display: none; transform-origin: top; animation: fadeInUp 0.2s ease; }
        .search-container.active { display: block; }
        .search-container input { width: 100%; padding: 10px 12px; background: #0a0a0a; border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; font-size: 15px; transition: border-color 0.2s; }
        .search-container input:focus { border-color: #555; }

        .section-title { padding: 15px 15px 5px 15px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        #chats-list { flex-grow: 1; overflow-y: auto; padding: 5px; }
        
        .chat-item { padding: 12px 10px; border-radius: 10px; margin-bottom: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; user-select: none; }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #222222; }
        .chat-info-block { display: flex; align-items: center; gap: 12px; }
        .chat-item-name { font-size: 15px; font-weight: 500; }
        .status-dot { font-size: 11px; color: var(--text-muted); }
        .status-dot.online { color: #ffffff; font-weight: bold; }

        .avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-color); }
        .avatar-placeholder { width: 42px; height: 42px; border-radius: 50%; background: #ffffff; color: #000000; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; text-transform: uppercase; flex-shrink: 0; }

        /* Права панель чату */
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-chat); position: relative; }
        #chat-header { padding: 15px 20px; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; min-height: 73px; z-index: 5; }
        .header-meta { display: flex; align-items: center; gap: 15px; }
        #chat-title-text { cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
        .typing-indicator { font-size: 13px; color: var(--text-muted); font-style: italic; margin-left: 5px; animation: pulse 1s infinite; }

        .back-btn { display: none; background: #1a1a1a; border: 1px solid var(--border-color); color: white; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .back-btn:hover { background: #252525; }
        
        #messages { list-style-type: none; padding: 20px; margin: 0; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        
        /* Бабли повідомлень із правильним вирівнюванням */
        .msg-container { position: relative; display: flex; flex-direction: column; max-width: 65%; width: 100%; align-items: flex-start; margin-bottom: 8px; animation: fadeInUp 0.25s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .msg-container.my-wrapper { align-self: flex-end; align-items: flex-end; }

        #messages li { padding: 11px 15px; background: var(--other-msg); color: var(--other-msg-text); border-radius: 16px 16px 16px 4px; word-break: break-word; user-select: none; position: relative; cursor: pointer; transition: background 0.15s; width: fit-content; max-width: 100%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        #messages li.my-msg { background: var(--my-msg); color: var(--my-msg-text); border-radius: 16px 16px 4px 16px; padding-right: 45px; }
        #messages li:hover { filter: brightness(1.1); }
        
        .msg-status { position: absolute; bottom: 3px; right: 8px; font-size: 10px; color: rgba(0, 0, 0, 0.4); font-weight: bold; }
        .my-msg .msg-status.read { color: rgba(0, 0, 0, 0.7); }

        /* Контент медіа з прихованим кліком */
        .media-preview-container { margin-top: 5px; max-width: 250px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid var(--border-color); background: #151515; text-align: center; }
        .media-blur-box { padding: 20px 10px; font-size: 12px; color: var(--text-muted); background: #1c1c1c; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .media-blur-box:hover { color: #fff; }
        .media-content-loaded { width: 100%; max-height: 200px; object-fit: cover; display: block; }
        .doc-file-loaded { display: flex; align-items: center; gap: 10px; padding: 12px; background: #222; color: #fff; text-decoration: none; font-size: 13px; text-align: left; }

        /* Реакції */
        .reaction-picker { position: absolute; top: -45px; left: 10px; background: #1a1a1a; border: 1px solid var(--border-color); border-radius: 30px; padding: 5px 10px; display: none; gap: 10px; z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .msg-container.my-wrapper .reaction-picker { left: auto; right: 10px; }
        .reaction-picker span { font-size: 20px; cursor: pointer; transition: transform 0.1s; display: inline-block; }
        .reaction-picker span:hover { transform: scale(1.3); }

        .reactions-holder { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .reaction-chip { background: #161616; border: 1px solid var(--border-color); border-radius: 20px; padding: 3px 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.1s; }
        .reaction-chip.active-my { background: #ffffff; color: #000000; border-color: #ffffff; }

        /* Форма введення */
        #form { padding: 15px 20px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-top: 1px solid var(--border-color); position: relative; z-index: 5; gap: 8px; }
        .input-row { display: flex; width: 100%; align-items: center; gap: 10px; }
        #input { flex-grow: 1; padding: 14px; background: #161616; border: 1px solid var(--border-color); color: white; border-radius: 12px; outline: none; font-size: 15px; transition: border-color 0.2s; }
        #input:focus { border-color: #444; }
        
        .form-action-btn { background: #1a1a1a; border: 1px solid var(--border-color); color: white; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: background 0.2s; }
        .form-action-btn:hover { background: #252525; }
        .form-action-btn.recording { background: #dc3545; color: white; animation: pulse 1s infinite; }

        #button { padding: 0 22px; height: 45px; background: #ffffff; color: #000000; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px; flex-shrink: 0; transition: opacity 0.2s; }
        #button:hover { opacity: 0.9; }
        
        .no-chat-selected { margin: auto; text-align: center; color: var(--text-muted); font-size: 16px; line-height: 1.6; padding: 20px; }

        /* Шторка Контекстного Меню */
        .context-menu { position: fixed; background: #161616; border: 1px solid var(--border-color); border-radius: 12px; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.7); min-width: 180px; overflow: hidden; animation: fadeInUp 0.15s ease; }
        .context-menu button { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 12px 16px; font-size: 14px; cursor: pointer; outline: none; transition: background 0.15s; }
        .context-menu button:hover { background: #222; }
        .context-menu button.delete-btn { color: #ff4a5a; font-weight: 600; border-top: 1px solid var(--border-color); }

        /* Панель превью дій */
        .action-preview-bar { display: none; background: #161616; border-left: 3px solid #ffffff; padding: 8px 12px; border-radius: 6px; justify-content: space-between; align-items: center; font-size: 13px; }
        .action-preview-bar .preview-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); max-width: 85%; }
        .action-preview-bar .close-preview { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; }

        .reply-box { background: rgba(255, 255, 255, 0.08); border-left: 2px solid #fff; padding: 4px 8px; margin-bottom: 6px; border-radius: 4px; font-size: 12px; color: #bbb; }
        .my-msg .reply-box { border-left-color: #000; color: #333; background: rgba(0, 0, 0, 0.05); }

        /* Покращена Бічна Шторка Модальних Вікон (Шторка справа наліво) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: none; justify-content: flex-end; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #111111; height: 100%; width: 100%; max-width: 380px; border-left: 1px solid var(--border-color); padding: 30px 25px; display: flex; flex-direction: column; animation: slideInRight 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); overflow-y: auto; }
        
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 25px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 26px; cursor: pointer; }
        
        .account-property { margin-bottom: 18px; font-size: 14px; }
        .account-property label { display: block; color: var(--text-muted); margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .profile-name-input, .profile-desc-input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; font-size: 14px; margin-top: 5px; }
        .profile-desc-input { resize: none; height: 70px; }
        .profile-name-input:disabled, .profile-desc-input:disabled { background: #0c0c0c; color: var(--text-muted); cursor: not-allowed; }

        .profile-avatar-container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 25px; }
        .modal-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); }
        .modal-avatar-placeholder { width: 90px; height: 90px; border-radius: 50%; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; text-transform: uppercase; }

        .lang-select { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; cursor: pointer; }
        .settings-logout-btn { width: 100%; padding: 14px; background: #222; color: #ff4a5a; border: 1px solid #333; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: auto; font-size: 14px; transition: background 0.2s; }
        .settings-logout-btn:hover { background: #ff4a5a; color: white; }

        /* Адаптивність для телефонів */
        @media (max-width: 768px) {
            #sidebar { width: 100%; display: flex; }
            #chat-main { display: none; width: 100%; }
            body.chat-opened #sidebar { display: none; }
            body.chat-opened #chat-main { display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; }
            body.chat-opened .back-btn { display: block; }
            .msg-container { max-width: 85%; width: 100%; }
            .no-chat-selected { display: none; }
            .modal-content { max-width: 100%; }
        }
    </style>
</head>
<body id="main-body" style="display: none;">

<div id="sidebar">
    <div class="sidebar-header">
        <div class="my-profile" id="my-profile-name" onclick="openMyProfile()">...</div>
        <div class="header-controls">
            <button class="header-btn" id="search-toggle-btn">🔍</button>
            <button class="header-btn" id="settings-toggle-btn">⚙️</button>
        </div>
    </div>
    <div class="search-container" id="search-frame">
        <input type="text" id="search-input" autocomplete="off">
    </div>
    <div class="section-title" id="lbl-dialogs">Діалоги</div>
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <div id="no-chat-placeholder" class="no-chat-selected">
        <p id="placeholder-text">BurmaldaGram<br><span style="font-size: 13px; color: var(--text-muted);">Оберіть чат або скористайтеся пошуком</span></p>
    </div>
    
    <div id="chat-area" style="display: none; flex-direction: column; height: 100%;">
        <div id="chat-header">
            <div class="header-meta">
                <button class="back-btn" id="btn-back">⬅ Назад</button>
                <span id="chat-title-text" onclick="openPartnerProfile()">Чат</span>
            </div>
            <div id="chat-typing-status" class="typing-indicator"></div>
        </div>
        
        <ul id="messages"></ul>
        
        <div id="form">
            <div class="action-preview-bar" id="action-preview">
                <span class="preview-text" id="preview-text-content"></span>
                <button class="close-preview" onclick="cancelInputAction()">&times;</button>
            </div>
            <div class="input-row">
                <button class="form-action-btn" onclick="document.getElementById('media-file-input').click()">📎</button>
                <input type="file" id="media-file-input" style="display: none;" onchange="handleMediaUpload(this)">
                
                <input id="input" autocomplete="off" />
                
                <button class="form-action-btn" id="voice-record-btn" onclick="toggleVoiceRecord()">🎤</button>
                <button id="button">Надіслати</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <div class="modal-title">
            <span id="modal-title-text">⚙️ Налаштування</span>
            <button class="modal-close" id="settings-close-btn">&times;</button>
        </div>
        
        <div class="profile-avatar-container">
            <div id="modal-avatar-view"></div>
            <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" onchange="handleAvatarUpload(this)">
            <button class="form-action-btn" id="lbl-upload-btn" style="width:auto; padding:0 15px; font-size:13px;" onclick="document.getElementById('avatar-file-input').click()">Завантажити фото</button>
        </div>

        <div id="account-info">
            <div class="account-property">
                <label id="lbl-profile-name">Ім'я в чаті:</label>
                <input type="text" id="profile-display-name" class="profile-name-input" oninput="saveMyDisplayName(this.value)">
            </div>
            <div class="account-property">
                <span id="lbl-profile">ID користувача:</span> <strong id="info-nick" style="color: #888;">...</strong>
            </div>
            <div class="account-property">
                <span id="lbl-status">Статус:</span> <strong id="lbl-online-status">В мережі</strong>
            </div>
            <div class="account-property">
                <label id="lbl-bio-title">Про себе:</label>
                <textarea id="profile-desc" class="profile-desc-input" oninput="saveMyBio(this.value)"></textarea>
            </div>
            <div class="account-property" id="login-time-block">
                <label id="lbl-time">Час сесії:</label> 
                <span id="info-login-time" style="font-weight: bold; color: #fff;"></span>
            </div>
        </div>

        <div class="lang-select-container" id="lang-select-block" style="margin-top: 15px;">
            <label id="lbl-lang-title" style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px;">Мова додатку:</label>
            <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="uk">Українська</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>

        <button class="settings-logout-btn" id="btn-logout" onclick="logout()">Вийти з акаунту 🚪</button>
    </div>
</div>

<div class="context-menu" id="global-context-menu"></div>

<script src="/socket.io/socket.io.js"></script>

    if (authToken) {
        try {
            const decoded = decodeURIComponent(atob(authToken));
            const parts = decoded.split('_');
            myNick = parts[0]; 
            const loginTime = parseInt(parts[1]);
            if (!isNaN(loginTime)) {
                sessionTimeString = new Date(loginTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " " + new Date(loginTime).toLocaleDateString();
            }
            if (Date.now() - loginTime < 86400000 && myNick) authorized = true;
        } catch (e) { console.error(e); }
    }

    if (!authorized) {
        alert('Доступ заблоковано!');
        window.location.href = '/'; 
    } else {
        document.getElementById('main-body').style.display = 'flex';
    }

    const socket = io();
    let currentRoom = null;
    let currentActiveChatPartner = null;
    let onlineUsers = [];
    
    let savedMessages = {};
    try {
        const rawHistory = localStorage.getItem('burmalda_msg_history');
        if (rawHistory) savedMessages = JSON.parse(rawHistory);
    } catch (e) { savedMessages = {}; }

    let localProfiles = JSON.parse(localStorage.getItem('burmalda_profiles_data')) || {};
    let activeChats = JSON.parse(localStorage.getItem('burmalda_chat_list')) || [];

    const searchToggleBtn = document.getElementById('search-toggle-btn');
    const searchFrame = document.getElementById('search-frame');
    const searchInput = document.getElementById('search-input');
    const chatsList = document.getElementById('chats-list');
    const chatPlaceholder = document.getElementById('no-chat-placeholder');
    const chatArea = document.getElementById('chat-area');
    const chatTitleText = document.getElementById('chat-title-text');
    const typingStatusEl = document.getElementById('chat-typing-status');
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('button');
    const contextMenu = document.getElementById('global-context-menu');
    const settingsToggleBtn = document.getElementById('settings-toggle-btn');
    const settingsModal = document.getElementById('settings-modal');
    const settingsCloseBtn = document.getElementById('settings-close-btn');
    const actionPreview = document.getElementById('action-preview');
    const previewTextContent = document.getElementById('preview-text-content');

    settingsToggleBtn.onclick = () => { openMyProfile(); };
    settingsCloseBtn.onclick = () => { settingsModal.classList.remove('active'); };

    document.getElementById('btn-back').onclick = () => { window.history.back(); };

    window.onpopstate = function(event) {
        if (document.body.classList.contains('chat-opened')) {
            document.body.classList.remove('chat-opened');
            currentActiveChatPartner = null; currentRoom = null;
            chatArea.style.display = 'none'; chatPlaceholder.style.display = 'block';
            window.history.replaceState({}, "", window.location.pathname + '?auth=' + urlParams.get('auth'));
            renderChatsList();
            cancelInputAction();
        }
    };

    function getVisibleName(username) {
        if (username === myNick + '_notes') return translations[currentLang].notesTitle;
        const uData = localProfiles[username];
        if (uData && uData.displayName && uData.displayName.trim() !== '') return uData.displayName.trim();
        return username;
    }

    function getAvatarHTML(username, cssClass = 'avatar') {
        if (username === myNick + '_notes') {
            return `<div class="${cssClass === 'avatar'?'avatar-placeholder':'modal-avatar-placeholder'}" style="background:#000; color:#fff; border:1px solid #333;">🔖</div>`;
        }
        const uData = localProfiles[username];
        if (uData && uData.avatar) return `<img src="${uData.avatar}" class="${cssClass}" alt="">`;
        const visibleName = getVisibleName(username);
        const firstLetter = visibleName ? visibleName.charAt(0) : '?';
        const placeholderClass = cssClass === 'avatar' ? 'avatar-placeholder' : 'modal-avatar-placeholder';
        return `<div class="${placeholderClass}">${firstLetter}</div>`;
    }

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById('lang-select').value = currentLang;
        document.getElementById('my-profile-name').innerHTML = `${getAvatarHTML(myNick)} <span>${getVisibleName(myNick)}</span>`;
        searchInput.placeholder = t.searchPlaceholder;
        document.getElementById('lbl-dialogs').textContent = t.dialogsTitle;
        document.getElementById('placeholder-text').innerHTML = t.placeholderText;
        document.getElementById('btn-back').textContent = t.backBtn;
        input.placeholder = t.inputPlaceholder;
        button.textContent = t.btnSend;

        document.getElementById('lbl-profile-name').textContent = t.profileName;
        document.getElementById('lbl-profile').textContent = t.profile;
        document.getElementById('lbl-status').textContent = t.status;
        document.getElementById('lbl-bio-title').textContent = t.bioPlaceholder;
        document.getElementById('lbl-time').textContent = t.loginTime;
        document.getElementById('btn-logout').textContent = t.logoutBtn;
        document.getElementById('lbl-upload-btn').textContent = t.uploadBtn;

        renderChatsList(); 
        loadMessagesHistory();
    }

    function openMyProfile() {
        const t = translations[currentLang];
        document.getElementById('info-nick').textContent = myNick; 
        const myData = localProfiles[myNick] || { avatar: '', bio: '', displayName: '' };
        document.getElementById('profile-display-name').disabled = false;
        document.getElementById('profile-display-name').value = myData.displayName || myNick;
        document.getElementById('profile-desc').disabled = false;
        document.getElementById('profile-desc').value = myData.bio || '';
        document.getElementById('profile-desc').placeholder = t.bioEmpty;
        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar');
        document.getElementById('info-login-time').textContent = sessionTimeString;
        
        document.getElementById('lbl-upload-btn').style.display = 'block';
        document.getElementById('btn-logout').style.display = 'block';
        document.getElementById('lang-select-block').style.display = 'block';
        document.getElementById('login-time-block').style.display = 'block';

        applyLanguage();
        settingsModal.classList.add('active');
    }

    function openPartnerProfile() {
        if (!currentActiveChatPartner || currentActiveChatPartner.endsWith('_notes')) return;
        const t = translations[currentLang];
        document.getElementById('info-nick').textContent = currentActiveChatPartner; 

        const partnerData = localProfiles[currentActiveChatPartner] || { avatar: '', bio: '', displayName: '' };
        document.getElementById('profile-display-name').disabled = true;
        document.getElementById('profile-display-name').value = partnerData.displayName || currentActiveChatPartner;
        document.getElementById('profile-desc').disabled = true; 
        document.getElementById('profile-desc').value = partnerData.bio || '';
        document.getElementById('profile-desc').placeholder = t.bioEmpty;
        document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(currentActiveChatPartner, 'modal-avatar');

        document.getElementById('lbl-upload-btn').style.display = 'none';
        document.getElementById('btn-logout').style.display = 'none';
        document.getElementById('lang-select-block').style.display = 'none';
        document.getElementById('login-time-block').style.display = 'none'; 

        applyLanguage();
        settingsModal.classList.add('active');
    }

    function changeLanguage(lang) {
        currentLang = lang; localStorage.setItem('burmalda_lang', lang); applyLanguage();
    }

    function saveMyDisplayName(newName) {
        if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
        localProfiles[myNick].displayName = newName;
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
        socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
    }

    function saveMyBio(text) {
        if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
        localProfiles[myNick].bio = text;
        localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
        socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
    }

    function handleAvatarUpload(inputEl) {
        const file = inputEl.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            if (!localProfiles[myNick]) localProfiles[myNick] = { avatar: '', bio: '', displayName: '' };
            localProfiles[myNick].avatar = e.target.result;
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            document.getElementById('modal-avatar-view').innerHTML = getAvatarHTML(myNick, 'modal-avatar');
            applyLanguage();
            socket.emit('update profile', { user: myNick, data: localProfiles[myNick] });
        };
        reader.readAsDataURL(file);
    }

    // Робота з медіафайлами (З прихованим натисканням)
    function handleMediaUpload(el) {
        const file = el.files[0]; if (!file || !currentRoom) return;
        const reader = new FileReader();
        
        let type = 'doc';
        if (file.type.startsWith('image/')) type = 'img';
        else if (file.type.startsWith('video/')) type = 'video';

        reader.onload = function(e) {
            sendMediaMessage(e.target.result, type, file.name);
        };
        reader.readAsDataURL(file);
        el.value = '';
    }

    // Аудіозапис
    async function toggleVoiceRecord() {
        const btn = document.getElementById('voice-record-btn');
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.onload = (e) => { sendMediaMessage(e.target.result, 'audio', 'VoiceMessage.mp3'); };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
                btn.textContent = '🛑';
            } catch (err) { alert('Не вдалося отримати доступ до мікрофона'); }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btn.classList.remove('recording');
            btn.textContent = '🎤';
        }
    }

    function sendMediaMessage(base64Data, type, filename) {
        const generatedId = 'msg-' + Date.now() + Math.floor(Math.random() * 1000);
        const msgPacket = {
            room: currentRoom, text: `[MEDIA:${type}]`, user: myNick, msgId: generatedId,
            isRead: false, time: Date.now(), reactions: {}, replyToId: replyMessageId,
            mediaData: base64Data, mediaType: type, mediaName: filename
        };
        if (!savedMessages[currentRoom]) savedMessages[currentRoom] = [];
        savedMessages[currentRoom].push(msgPacket);
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        displaySingleMessage(msgPacket);
        if (!currentActiveChatPartner.endsWith('_notes')) socket.emit('private chat message', msgPacket);
        cancelInputAction();
    }

    socket.emit('store user', myNick);
    socket.emit('request profiles');

    socket.on('broadcast profile update', (packet) => {
        if (packet && packet.user && packet.data) {
            localProfiles[packet.user] = packet.data;
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            renderChatsList();
        }
    });

    socket.on('all profiles data', (serverProfiles) => {
        if (serverProfiles) {
            localProfiles = { ...localProfiles, ...serverProfiles };
            localStorage.setItem('burmalda_profiles_data', JSON.stringify(localProfiles));
            applyLanguage();
        }
    });

    socket.on('online users', (users) => { onlineUsers = Array.isArray(users) ? users : []; renderChatsList(); });
    
    input.oninput = () => {
        if (currentRoom && !currentActiveChatPartner.endsWith('_notes')) {
            socket.emit('private chat message', { room: currentRoom, text: '[TYPING_SIGNAL]', user: myNick });
        }
    };

    let remoteTypingTimer = null;

    socket.on('chat message', (data) => {
        if (!data || !data.room) return;
        const roomKey = String(data.room);

        if (data.text === '[TYPING_SIGNAL]') {
            if (roomKey === currentRoom && data.user !== myNick) {
                typingStatusEl.textContent = translations[currentLang].typingText;
                typingStatusEl.style.display = 'block';
                clearTimeout(remoteTypingTimer);
                remoteTypingTimer = setTimeout(() => { typingStatusEl.style.display = 'none'; }, 800);
            }
            return;
        }

        if (data.text === '[READ_SIGNAL]') {
            if (roomKey === currentRoom && data.user !== myNick) {
                messagesContainer.querySelectorAll('.msg-status').forEach(span => { span.textContent = '✓✓'; span.classList.add('read'); });
                if (savedMessages[roomKey]) {
                    savedMessages[roomKey].forEach(m => { if(m.user === myNick) m.isRead = true; });
                    localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
                }
            }
            return;
        }

        // Локальне реальне видалення для обох сторін чату у реальному часі
        if (data.text === '[LOCAL_DELETE_SIGNAL]' && data.targetMsgId) {
            if (savedMessages[roomKey]) {
                savedMessages[roomKey] = savedMessages[roomKey].filter(m => m.msgId !== data.targetMsgId);
                localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
            }
            if (roomKey === currentRoom) {
                const element = document.getElementById('wrapper-' + data.targetMsgId);
                if (element) element.remove();
            }
            return;
        }

        if (data.text === '[EDIT_SIGNAL]' && data.targetMsgId) {
            if (savedMessages[roomKey]) {
                const localMsg = savedMessages[roomKey].find(m => m.msgId === data.targetMsgId);
                if (localMsg) localMsg.text = data.newText;
                localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
            }
            if (roomKey === currentRoom) {
                const targetLi = document.getElementById(data.targetMsgId);
                if (targetLi) {
                    const txt = targetLi.querySelector('.msg-body-text');
                    if (txt) txt.textContent = data.newText;
                }
            }
            return;
        }

        if (data.user === myNick) return;
        if (!savedMessages[roomKey]) savedMessages[roomKey] = [];
        if (!savedMessages[roomKey].some(m => m.msgId === data.msgId)) {
            savedMessages[roomKey].push(data);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }

        if (roomKey === currentRoom) {
            setTimeout(() => { socket.emit('private chat message', { room: currentRoom, text: '[READ_SIGNAL]', user: myNick }); }, 200);
            displaySingleMessage(data);
        }
    });

    searchToggleBtn.onclick = function() { searchFrame.classList.toggle('active'); searchInput.focus(); };

    searchInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
            const targetNick = searchInput.value.trim();
            if (!targetNick) return;
            if (targetNick === myNick) { alert(translations[currentLang].selfChatError); return; }
            if (!activeChats.includes(targetNick)) { activeChats.push(targetNick); localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats)); }
            searchInput.value = ''; searchFrame.classList.remove('active'); openChatWith(targetNick);
        }
    };

    function renderChatsList() {
        chatsList.innerHTML = '';
        
        // Рендер Нотаток (Завжди зверху)
        const notesItem = document.createElement('div');
        notesItem.className = 'chat-item' + (currentActiveChatPartner === myNick + '_notes' ? ' active' : '');
        notesItem.innerHTML = `<div class="chat-info-block">${getAvatarHTML(myNick + '_notes')}<span>${translations[currentLang].notesTitle}</span></div>`;
        notesItem.onclick = () => openChatWith(myNick + '_notes');
        chatsList.appendChild(notesItem);

        activeChats.forEach(user => {
            if (!user) return;
            const item = document.createElement('div'); item.className = 'chat-item';
            if (currentActiveChatPartner === user) item.classList.add('active');
            const isOnline = onlineUsers.includes(user);
            item.innerHTML = `
                <div class="chat-info-block">${getAvatarHTML(user)}<span>${getVisibleName(user)}</span></div>
                <span class="status-dot ${isOnline?'online':''}">${isOnline ? translations[currentLang].chatStatusOnline : translations[currentLang].chatStatusOffline}</span>
            `;
            item.onclick = () => openChatWith(user);
            item.oncontextmenu = (e) => { e.preventDefault(); showChatContextMenu(e.clientX, e.clientY, user); };
            chatsList.appendChild(item);
        });
    }

    function openChatWith(user) {
        cancelInputAction();
        currentActiveChatPartner = user;
        currentRoom = user.endsWith('_notes') ? user : [myNick, user].sort().join('_');
        chatPlaceholder.style.display = 'none'; chatArea.style.display = 'flex';
        chatTitleText.innerHTML = `${getAvatarHTML(user)} <span>${getVisibleName(user)}</span>`;
        
        if (!document.body.classList.contains('chat-opened')) {
            window.history.pushState({ chatOpened: true, partner: user }, "", window.location.pathname + window.location.search + '&chat=' + encodeURIComponent(user));
        }
        document.body.classList.add('chat-opened');
        if (!user.endsWith('_notes')) socket.emit('join room', user);
        loadMessagesHistory(); renderChatsList();
        if (!user.endsWith('_notes')) socket.emit('private chat message', { room: currentRoom, text: '[READ_SIGNAL]', user: myNick });
        setTimeout(() => { input.focus(); }, 100);
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text || !currentRoom) return;

        if (editMessageId) {
            if (savedMessages[currentRoom]) {
                const target = savedMessages[currentRoom].find(m => m.msgId === editMessageId);
                if (target) target.text = text;
                localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
            }
            const targetLi = document.getElementById(editMessageId);
            if (targetLi) { const tx = targetLi.querySelector('.msg-body-text'); if(tx) tx.textContent = text; }
            if (!currentActiveChatPartner.endsWith('_notes')) socket.emit('private chat message', { room: currentRoom, text: '[EDIT_SIGNAL]', targetMsgId: editMessageId, newText: text, user: myNick });
            cancelInputAction(); return;
        }

        const generatedId = 'msg-' + Date.now() + Math.floor(Math.random() * 1000);
        const msgPacket = { room: currentRoom, text: text, user: myNick, msgId: generatedId, isRead: false, time: Date.now(), reactions: {}, replyToId: replyMessageId };

        if (!savedMessages[currentRoom]) savedMessages[currentRoom] = [];
        savedMessages[currentRoom].push(msgPacket);
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        displaySingleMessage(msgPacket);
        if (!currentActiveChatPartner.endsWith('_notes')) socket.emit('private chat message', msgPacket);
        cancelInputAction();
    }

    button.onclick = sendMessage; input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    function loadMessagesHistory() {
        messagesContainer.innerHTML = '';
        if (currentRoom && savedMessages[currentRoom]) {
            savedMessages[currentRoom].forEach(displaySingleMessage);
        }
    }

    function loadMediaAsset(container, base64Data, type, name) {
        container.innerHTML = ''; 
        if (type === 'img') {
            container.innerHTML = `<img src="${base64Data}" class="media-content-loaded">`;
        } else if (type === 'video') {
            container.innerHTML = `<video src="${base64Data}" controls class="media-content-loaded"></video>`;
        } else if (type === 'doc') {
            container.innerHTML = `<a href="${base64Data}" download="${name}" class="doc-file-loaded">📄 ${name} (Скачати)</a>`;
        } else if (type === 'audio') {
            container.innerHTML = `<audio src="${base64Data}" controls style="max-width:100%; margin:5px;"></audio>`;
        }
    }

    function displaySingleMessage(data) {
        if (!data) return;
        let wrapper = document.getElementById('wrapper-' + data.msgId);
        if (wrapper) {
            if (data.isRead && data.user === myNick) {
                const span = wrapper.querySelector('.msg-status'); if(span) { span.textContent = '✓✓'; span.classList.add('read'); }
            }
            return;
        }
        
        wrapper = document.createElement('div');
        wrapper.id = 'wrapper-' + data.msgId;
        wrapper.className = 'msg-container' + (data.user === myNick ? ' my-wrapper' : '');

        const picker = document.createElement('div'); picker.className = 'reaction-picker';
        ['👍', '🔥', '❤️', '😂', '😮'].forEach(emoji => {
            const span = document.createElement('span'); span.textContent = emoji;
            span.onclick = (e) => {
                e.stopPropagation(); picker.style.display = 'none';
                socket.emit('message_reaction', { room: currentRoom, msgId: data.msgId, reaction: emoji, username: myNick });
            };
            picker.appendChild(span);
        });

        const item = document.createElement('li'); item.id = data.msgId;
        if (data.user === myNick) item.classList.add('my-msg');

        if (data.replyToId && savedMessages[currentRoom]) {
            const replyTarget = savedMessages[currentRoom].find(m => m.msgId === data.replyToId);
            if (replyTarget) {
                const rb = document.createElement('div'); rb.className = 'reply-box';
                rb.textContent = `${getVisibleName(replyTarget.user)}: ${replyTarget.text.startsWith('[MEDIA') ? '📎 Файл' : replyTarget.text}`;
                item.appendChild(rb);
            }
        }

        // Обробка тексту чи медіафайлів
        if (data.text.startsWith('[MEDIA:')) {
            const mContainer = document.createElement('div');
            mContainer.className = 'media-preview-container';
            mContainer.innerHTML = `<div class="media-blur-box">👁 Дивитись файл<br><span style="font-size:10px; opacity:0.5;">${data.mediaName || 'Медіа'}</span></div>`;
            mContainer.onclick = (e) => {
                e.stopPropagation();
                loadMediaAsset(mContainer, data.mediaData, data.mediaType, data.mediaName);
            };
            item.appendChild(mContainer);
        } else {
            const bodySpan = document.createElement('span');
            bodySpan.className = 'msg-body-text';
            bodySpan.textContent = data.text;
            item.appendChild(bodySpan);
        }

        const timeSpan = document.createElement('span');
        timeSpan.style.cssText = "font-size: 9px; opacity: 0.4; float: right; margin-top: 8px; margin-left: 10px;";
        timeSpan.textContent = new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        item.appendChild(timeSpan);

        if (data.user === myNick) {
            const statusSpan = document.createElement('span'); statusSpan.className = 'msg-status';
            statusSpan.textContent = data.isRead ? '✓✓' : '✓';
            if (data.isRead) statusSpan.classList.add('read');
            item.appendChild(statusSpan);
        }

        item.onclick = (e) => {
            e.stopPropagation();
            const disp = picker.style.display;
            document.querySelectorAll('.reaction-picker').forEach(p => p.style.display = 'none');
            contextMenu.style.display = 'none';
            picker.style.display = disp === 'flex' ? 'none' : 'flex';
        };

        item.oncontextmenu = (e) => {
            e.preventDefault(); e.stopPropagation(); showMessageContextMenu(e.clientX, e.clientY, data);
        };

        wrapper.appendChild(picker); wrapper.appendChild(item);
        messagesContainer.appendChild(wrapper);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showMessageContextMenu(x, y, msgData) {
        const t = translations[currentLang];
        let html = `<button onclick="initReply('${msgData.msgId}')">${t.ctxReply}</button>`;
        if (msgData.user === myNick) {
            if (!msgData.text.startsWith('[MEDIA:')) html += `<button onclick="initEdit('${msgData.msgId}')">${t.ctxEdit}</button>`;
            html += `<button onclick="executeDeleteMessage('${msgData.msgId}')" class="delete-btn">${t.ctxDeleteMsg}</button>`;
        }
        contextMenu.innerHTML = html; contextMenu.style.display = 'block';

        if (x + contextMenu.offsetWidth > window.innerWidth) x = window.innerWidth - contextMenu.offsetWidth - 10;
        if (y + contextMenu.offsetHeight > window.innerHeight) y = window.innerHeight - contextMenu.offsetHeight - 10;
        contextMenu.style.left = `${x}px`; contextMenu.style.top = `${y}px`;
    }

    window.initReply = function(msgId) {
        const msg = savedMessages[currentRoom].find(m => m.msgId === msgId); if (!msg) return;
        cancelInputAction(); replyMessageId = msgId;
        previewTextContent.textContent = `${translations[currentLang].replyingTo} "${msg.text.startsWith('[MEDIA') ? 'Файл' : msg.text}"`;
        actionPreview.style.display = 'flex'; input.focus();
    };

    window.initEdit = function(msgId) {
        const msg = savedMessages[currentRoom].find(m => m.msgId === msgId); if (!msg) return;
        cancelInputAction(); editMessageId = msgId; input.value = msg.text;
        previewTextContent.textContent = `${translations[currentLang].editingMsg} "${msg.text}"`;
        actionPreview.style.display = 'flex'; input.focus();
    };

    // РЕАЛЬНЕ ЛОКАЛЬНЕ ВИДАЛЕННЯ У ОБОХ КОРИСТУВАЧІВ
    window.executeDeleteMessage = function(msgId) {
        if (savedMessages[currentRoom]) {
            savedMessages[currentRoom] = savedMessages[currentRoom].filter(m => m.msgId !== msgId);
            localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        }
        const wr = document.getElementById('wrapper-' + msgId); if (wr) wr.remove();
        if (!currentActiveChatPartner.endsWith('_notes')) {
            socket.emit('private chat message', { room: currentRoom, text: '[LOCAL_DELETE_SIGNAL]', targetMsgId: msgId, user: myNick });
        }
        cancelInputAction();
    };

    window.cancelInputAction = function() {
        replyMessageId = null; editMessageId = null; input.value = '';
        actionPreview.style.display = 'none'; previewTextContent.textContent = '';
    };

    document.addEventListener('click', () => {
        document.querySelectorAll('.reaction-picker').forEach(p => p.style.display = 'none');
        contextMenu.style.display = 'none';
    });

    function showChatContextMenu(x, y, partnerNick) {
        contextMenu.style.left = `${x}px`; contextMenu.style.top = `${y}px`;
        contextMenu.innerHTML = `<button onclick="window.executeDeleteChat('${partnerNick}')" class="delete-btn">${translations[currentLang].ctxDeleteChat}</button>`;
        contextMenu.style.display = 'block';
    }

    window.executeDeleteChat = function(partnerNick) {
        const r = [myNick, partnerNick].sort().join('_');
        if (savedMessages[r]) delete savedMessages[r];
        localStorage.setItem('burmalda_msg_history', JSON.stringify(savedMessages));
        activeChats = activeChats.filter(c => c !== partnerNick);
        localStorage.setItem('burmalda_chat_list', JSON.stringify(activeChats));
        if (r === currentRoom) { currentActiveChatPartner = null; currentRoom = null; chatArea.style.display = 'none'; chatPlaceholder.style.display = 'block'; }
        renderChatsList();
    };

    function logout() { localStorage.clear(); window.location.href = '/'; }
    applyLanguage();
</script>
</body>
</html>
