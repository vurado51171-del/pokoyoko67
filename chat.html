<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burmalda Messenger</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { height: 100%; margin: 0; padding: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        
        #app-container { display: flex; width: 100%; height: 100%; }

        /* Сайдбар */
        #sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 15px; background: #262626; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .my-profile { font-weight: bold; color: #007bff; }
        .header-controls { display: flex; gap: 10px; }
        .btn-icon { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }

        /* Поиск */
        .search-container { padding: 10px; background: #2d2d2d; display: none; }
        .search-container.active { display: block; }
        #search-input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 5px; outline: none; }

        /* Чат */
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #141414; }
        #messages { flex-grow: 1; padding: 15px; overflow-y: auto; list-style: none; margin: 0; }
        #messages li { padding: 10px; background: #262626; margin-bottom: 8px; border-radius: 8px; max-width: 80%; width: fit-content; }
        #messages li.my-msg { background: #007bff; align-self: flex-end; margin-left: auto; }

        /* Форма ввода (нижняя панель) */
        #form { padding: 10px; background: #1e1e1e; border-top: 1px solid #333; display: flex; gap: 10px; }
        #input { flex-grow: 1; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; outline: none !important; box-shadow: none !important; font-size: 16px; }
        #button { padding: 10px 20px; background: #28a745; border: none; color: white; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Мобильный адаптив */
        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-main { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
            body.chat-opened #sidebar { display: none; }
            body.chat-opened #chat-main { display: flex; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="my-profile" id="my-profile-name">Я: ...</div>
            <div class="header-controls">
                <button class="btn-icon" id="search-toggle-btn">🔍</button>
                <button class="btn-icon" id="settings-toggle-btn">⚙️</button>
            </div>
        </div>
        <div class="search-container" id="search-frame">
            <input type="text" id="search-input" placeholder="Введите имя...">
        </div>
        <div id="chats-list" style="flex-grow:1; overflow-y:auto;"></div>
    </div>

    <div id="chat-main">
        <div id="chat-header" style="padding:15px; border-bottom:1px solid #333; display:flex; align-items:center;">
            <button class="btn-icon" onclick="document.body.classList.remove('chat-opened')">⬅</button>
            <span id="chat-title-text" style="margin-left:10px;">Чат</span>
        </div>
        <ul id="messages"></ul>
        <div id="form">
            <input id="input" autocomplete="off" placeholder="Сообщение..." />
            <button id="button">OK</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ФИКС КЛАВИАТУРЫ ANDROID
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = `${window.visualViewport.height}px`;
        });
    }

    // Твоя логика (сокеты, кнопки)
    const socket = io();
    const input = document.getElementById('input');
    const button = document.getElementById('button');
    const messages = document.getElementById('messages');

    function sendMessage() {
        const text = input.value.trim();
        if(text) {
            socket.emit('private chat message', { text: text });
            input.value = '';
        }
    }

    button.onclick = sendMessage;
    input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    // Остальной JS оставь как есть, он будет работать внутри этого контейнера
</script>
</body>
</html>
