<!DOCTYPE html>
<html lang="uk">
<head>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BurmaldaGram Premium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="main-body" class="theme-dark" style="display: none;">

<div id="sidebar">
    <div class="sidebar-header">
        <div class="my-profile" id="my-profile-name" onclick="openMyProfile()">...</div>
        <div class="header-controls">
            <button class="search-trigger-btn" id="search-toggle-btn">🔍</button>
            <button class="settings-btn" id="settings-toggle-btn">⚙️</button>
        </div>
    </div>
    
    <div class="search-container" id="search-frame">
        <div style="position: relative;">
            <input type="text" id="search-input" autocomplete="off" placeholder="Введіть ім'я або повідомлення...">
            <div id="search-results-dropdown" class="search-results-dropdown"></div>
        </div>
    </div>

    <div class="section-title" id="lbl-dialogs">Диалоги</div>
    <div id="chats-list"></div>
</div>

<div id="chat-main">
    <div id="no-chat-placeholder" class="no-chat-selected">
        <p id="placeholder-text">BurmaldaGram Premium<br><span style="font-size: 13px; color: var(--text-muted);">Оберіть чат або скористайтеся пошуком друзів 🔍</span></p>
    </div>
    
    <div id="chat-area" style="display: none; flex-direction: column; height: 100%; position: relative;">
        <div id="chat-header">
            <div class="header-meta">
                <button class="back-btn" id="btn-back">⬅ Назад</button>
                <span id="chat-title-text" onclick="openPartnerProfile()">Чат</span>
            </div>
            <div class="header-actions">
                <div id="chat-typing-status" class="typing-indicator"></div>
                <button class="call-btn" id="btn-call-video" onclick="startCall(true)" title="Відеодзвінок">🎥</button>
                <button class="call-btn" id="btn-call-audio" onclick="startCall(false)" title="Аудіодзвінок">📞</button>
                <button class="search-trigger-btn" onclick="toggleChatMenu(event)" style="margin-left: 5px;" title="Опції чату">⋮</button>
                <div id="chat-options-menu">
                    <button id="btn-mute-user" onclick="toggleChatPref(currentActiveChatPartner, 'muted')">🔕 Вимкнути звук</button>
                    <button id="btn-block-user" onclick="toggleChatPref(currentActiveChatPartner, 'blocked')" class="danger">🚫 Заблокувати</button>
                    <button id="btn-clear-hist" onclick="clearChatHistory()" class="danger">🗑 Очистити історію</button>
                </div>
            </div>
        </div>

        <div id="pinned-message-bar" onclick="cyclePinnedMessages()">
            <div class="pinned-bar-content">
                <span class="pinned-bar-title" id="lbl-pinned-title">
                    Закріплене повідомлення <span class="pin-counter" id="pin-counter-badge">1/1</span>
                </span>
                <span class="pinned-bar-text" id="pinned-bar-text-content">...</span>
            </div>
            <button class="unpin-btn-x" onclick="requestUnpin(event)">×</button>
        </div>
      
        <ul id="messages"></ul>
        <button id="scroll-to-bottom-btn" class="scroll-to-bottom" onclick="document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight">⬇</button>

        <div id="input-panel-container">
            <div id="reply-preview-bar">
                <div id="reply-preview-text">Відповідь на повідомлення</div>
                <button id="reply-close-btn" onclick="cancelAction()">×</button>
            </div>
            
            <form id="form">
                <label class="media-btn-label" title="Надіслати фотографію">
                    📎
                    <input type="file" id="media-file-input" accept="image/*" style="display: none;" onchange="uploadMediaFile(this)">
                </label>
                
                <button type="button" class="tool-btn" id="btn-sticker" title="Стікери" onclick="toggleStickerMenu()">🦄</button>
                <button type="button" class="tool-btn" id="btn-audio-rec" title="Записати аудіо" onclick="startMediaRecording('audio')">🎤</button>
                <button type="button" class="tool-btn" id="btn-video-rec" title="Записати кружечок" onclick="startMediaRecording('video_circle')">🔵</button>
                
                <input id="input" autocomplete="off" placeholder="Напишіть повідомлення..." />
                <button id="button" type="submit">Надіслати</button>
            </form>
            
            <div id="record-overlay" class="record-overlay" style="display: none;">
                <div class="record-controls-top">
                    <button class="tool-btn" onclick="deleteRecord()" style="color: var(--danger); font-size: 20px;">🗑</button>
                    <span id="record-timer" style="font-size:18px; font-weight:600; font-variant-numeric: tabular-nums; color: white;">00:00</span>
                    <button class="tool-btn" id="btn-pause-record" onclick="pauseResumeRecord()">⏸</button>
                    <button class="tool-btn" onclick="finishAndSendRecord()" style="background: var(--accent); color: white;">✈</button>
                </div>
                <video id="record-preview" autoplay muted playsinline></video>
            </div>

            <div id="sticker-menu" class="popup-menu"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <div class="modal-title">
            <span id="modal-title-text">⚙️ Налаштування</span>
            <button class="modal-close" id="settings-close-btn">&times;</button>
        </div>
      
        <div class="profile-avatar-container">
            <div id="modal-avatar-view"></div>
            <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" onchange="handleAvatarUpload(this)">
            <button class="upload-btn" id="lbl-upload-btn" onclick="document.getElementById('avatar-file-input').click()">📁 Завантажити фото</button>
        </div>
        <div id="account-info">
            <div class="account-property"><label id="lbl-profile-name">Ім'я в чаті (Нік):</label><input type="text" id="profile-display-name" class="profile-name-input" oninput="saveMyDisplayName(this.value)"></div>
            <div class="account-property"><span id="lbl-profile">Юзернейм (ID):</span> <strong id="info-nick" style="color: var(--text-muted);">...</strong></div>
            <div class="account-property"><span id="lbl-status">Статус:</span> <strong id="lbl-online-status">В мережі</strong></div>
            <div class="account-property"><label id="lbl-bio-title">Про себе / Опис:</label><textarea id="profile-desc" class="profile-desc-input" oninput="saveMyBio(this.value)"></textarea></div>
            <div class="account-property" id="login-time-block"><label id="lbl-time">Час входу:</label> <span id="info-login-time" style="font-weight: bold; color: var(--accent);"></span></div>
        </div>
        
        <div class="sticker-pack-creator" id="sticker-creator-block">
            <label style="display:block; font-size:12px; color:var(--text-muted); font-weight:600;">Ваші стікери (додати):</label>
            <input type="file" id="sticker-upload-input" accept="image/*" multiple style="display: none;" onchange="uploadCustomStickers(this)">
            <button class="upload-btn" style="margin-top: 5px; width: 100%;" onclick="document.getElementById('sticker-upload-input').click()">+ Додати зображення як стікер</button>
            <div class="pack-list" id="my-stickers-preview"></div>
        </div>

        <div class="lang-select-container" id="theme-select-block" style="margin-top: 15px;">
            <label id="lbl-theme-title" style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px;">Тема оформлення / Тема:</label>
            <select id="theme-select" class="lang-select" onchange="changeTheme(this.value)">
                <option value="theme-dark">Стандартна (Темна)</option>
                <option value="theme-black">AMOLED (Чорна)</option>
                <option value="theme-vintage">Вінтажна (Old iOS)</option>
            </select>
        </div>

        <div class="lang-select-container" id="lang-select-block" style="margin-top: 15px;">
            <label id="lbl-lang-title" style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px;">Мова додатка / Язык:</label>
            <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)"><option value="uk">Українська</option><option value="ru">Русский</option><option value="en">English</option></select>
        </div>
        <button class="settings-logout-btn" id="btn-logout" onclick="logout()">Вийти з профілю 🚪</button>
    </div>
</div>

<div class="modal-overlay" id="call-modal">
    <div class="modal-content" style="text-align: center; max-width: 400px;">
        <div class="modal-avatar-placeholder" id="call-avatar" style="margin: 0 auto 15px auto; width: 80px; height: 80px; font-size: 30px; background: var(--accent);">?</div>
        <h3 id="call-status-text" style="color: var(--text-main); margin-bottom: 20px;">Вхідний дзвінок...</h3>
        
        <div class="video-chat-container" id="call-video-container" style="display: none;">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>

        <div id="call-controls-wrapper" style="display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
            <button id="btn-accept-call" style="background: #4cd964; padding: 12px 24px; color: white; border:none; border-radius: 30px; font-weight:bold; cursor:pointer; display:none;">📞 Прийняти</button>
            <button id="toggle-mic-btn" onclick="toggleCallMic()" class="call-btn-control" style="display: none;">🎤 Мікр: Увімк</button>
            <button id="toggle-cam-btn" onclick="toggleCallCam()" class="call-btn-control" style="display: none;">📷 Камера: Увімк</button>
            <button id="btn-end-call" onclick="endCall()" style="background: var(--danger); padding: 12px 24px; color: white; border:none; border-radius: 30px; font-weight:bold; cursor:pointer;">Відхилити / Завершити</button>
        </div>
    </div>
</div>

<div class="context-menu" id="global-context-menu"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
