<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burmalda Messenger - Чат</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            font-family: sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ (ХЕДЕР) --- */
        .header {
            background: #1e1e1e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d2d;
            z-index: 10;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        /* Наша классическая круглая ава */
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #007bff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            object-fit: cover;
        }

        .user-info h3 { margin: 0; font-size: 16px; color: white; }
        .user-info span { font-size: 12px; color: #007bff; }

        /* Кнопка выхода в стиле ошибки/удаления */
        .logout-btn {
            background: #dc3545;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #bd2130; }

        /* --- ОБЛАСТЬ ДЛЯ ТЕКСТА СООБЩЕНИЙ --- */
        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #121212;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            border: 1px solid #2d2d2d;
        }

        /* Входящие от других людей */
        .msg.incoming {
            background: #1e1e1e;
            align-self: flex-start;
        }

        /* Твои исходящие сообщения */
        .msg.outgoing {
            background: #2d2d2d;
            align-self: flex-end;
            border-color: #444;
        }

        .msg-sender {
            color: #007bff;
            cursor: pointer;
            font-weight: bold;
        }
        .msg.outgoing .msg-sender {
            color: #28a745; /* Свой ник подсветим зеленым */
        }

        .msg-meta {
            font-size: 10px;
            margin-top: 5px;
            display: block;
            text-align: right;
            color: #888;
        }

        /* --- НИЖНЯЯ ПАНЕЛЬ ВВОДА --- */
        .input-panel {
            background: #1e1e1e;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #2d2d2d;
        }

        .input-panel input {
            flex: 1;
            background: #2d2d2d;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }
        .input-panel input:focus { border-color: #007bff; }

        .send-btn {
            background: #28a745;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover { background: #218838; }

        /* --- МОДАЛЬНОЕ ОКНО ПРОФИЛЯ --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .profile-card {
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            width: 90%;
            max-width: 300px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .profile-card .large-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #007bff;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            object-fit: cover;
        }

        .profile-card h2 { margin: 0 0 5px 0; font-size: 20px; color: #007bff; }
        .profile-card .prof-username { font-size: 14px; color: #888; margin-bottom: 5px; }
        .profile-card .prof-regdate { font-size: 12px; color: #6c757d; margin-bottom: 15px; }

        .profile-card .bio-box {
            background: #2d2d2d;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            color: #ddd;
            text-align: left;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        /* Кнопки внутри профиля в стиле нашей системы */
        .action-btn {
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            border: none;
            color: white;
            transition: background 0.2s;
        }
        .btn-upload { background: #28a745; }
        .btn-upload:hover { background: #218838; }
        .btn-close { background: #444; }
        .btn-close:hover { background: #555; }

        /* --- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ ВНИЗУ --- */
        .lang-container {
            display: flex;
            justify-content: center;
            background: #121212;
            padding: 10px 0;
            border-top: 1px solid #1e1e1e;
        }

        .lang-switch {
            display: flex;
            gap: 5px;
            background: #1e1e1e;
            padding: 4px;
            border-radius: 5px;
            border: 1px solid #2d2d2d;
        }
        
        .lang-btn {
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: #888;
            padding: 5px 12px;
            border-radius: 3px;
        }
        
        .lang-btn.active {
            background: #2d2d2d;
            color: #007bff;
            border: 1px solid #444;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #444;
            padding: 5px;
            background: #121212;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-user" onclick="openProfile(myNickname)">
            <img id="user-avatar-img" class="user-avatar" src="" alt="" style="display:none;">
            <div id="user-avatar-letter" class="user-avatar">U</div>
            
            <div class="user-info">
                <h3 id="user-display-name">Username</h3>
                <span id="t-status">онлайн</span>
            </div>
        </div>
        <button class="logout-btn" id="t-logout" onclick="logout()">Выйти</button>
    </div>

    <div class="modal-overlay" id="profile-modal" onclick="closeProfileViaOverlay(event)">
        <div class="profile-card">
            <img id="modal-avatar-img" class="large-avatar" src="" alt="" style="display:none;">
            <div id="modal-avatar-letter" class="large-avatar">U</div>

            <h2 id="modal-name">Username</h2>
            <div class="prof-username" id="modal-user-tag">@username</div>
            <div class="prof-regdate" id="modal-regdate">Регистрация: --.--.----</div>
            
            <input type="file" id="avatar-input" accept="image/*" style="display: none;" onchange="uploadAvatar(event)">
            <button class="action-btn btn-upload" id="t-upload-btn" onclick="document.getElementById('avatar-input').click()">
                📁 Загрузить из устройства
            </button>
            
            <div class="bio-box" id="modal-bio">Пользователь Burmalda Messenger.</div>

            <button class="action-btn btn-close" id="t-close-prof" onclick="closeProfile()" style="margin-bottom: 0;">Закрыть</button>
        </div>
    </div>

    <div class="chat-area" id="chat-box"></div>

    <div class="input-panel">
        <input type="text" id="msg-input" placeholder="Напишите сообщение..." autocomplete="off">
        <button class="send-btn" id="t-send" onclick="sendMessage()">Отправить</button>
    </div>

    <div class="lang-container">
        <div class="lang-switch">
            <div class="lang-btn" onclick="setLang('uk')" id="btn-uk">UK</div>
            <div class="lang-btn active" onclick="setLang('ru')" id="btn-ru">RU</div>
            <div class="lang-btn" onclick="setLang('en')" id="btn-en">EN</div>
        </div>
    </div>

    <div class="footer-text">остап пушка дєвки ловушка</div>

    <script>
        const i18n = {
            ru: {
                status: "онлайн",
                logout: "Выйти",
                placeholder: "Напишите сообщение...",
                send: "Отправить",
                closeProf: "Закрыть",
                uploadBtn: "📁 Загрузить из устройства",
                regDate: "Регистрация: ",
                defaultBio: "Пользователь Burmalda Messenger. Статус не установлен."
            },
            uk: {
                status: "онлайн",
                logout: "Вийти",
                placeholder: "Напішіть повідомлення...",
                send: "Надіслати",
                closeProf: "Закрити",
                uploadBtn: "📁 Завантажити з пристрою",
                regDate: "Реєстрація: ",
                defaultBio: "Користувач Burmalda Messenger. Статус не встановлено."
            },
            en: {
                status: "online",
                logout: "Logout",
                placeholder: "Type a message...",
                send: "Send",
                closeProf: "Close",
                uploadBtn: "📁 Upload from device",
                regDate: "Registered: ",
                defaultBio: "Burmalda Messenger user. Status is not set."
            }
        };

        let currentLang = 'ru';
        let myNickname = "User";

        function initChat() {
            // Проверка авторизации из твоего Login-файла (`chat_current_user`)
            if (localStorage.getItem('chat_logged_in') !== 'true') {
                window.location.href = '/';
                return;
            }

            myNickname = localStorage.getItem('chat_current_user') || "User";
            document.getElementById('user-display-name').innerText = myNickname;

            // Если даты регистрации для текущего юза нет — создаем сегодняшнюю
            if (!localStorage.getItem(`regdate_${myNickname}`)) {
                const today = new Date().toLocaleDateString();
                localStorage.setItem(`regdate_${myNickname}`, today);
            }

            renderAvatar();

            const savedLang = localStorage.getItem('burmalda_lang') || 'ru';
            setLang(savedLang);
        }

        // Логика отображения авы (Фотка устройства или первая буква юза)
        function renderAvatar() {
            const savedAvatar = localStorage.getItem(`avatar_${myNickname}`);
            const headerImg = document.getElementById('user-avatar-img');
            const headerLetter = document.getElementById('user-avatar-letter');

            if (savedAvatar) {
                headerImg.src = savedAvatar;
                headerImg.style.display = 'block';
                headerLetter.style.display = 'none';
            } else {
                headerLetter.innerText = myNickname.charAt(0).toUpperCase();
                headerImg.style.display = 'none';
                headerLetter.style.display = 'flex';
            }
        }

        // Загрузка файла картинки из хранилища девайса
        function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                localStorage.setItem(`avatar_${myNickname}`, base64Image);
                renderAvatar();
                openProfile(myNickname); // Сразу обновляем картинку в открытой карточке
            };
            reader.readAsDataURL(file);
        }

        // Открытие карточки любого профиля (твоего по хэдеру или чужого по клику в чате)
        function openProfile(username) {
            document.getElementById('modal-name').innerText = username;
            document.getElementById('modal-user-tag').innerText = '@' + username.toLowerCase();
            
            const regDate = localStorage.getItem(`regdate_${username}`) || new Date().toLocaleDateString();
            document.getElementById('modal-regdate').innerText = i18n[currentLang].regDate + regDate;

            const userBio = localStorage.getItem(`bio_${username}`) || i18n[currentLang].defaultBio;
            document.getElementById('modal-bio').innerText = userBio;

            const modalImg = document.getElementById('modal-avatar-img');
            const modalLetter = document.getElementById('modal-avatar-letter');
            const targetAvatar = localStorage.getItem(`avatar_${username}`);

            if (targetAvatar) {
                modalImg.src = targetAvatar;
                modalImg.style.display = 'block';
                modalLetter.style.display = 'none';
            } else {
                modalLetter.innerText = username.charAt(0).toUpperCase();
                modalImg.style.display = 'none';
                modalLetter.style.display = 'flex';
            }

            // Кнопку загрузки показываем только если это НАШ профиль
            const uploadBtn = document.getElementById('t-upload-btn');
            if (username === myNickname) {
                uploadBtn.style.display = 'block';
            } else {
                uploadBtn.style.display = 'none';
            }

            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        function closeProfileViaOverlay(e) {
            if (e.target.id === 'profile-modal') closeProfile();
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('burmalda_lang', lang);

            document.getElementById('btn-uk').classList.remove('active');
            document.getElementById('btn-ru').classList.remove('active');
            document.getElementById('btn-en').classList.remove('active');
            document.getElementById(`btn-${lang}`).classList.add('active');

            document.getElementById('t-status').innerText = i18n[lang].status;
            document.getElementById('t-logout').innerText = i18n[lang].logout;
            document.getElementById('msg-input').placeholder = i18n[lang].placeholder;
            document.getElementById('t-send').innerText = i18n[lang].send;
            document.getElementById('t-close-prof').innerText = i18n[lang].closeProf;
            document.getElementById('t-upload-btn').innerText = i18n[lang].uploadBtn;
            
            const openName = document.getElementById('modal-name').innerText;
            if(document.getElementById('profile-modal').style.display === 'flex') {
                const regDate = localStorage.getItem(`regdate_${openName}`) || new Date().toLocaleDateString();
                document.getElementById('modal-regdate').innerText = i18n[lang].regDate + regDate;
            }
        }

        function appendMessage(sender, text, type) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', type);
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Клик по msg-sender открывает профиль этого человека
            msgDiv.innerHTML = `
                <strong class="msg-sender" onclick="openProfile('${sender}')">${sender}</strong>: ${text}
                <span class="msg-meta">${time}</span>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(myNickname, text, 'outgoing');
            input.value = '';
        }

        document.getElementById('msg-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function logout() {
            localStorage.removeItem('chat_logged_in');
            localStorage.removeItem('chat_current_user');
            window.location.href = '/';
        }

        window.addEventListener('DOMContentLoaded', initChat);
    </script>
</body>
</html>
