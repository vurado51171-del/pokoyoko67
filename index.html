<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в Burmalda Messenger</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; display: flex; flex-direction: column; width: 260px; border: 1px solid #2d2d2d; }
        h2 { margin-bottom: 20px; color: #007bff; font-size: 22px; }
        input { padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; margin-bottom: 15px; font-size: 14px; outline: none; }
        input:focus { border-color: #007bff; }
        button { padding: 12px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #218838; }
        .error-msg { color: #dc3545; font-size: 13px; margin-bottom: 12px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Burmalda Login</h2>
        <input type="text" id="username" placeholder="Никнейм..." autocomplete="off">
        <input type="password" id="password" placeholder="Пароль...">
        <div id="error" class="error-msg"></div>
        <button onclick="enterChat()">Войти / Создать</button>
    </div>

    <script>
        function enterChat() {
            const nick = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error');

            errorDiv.style.display = 'none';

            // ИСПРАВЛЕНО: добавлено || вместо пропуска
            if (!nick || !pass) {
                errorDiv.innerText = "Введите ник и пароль!";
                errorDiv.style.display = 'block';
                return;
            }

            const url = 'https://script.google.com/macros/s/AKfycbw5-YIlQPbTq8fI46zqdBBBUq_b5KjAQ7PY0CPCRN0tG_PLkJx4hpwhe_6iiqdWx7Gj0g/exec';

            errorDiv.innerText = "Проверка...";
            errorDiv.style.color = "#888";
            errorDiv.style.display = 'block';

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action: "login", username: nick, password: pass })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // Чистим старые следы перед новой сессией, чтобы ничего не перемешалось
                    localStorage.removeItem('chat_logged_in');
                    localStorage.removeItem('burmalda_my_nick');

                    localStorage.setItem('chat_logged_in', 'true');
                    localStorage.setItem('burmalda_my_nick', nick);

                    // Переводим контакты из базы данных (строка через запятую) в массив для чата
                    const loadedContacts = data.contacts ? data.contacts.split(',') : [];
                    localStorage.setItem(`chat_list_${nick}`, JSON.stringify(loadedContacts));

                    // Передаем токен авторизации
                    const loginToken = btoa(encodeURIComponent(nick) + "_" + Date.now());
                    window.location.href = '/chat?auth=' + loginToken; 
                } else {
                    errorDiv.style.color = "#dc3545";
                    errorDiv.innerText = data.message || "Ошибка авторизации!";
                }
            })
            .catch(err => {
                errorDiv.style.color = "#dc3545";
                errorDiv.innerText = "Ошибка сети";
                console.error(err);
            });
        }
    </script>
</body>
</html>
