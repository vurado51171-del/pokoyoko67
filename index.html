<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="t-title">Вхід у Burmalda Messenger</title>
    <style>
        /* Динамічні пастельні змінні для тем */
        :root {
            --bg-color: #f7f7f9;
            --box-bg: rgba(255, 255, 255, 0.45);
            --box-border: rgba(0, 0, 0, 0.06);
            --text-main: #121214;
            --text-muted: rgba(0, 0, 0, 0.4);
            --input-bg: rgba(0, 0, 0, 0.03);
            --input-border: rgba(0, 0, 0, 0.08);
            --input-focus-bg: rgba(0, 0, 0, 0.01);
            --btn-bg: #121214;
            --btn-text: #ffffff;
            --btn-hover: #232326;
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.05);
            --blob-opacity: 0.07;
            --panel-blur: 30px;
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0c;
            --box-bg: rgba(18, 18, 22, 0.45);
            --box-border: rgba(255, 255, 255, 0.06);
            --text-main: #f3f3f5;
            --text-muted: rgba(255, 255, 255, 0.4);
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus-bg: rgba(255, 255, 255, 0.01);
            --btn-bg: #f3f3f5;
            --btn-text: #0a0a0c;
            --btn-hover: #ffffff;
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            --blob-opacity: 0.15;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        body, html { 
            height: 100vh; 
            overflow: hidden; 
            background-color: var(--bg-color);
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        /* --- ЕФЕКТ СПРАВЖНЬОГО РІДКОГО СКЛА НА ФОНІ --- */
        .liquid-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            filter: url(#liquid-glass-4rtdsii4q_filter); /* Застосування твого фільтра */
        }

        .liquid-blob {
            position: absolute;
            border-radius: 50%;
            background: var(--text-main);
            opacity: var(--blob-opacity);
            animation: drift 22s infinite alternate ease-in-out;
        }

        .liquid-blob:nth-child(1) { width: 45vw; height: 45vw; top: -10%; left: -10%; }
        .liquid-blob:nth-child(2) { width: 55vw; height: 55vw; bottom: -15%; right: -10%; animation-duration: 28s; animation-delay: -5s; }
        .liquid-blob:nth-child(3) { width: 35vw; height: 35vw; top: 30%; left: 40%; animation-duration: 18s; animation-delay: -10s; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(10%, 15%) scale(1.1) rotate(90deg); }
            100% { transform: translate(-5%, 5%) scale(0.95) rotate(180deg); }
        }

        /* --- ОСНОВНИЙ КОНТЕЙНЕР --- */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 20px;
        }

        .box { 
            background: var(--box-bg);
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: var(--shadow);
            backdrop-filter: blur(var(--panel-blur));
            -webkit-backdrop-filter: blur(var(--panel-blur));
            border: 1px solid var(--box-border);
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            width: 100%;
            max-width: 360px;
            transform-style: preserve-3d;
        }

        /* МІНІМАЛІСТИЧНИЙ СТИЛЬ ДЛЯ ПІГА */
        .pig-boss {
            width: 80px; 
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--box-border);
            filter: grayscale(20%);
        }
        
        h2 { 
            margin-bottom: 25px; 
            color: var(--text-main); 
            font-size: 22px; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        input { 
            width: 100%;
            padding: 14px 16px; 
            background: var(--input-bg); 
            border: 1px solid var(--input-border); 
            color: var(--text-main); 
            border-radius: 12px; 
            margin-bottom: 6px;
            font-size: 15px; 
            outline: none; 
            transition: all 0.25s ease;
        }

        input::placeholder { 
            color: var(--text-muted); 
        }

        input:focus { 
            border-color: var(--text-main);
            background: var(--input-focus-bg);
        }
        
        .hint { 
            font-size: 11px;
            color: var(--text-muted); 
            margin-top: 2px; 
            margin-bottom: 20px; 
            text-align: left; 
            padding-left: 4px;
            line-height: 1.4;
        }
        
        button { 
            width: 100%;
            padding: 14px 20px; 
            background: var(--btn-bg);
            color: var(--btn-text); 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 600; 
            letter-spacing: 0.3px;
            transition: all 0.2s ease; 
            margin-top: 5px;
        }

        button:hover { 
            background: var(--btn-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }
        
        .error-msg { 
            font-size: 13px;
            margin-bottom: 12px; 
            display: none; 
            font-weight: 500; 
            padding: 12px; 
            border-radius: 10px;
        }

        /* --- НИЖНЯ ПАНЕЛЬ КЕРУВАННЯ --- */
        .bottom-controls {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }

        .control-row {
            display: flex;
            gap: 8px;
            background: var(--box-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--box-border);
            padding: 4px;
            border-radius: 30px;
        }
        
        .ctrl-btn {
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 30px;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .ctrl-btn.active, .ctrl-btn:hover {
            background: var(--btn-bg);
            color: var(--btn-text);
        }

        /* --- ТЕКСТ ЗНИЗУ --- */
        .bottom-text {
            font-size: 10px;
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            pointer-events: none; 
            transition: opacity 0.5s ease;
            text-align: center;
        }

        @media (max-width: 480px) {
            .box { 
                padding: 35px 20px; 
            }
            h2 { 
                font-size: 20px; 
            }
        }
    </style>
</head>

        };

        let currentLang = 'uk';

        // Ініціалізація мови та теми
        function initPage() {
            // Мова
            const savedLang = localStorage.getItem('burmalda_lang');
            const userLang = navigator.language || navigator.userLanguage;

            if (savedLang && i18n[savedLang]) {
                currentLang = savedLang;
            } else if (userLang.toLowerCase().includes('en')) {
                currentLang = 'en';
            } else if (userLang.toLowerCase().includes('ru')) {
                currentLang = 'ru';
            } else {
                currentLang = 'uk';
            }
            setLang(currentLang);

            // Тема
            const savedTheme = localStorage.getItem('burmalda_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);
        }

        // Функція перемикання мови
        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('burmalda_lang', lang);

            document.getElementById('btn-uk').classList.remove('active');
            document.getElementById('btn-ru').classList.remove('active');
            document.getElementById('btn-en').classList.remove('active');
            
            document.getElementById(`btn-${lang}`).classList.add('active');

            document.getElementById('t-title').innerText = i18n[lang].title;
            document.getElementById('t-heading').innerText = i18n[lang].heading;
            document.getElementById('username').placeholder = i18n[lang].userPlaceholder;
            document.getElementById('t-hint').innerText = i18n[lang].userHint;
            document.getElementById('password').placeholder = i18n[lang].passPlaceholder;
            document.getElementById('login-btn').innerText = i18n[lang].btnText;
            document.getElementById('error').style.display = 'none';
        }

        // Логіка зміни темної/світлої теми
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('burmalda_theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('theme-toggle-btn');
            btn.innerText = theme === 'dark' ? '☀️ СВІТЛА ТЕМА' : '🌙 ТЕМНА ТЕМА';
        }

        window.addEventListener('DOMContentLoaded', initPage);

        // --- ЛОГІКА РАНДОМНИХ ФРАЗ ---
        const phrases = [
            "остап пушка дєвки ловушка",
            "влад пушка дєвки ловушка",
            "назар пушка дєвки ловушка"
        ];
        const phraseElement = document.getElementById('dynamic-phrase');
        
        setInterval(() => {
            phraseElement.style.opacity = '0';
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * phrases.length);
                phraseElement.innerText = phrases[randomIndex];
                phraseElement.style.opacity = '1';
            }, 500); 
        }, 5000);

        // --- ЛОГІКА АВТОРИЗАЦІЇ ---
        function enterChat() {
            const nick = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('login-btn');

            errorDiv.style.display = 'none';
            if (!nick || !pass) {
                showError(i18n[currentLang].errEmpty);
                return;
            }

            const url = 'https://script.google.com/macros/s/AKfycbw5-YIlQPbTq8fI46zqdBBBUq_b5KjAQ7PY0CPCRN0tG_PLkJx4hpwhe_6iiqdWx7Gj0g/exec';
            const originalBtnText = btn.innerText;
            btn.innerText = i18n[currentLang].loading;
            btn.style.opacity = "0.8";
            btn.disabled = true;

            errorDiv.innerText = i18n[currentLang].checking;
            errorDiv.style.color = "var(--text-main)";
            errorDiv.style.background = "transparent";
            errorDiv.style.border = "none";
            errorDiv.style.display = 'block';

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action: "login", username: nick, password: pass })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    localStorage.removeItem('chat_logged_in');
                    localStorage.removeItem('burmalda_my_nick');
                    localStorage.removeItem('current_active_chat'); 
                    localStorage.removeItem('current_messages');    
                    sessionStorage.clear(); 
                    
                    localStorage.setItem('chat_logged_in', 'true');
                    localStorage.setItem('burmalda_my_nick', nick);

                    const loadedContacts = data.contacts ? data.contacts.split(',') : [];
                    localStorage.setItem(`chat_list_${nick}`, JSON.stringify(loadedContacts));

                    const loginToken = btoa(encodeURIComponent(nick) + "_" + Date.now());
                    window.location.href = '/chat?auth=' + loginToken; 
                } else {
                    showError(data.message || i18n[currentLang].errAuth);
                    resetButton(btn, originalBtnText);
                }
            })
            .catch(err => {
                showError(i18n[currentLang].errNet);
                console.error(err);
                resetButton(btn, originalBtnText);
            });

            function showError(msg) {
                errorDiv.innerText = msg;
                errorDiv.style.color = "#ff4a4a";
                errorDiv.style.background = "rgba(255, 74, 74, 0.08)";
                errorDiv.style.border = "1px solid rgba(255, 74, 74, 0.2)";
                errorDiv.style.display = 'block';
            }
            
            function resetButton(button, text) {
                button.innerText = text;
                button.style.opacity = "1";
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
