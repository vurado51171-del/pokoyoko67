<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="t-title">Вхід у Burmalda Messenger</title>
    <style>
        /* Максимально прості та яскраві пастельні кольори */
        :root {
            --bg-color: #f0fdf4; /* Світло-зелений оптимістичний фон */
            --box-bg: #ffffff;
            --box-border: #bbf7d0;
            --text-main: #166534;
            --text-muted: #666666;
            --input-bg: #f9fafb;
            --input-border: #cbd5e1;
            --btn-bg: #22c55e; /* Веселий зелений колір */
            --btn-text: #ffffff;
            --btn-hover: #16a34a;
        }

        [data-theme="dark"] {
            --bg-color: #064e3b; /* Глибокий зелений для темної теми */
            --box-bg: #022c22;
            --box-border: #047857;
            --text-main: #f0fdf4;
            --text-muted: #a7f3d0;
            --input-bg: #065f46;
            --input-border: #047857;
            --btn-bg: #10b981;
            --btn-text: #022c22;
            --btn-hover: #34d399;
        }

        * { 
            box-sizing: border-box;
            margin: 0; 
            padding: 0;
            font-family: sans-serif; /* Найбанальніший системний шрифт */
        }
        
        body, html { 
            height: 100vh;
            overflow: hidden; 
            background-color: var(--bg-color);
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 20px;
        }

        .box { 
            background: var(--box-bg);
            padding: 30px 20px; 
            border-radius: 16px; 
            border: 3px solid var(--box-border); /* Проста жирна рамка */
            text-align: center; 
            display: flex;
            flex-direction: column; 
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 0 var(--box-border); /* Банальний flat-дизайн */
        }

        .pig-boss {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--box-border);
        }
        
        h2 { 
            margin-bottom: 20px;
            color: var(--text-main); 
            font-size: 22px; 
            font-weight: bold;
        }
        
        input { 
            width: 100%;
            padding: 12px; 
            background: var(--input-bg); 
            border: 2px solid var(--input-border); 
            color: var(--text-main); 
            border-radius: 8px; 
            margin-bottom: 6px;
            font-size: 14px; 
            outline: none;
        }

        input::placeholder { 
            color: var(--text-muted);
        }

        input:focus { 
            border-color: var(--btn-bg);
        }
        
        .hint { 
            font-size: 11px;
            color: var(--text-muted); 
            margin-top: 2px; 
            margin-bottom: 15px; 
            text-align: left; 
            padding-left: 2px;
            line-height: 1.3;
        }
        
        button { 
            width: 100%;
            padding: 12px; 
            background: var(--btn-bg);
            color: var(--btn-text); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: bold; 
            margin-top: 5px;
        }

        button:hover { 
            background: var(--btn-hover);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .error-msg { 
            font-size: 12px;
            margin-bottom: 12px; 
            display: none; 
            font-weight: bold; 
            padding: 10px; 
            border-radius: 8px;
        }

        .bottom-controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .control-row {
            display: flex;
            gap: 6px;
            background: var(--box-bg);
            border: 2px solid var(--box-border);
            padding: 4px;
            border-radius: 20px;
        }
        
        .ctrl-btn {
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 15px;
            text-transform: uppercase;
        }
        
        .ctrl-btn.active, .ctrl-btn:hover {
            background: var(--btn-bg);
            color: var(--btn-text);
        }

        .bottom-text {
            font-size: 11px;
            color: var(--text-main); 
            font-weight: bold;
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <img src="photo_2026-06-16_00-59-57.jpg" class="pig-boss" alt="Pig Boss">
            <h2 id="t-heading">Вхід Burmalda</h2>
            
            <input type="text" id="username" placeholder="Юзернейм..." autocomplete="off" maxlength="12">
            <div class="hint" id="t-hint">Максимум 12 символів (змінити юзернейм неможливо!)</div>
            
            <input type="password" id="password" placeholder="Пароль...">
            <div id="error" class="error-msg"></div>
            
            <button id="login-btn" onclick="enterChat()">Увійти / Створити</button>
        </div>
    </div>

    <div class="bottom-controls">
        <div class="control-row">
            <div class="ctrl-btn active" onclick="setLang('uk')" id="btn-uk">UK</div>
            <div class="ctrl-btn" onclick="setLang('ru')" id="btn-ru">RU</div>
            <div class="ctrl-btn" onclick="setLang('en')" id="btn-en">EN</div>
        </div>

        <div class="control-row">
            <div class="ctrl-btn" onclick="toggleTheme()" id="theme-toggle-btn">🌙 ТЕМНА</div>
        </div>

        <div class="bottom-text" id="dynamic-phrase">остап пушка дєвки ловушка</div>
    </div>

    <script>
        // --- СЛОВНИК ПЕРЕКЛАДІВ ---
        const i18n = {
            uk: {
                title: "Вхід у Burmalda Messenger",
                heading: "Вхід Burmalda",
                userPlaceholder: "Юзернейм...",
                userHint: "Максимум 12 символів (змінити юзернейм неможливо!)",
                passPlaceholder: "Пароль...",
                btnText: "Увійти / Створити",
                loading: "Завантаження...",
                checking: "Перевірка...",
                errEmpty: "Введіть нік та пароль!",
                errAuth: "Помилка авторизації!",
                errNet: "Помилка мережі!"
            },
            ru: {
                title: "Вход в Burmalda Messenger",
                heading: "Вход Burmalda",
                userPlaceholder: "Юзернейм...",
                userHint: "Максимум 12 символов (юзернейм нельзя поменять!)",
                passPlaceholder: "Пароль...",
                btnText: "Войти / Создать",
                loading: "Загрузка...",
                checking: "Проверка...",
                errEmpty: "Введите ник и пароль!",
                errAuth: "Ошибка авторизации!",
                errNet: "Ошибка сети!"
            },
            en: {
                title: "Burmalda Messenger Login",
                heading: "Burmalda Login",
                userPlaceholder: "Username...",
                userHint: "Maximum 12 characters (the username cannot be changed!)",
                passPlaceholder: "Password...",
                btnText: "Login / Create",
                loading: "Loading...",
                checking: "Checking...",
                errEmpty: "Enter nickname and password!",
                errAuth: "Authorization error!",
                errNet: "Network error!"
            }
        };

        let currentLang = 'uk';

        function initPage() {
            const savedLang = localStorage.getItem('burmalda_lang');
            const userLang = navigator.language || navigator.userLanguage;

            if (savedLang && i18n[savedLang]) {
                currentLang = savedLang;
            } else if (userLang.toLowerCase().includes('en')) {
                currentLang = 'en';
            } else if (userLang.toLowerCase().includes('ru')) {
                currentLang = 'ru';
            } else {
                currentLang = 'uk';
            }
            setLang(currentLang);

            const savedTheme = localStorage.getItem('burmalda_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('burmalda_lang', lang);

            document.getElementById('btn-uk').classList.remove('active');
            document.getElementById('btn-ru').classList.remove('active');
            document.getElementById('btn-en').classList.remove('active');
            
            document.getElementById(`btn-${lang}`).classList.add('active');

            document.getElementById('t-title').innerText = i18n[lang].title;
            document.getElementById('t-heading').innerText = i18n[lang].heading;
            document.getElementById('username').placeholder = i18n[lang].userPlaceholder;
            document.getElementById('t-hint').innerText = i18n[lang].userHint;
            document.getElementById('password').placeholder = i18n[lang].passPlaceholder;
            document.getElementById('login-btn').innerText = i18n[lang].btnText;
            document.getElementById('error').style.display = 'none';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('burmalda_theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('theme-toggle-btn');
            btn.innerText = theme === 'dark' ? '☀️ СВІТЛА' : '🌙 ТЕМНА';
        }

        window.addEventListener('DOMContentLoaded', initPage);

        // --- ЛОГІКА РАНДОМНИХ ФРАЗ ---
        const phrases = [
            "остап пушка дєвки ловушка",
            "влад пушка дєвки ловушка",
            "назар пушка дєвки ловушка"
        ];
        const phraseElement = document.getElementById('dynamic-phrase');
        
        setInterval(() => {
            phraseElement.style.opacity = '0';
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * phrases.length);
                phraseElement.innerText = phrases[randomIndex];
                phraseElement.style.opacity = '1';
            }, 300); 
        }, 5000);

        // --- ЛОГІКА АВТОРИЗАЦІЇ (ПОВНІСТЮ ЗБЕРЕЖЕНО) ---
        function enterChat() {
            const nick = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('login-btn');

            errorDiv.style.display = 'none';
            if (!nick || !pass) {
                showError(i18n[currentLang].errEmpty);
                return;
            }

            const url = 'https://script.google.com/macros/s/AKfycbw5-YIlQPbTq8fI46zqdBBBUq_b5KjAQ7PY0CPCRN0tG_PLkJx4hpwhe_6iiqdWx7Gj0g/exec';
            const originalBtnText = btn.innerText;
            btn.innerText = i18n[currentLang].loading;
            btn.disabled = true;

            errorDiv.innerText = i18n[currentLang].checking;
            errorDiv.style.color = "var(--text-main)";
            errorDiv.style.background = "transparent";
            errorDiv.style.border = "none";
            errorDiv.style.display = 'block';

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action: "login", username: nick, password: pass })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    localStorage.removeItem('chat_logged_in');
                    localStorage.removeItem('burmalda_my_nick');
                    localStorage.removeItem('current_active_chat'); 
                    localStorage.removeItem('current_messages');    
                    sessionStorage.clear(); 
                    
                    localStorage.setItem('chat_logged_in', 'true');
                    localStorage.setItem('burmalda_my_nick', nick);

                    const loadedContacts = data.contacts ? data.contacts.split(',') : [];
                    localStorage.setItem(`chat_list_${nick}`, JSON.stringify(loadedContacts));
                    const loginToken = btoa(encodeURIComponent(nick) + "_" + Date.now());
                    window.location.href = '/chat?auth=' + loginToken;
                } else {
                    showError(data.message || i18n[currentLang].errAuth);
                    resetButton(btn, originalBtnText);
                }
            })
            .catch(err => {
                showError(i18n[currentLang].errNet);
                console.error(err);
                resetButton(btn, originalBtnText);
            });

            function showError(msg) {
                errorDiv.innerText = msg;
                errorDiv.style.color = "#b91c1c";
                errorDiv.style.background = "#fee2e2";
                errorDiv.style.border = "2px solid #fca5a5";
                errorDiv.style.display = 'block';
            }
            
            function resetButton(button, text) {
                button.innerText = text;
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
